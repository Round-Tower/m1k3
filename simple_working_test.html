<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Working Avatar Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'SF Mono', Monaco, monospace;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #9BBC0F;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .header {
            text-align: center;
            margin: 20px 0;
        }
        
        .title {
            font-size: 2rem;
            background: linear-gradient(45deg, #9BBC0F, #8BAC0F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .avatar-container {
            background: #0F380F;
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            border: 2px solid #306230;
            box-shadow: 0 0 20px rgba(155, 188, 15, 0.3);
        }
        
        #avatarCanvas {
            border-radius: 8px;
            background: #9BBC0F;
            display: block;
        }
        
        .status {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(15, 56, 15, 0.5);
            border-radius: 10px;
            border: 1px solid #306230;
        }
        
        .test-results {
            width: 100%;
            max-width: 800px;
            background: rgba(15, 56, 15, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .test-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid;
        }
        
        .test-pass { 
            border-left-color: #9BBC0F; 
            background: rgba(155, 188, 15, 0.1);
        }
        
        .test-fail { 
            border-left-color: #ff6b6b; 
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
        }
        
        .test-info { 
            border-left-color: #E25303; 
            background: rgba(226, 83, 3, 0.1);
            color: #E25303;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">🎮 M1K3 Avatar Test</h1>
        <p>Simple Working Version</p>
    </div>
    
    <div class="avatar-container">
        <canvas id="avatarCanvas" width="256" height="256"></canvas>
    </div>
    
    <div class="status" id="status">Initializing...</div>
    
    <div class="test-results">
        <h2>🔬 Test Results</h2>
        <div id="results"></div>
    </div>
    
    <script src="gameboy_pixel_engine.js"></script>
    <script>
        const results = document.getElementById('results');
        const status = document.getElementById('status');
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-item test-${type}`;
            div.innerHTML = message;
            results.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function updateStatus(message) {
            status.textContent = message;
        }
        
        async function runSimpleTest() {
            log('🚀 Starting Simple Avatar Test...', 'info');
            updateStatus('Running tests...');
            
            try {
                // Test 1: Check if engine loads
                if (typeof GameboyPixelEngine === 'undefined') {
                    throw new Error('GameboyPixelEngine class not found');
                }
                log('✅ GameboyPixelEngine class loaded', 'pass');
                
                // Test 2: Create engine instance
                const canvas = document.getElementById('avatarCanvas');
                const engine = new GameboyPixelEngine(canvas, {
                    pixelSize: 8,
                    mode: 'avatar',
                    enableCare: true
                });
                
                log(`✅ Engine created: ${engine.gridWidth}x${engine.gridHeight} grid`, 'pass');
                log(`✅ Palette loaded: ${engine.currentPalette?.length || 0} colors`, 'pass');
                
                // Test 3: Basic pixel operations
                try {
                    engine.clearCanvas();
                    log('✅ clearCanvas() works', 'pass');
                } catch (e) {
                    log(`❌ clearCanvas() failed: ${e.message}`, 'fail');
                }
                
                try {
                    engine.setPixel(5, 5, 0);
                    engine.setPixel(6, 5, 1);
                    engine.setPixel(7, 5, 2);
                    engine.setPixel(8, 5, 3);
                    log('✅ Basic setPixel() works', 'pass');
                } catch (e) {
                    log(`❌ setPixel() failed: ${e.message}`, 'fail');
                }
                
                // Test 4: Draw test pattern
                try {
                    for (let x = 10; x < 20; x++) {
                        for (let y = 10; y < 20; y++) {
                            engine.setPixel(x, y, (x + y) % 4);
                        }
                    }
                    log('✅ Test pattern drawn', 'pass');
                } catch (e) {
                    log(`❌ Test pattern failed: ${e.message}`, 'fail');
                }
                
                // Test 5: System state
                try {
                    engine.updateSystemState({
                        battery: 75,
                        cpu: 45,
                        temperature: 55,
                        network: true
                    });
                    log('✅ System state update works', 'pass');
                } catch (e) {
                    log(`❌ System state failed: ${e.message}`, 'fail');
                }
                
                // Test 6: Avatar rendering
                try {
                    if (typeof engine.renderAvatar === 'function') {
                        engine.renderAvatar();
                        log('✅ renderAvatar() executed', 'pass');
                    } else {
                        log('❌ renderAvatar() method not found', 'fail');
                    }
                } catch (e) {
                    log(`❌ renderAvatar() failed: ${e.message}`, 'fail');
                }
                
                // Test 7: Text rendering
                try {
                    if (typeof engine.renderText === 'function') {
                        engine.renderText('TEST', 2, 2, 'small', 3);
                        log('✅ renderText() executed', 'pass');
                    } else {
                        log('❌ renderText() method not found', 'fail');
                    }
                } catch (e) {
                    log(`❌ renderText() failed: ${e.message}`, 'fail');
                }
                
                // Test 8: Care mechanics
                try {
                    if (typeof engine.updateAvatarCare === 'function') {
                        engine.updateAvatarCare();
                        log('✅ updateAvatarCare() executed', 'pass');
                    } else {
                        log('❌ updateAvatarCare() method not found', 'fail');
                    }
                } catch (e) {
                    log(`❌ updateAvatarCare() failed: ${e.message}`, 'fail');
                }
                
                updateStatus('✅ Tests complete - Check results above');
                
                // Start simple animation
                let frame = 0;
                const animate = () => {
                    try {
                        frame++;
                        
                        // Update system state
                        engine.updateSystemState({
                            battery: 50 + Math.sin(frame * 0.01) * 30,
                            cpu: 30 + Math.sin(frame * 0.02) * 20,
                            temperature: 45 + Math.sin(frame * 0.015) * 15
                        });
                        
                        // Clear and render
                        engine.clearCanvas();
                        engine.renderAvatar();
                        
                        // Add some test pixels
                        const sparkleX = 5 + Math.floor(Math.sin(frame * 0.05) * 5);
                        const sparkleY = 5 + Math.floor(Math.cos(frame * 0.05) * 5);
                        engine.setPixel(sparkleX, sparkleY, 3);
                        
                    } catch (e) {
                        console.error('Animation error:', e);
                        updateStatus(`❌ Animation error: ${e.message}`);
                        return;
                    }
                    
                    requestAnimationFrame(animate);
                };
                
                log('🎬 Starting animation...', 'info');
                animate();
                
            } catch (error) {
                log(`❌ Critical error: ${error.message}`, 'fail');
                log(`❌ Stack trace: ${error.stack}`, 'fail');
                updateStatus(`❌ Test failed: ${error.message}`);
            }
        }
        
        // Run test when page loads
        window.addEventListener('load', () => {
            setTimeout(runSimpleTest, 100);
        });
    </script>
</body>
</html>
