<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive data visualization - {{CHART_TITLE}}">
    <title>{{CHART_TITLE}}</title>
    <style>
        /* SVG Chart Template CSS - M1K3 Canvas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chart-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Accessibility: Skip link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            z-index: 100;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Screen reader only content */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .chart-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .chart-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .chart-description {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Chart elements */
        .bar {
            transition: opacity 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .bar:hover,
        .bar:focus {
            opacity: 0.8;
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        .line-path {
            fill: none;
            stroke: #667eea;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .data-point {
            transition: r 0.2s ease;
            cursor: pointer;
        }

        .data-point:hover,
        .data-point:focus {
            r: 8;
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        .axis-line {
            stroke: #333;
            stroke-width: 2;
        }

        .grid-line {
            stroke: #e0e0e0;
            stroke-width: 1;
        }

        .axis-label {
            font-size: 12px;
            fill: #666;
        }

        .axis-title {
            font-size: 14px;
            fill: #333;
            font-weight: 600;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }

        .tooltip.show {
            opacity: 1;
        }

        .tooltip-label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .tooltip-value {
            font-size: 16px;
        }

        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-label {
            color: #333;
            font-size: 14px;
        }

        /* Data table (accessibility fallback) */
        .data-table-wrapper {
            margin-top: 30px;
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table th {
            background: #f8f9fa;
            color: #333;
            font-weight: 600;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        /* Controls */
        .chart-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 44px; /* WCAG 2.2 AA touch target */
            min-width: 44px;
        }

        .btn:focus {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        @media (max-width: 768px) {
            .chart-container {
                padding: 24px;
            }

            .chart-header h1 {
                font-size: 24px;
            }

            .legend {
                gap: 15px;
            }
        }

        /* Accessibility: Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Print styles */
        @media print {
            body {
                background: white;
            }

            .chart-container {
                box-shadow: none;
            }

            .chart-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Accessibility: Skip link -->
    <a href="#data-table" class="skip-link">Skip to data table</a>

    <main class="chart-container" role="main" aria-label="Data Visualization">
        <header class="chart-header">
            <h1 id="chartTitle">{{CHART_TITLE}}</h1>
            <p class="chart-description" id="chartDescription">{{CHART_DESCRIPTION}}</p>
        </header>

        <!-- SVG Chart -->
        <div class="chart-wrapper">
            <svg id="chartSvg"
                 viewBox="0 0 800 500"
                 role="img"
                 aria-labelledby="chartTitle chartDescription"
                 aria-describedby="data-table">
                <!-- Chart will be rendered here -->
            </svg>
        </div>

        <!-- Tooltip -->
        <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true">
            <div class="tooltip-label" id="tooltipLabel"></div>
            <div class="tooltip-value" id="tooltipValue"></div>
        </div>

        <!-- Legend -->
        <div class="legend" role="list" aria-label="Chart legend" id="legend">
            <!-- Legend items will be generated -->
        </div>

        <!-- Accessible Data Table -->
        <div class="data-table-wrapper">
            <table class="data-table" id="data-table" role="table">
                <caption class="sr-only">Data visualization in table format</caption>
                <thead>
                    <tr id="tableHeader">
                        <!-- Headers will be generated -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rows will be generated -->
                </tbody>
            </table>
        </div>

        <!-- Controls -->
        <div class="chart-controls">
            <button class="btn btn-secondary" onclick="animateChart()"
                    aria-label="Animate chart">
                Animate
            </button>
            <button class="btn btn-secondary" onclick="exportChart()"
                    aria-label="Export chart as image">
                Export
            </button>
        </div>
    </main>

    <script>
        // SVG Chart Template JavaScript - M1K3 Canvas

        // ===== AI FILLS THIS SECTION =====
        const CHART_DATA = {{CHART_DATA}};
        const CHART_TYPE = "{{CHART_TYPE}}"; // "bar", "line", "pie"
        const CHART_CONFIG = {
            {{CHART_CONFIG}}
        };
        // ===== END AI SECTION =====

        // Chart dimensions
        const margin = { top: 40, right: 40, bottom: 60, left: 60 };
        const width = 800 - margin.left - margin.right;
        const height = 500 - margin.top - margin.bottom;

        // SVG setup
        const svg = document.getElementById('chartSvg');
        const tooltip = document.getElementById('tooltip');

        // Default config
        const config = {
            colors: ['#667eea', '#764ba2', '#28a745', '#dc3545', '#ffc107'],
            animated: true,
            showGrid: true,
            ...CHART_CONFIG
        };

        // Render chart based on type
        function renderChart() {
            switch(CHART_TYPE) {
                case 'bar':
                    renderBarChart();
                    break;
                case 'line':
                    renderLineChart();
                    break;
                case 'pie':
                    renderPieChart();
                    break;
                default:
                    renderBarChart();
            }

            renderLegend();
            renderDataTable();
        }

        function renderBarChart() {
            const svgContent = svg.querySelector('g') || document.createElementNS('http://www.w3.org/2000/svg', 'g');
            svgContent.setAttribute('transform', `translate(${margin.left}, ${margin.top})`);
            svg.appendChild(svgContent);

            // Clear existing content
            svgContent.innerHTML = '';

            // Calculate scales
            const maxValue = Math.max(...CHART_DATA.map(d => d.value));
            const barWidth = width / CHART_DATA.length;
            const scaleY = height / maxValue;

            // Draw grid
            if (config.showGrid) {
                for (let i = 0; i <= 5; i++) {
                    const y = (height / 5) * i;
                    const gridLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    gridLine.setAttribute('class', 'grid-line');
                    gridLine.setAttribute('x1', 0);
                    gridLine.setAttribute('y1', y);
                    gridLine.setAttribute('x2', width);
                    gridLine.setAttribute('y2', y);
                    svgContent.appendChild(gridLine);
                }
            }

            // Draw bars
            CHART_DATA.forEach((d, i) => {
                const barHeight = d.value * scaleY;
                const x = i * barWidth + barWidth * 0.1;
                const y = height - barHeight;
                const barWidthActual = barWidth * 0.8;

                const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bar.setAttribute('class', 'bar');
                bar.setAttribute('x', x);
                bar.setAttribute('y', y);
                bar.setAttribute('width', barWidthActual);
                bar.setAttribute('height', barHeight);
                bar.setAttribute('fill', config.colors[i % config.colors.length]);
                bar.setAttribute('role', 'img');
                bar.setAttribute('aria-label', `${d.label}: ${d.value}`);
                bar.setAttribute('tabindex', '0');

                // Tooltip events
                bar.addEventListener('mouseenter', (e) => showTooltip(e, d.label, d.value));
                bar.addEventListener('mouseleave', hideTooltip);
                bar.addEventListener('focus', (e) => showTooltip(e, d.label, d.value));
                bar.addEventListener('blur', hideTooltip);

                svgContent.appendChild(bar);

                // Label
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('class', 'axis-label');
                label.setAttribute('x', x + barWidthActual / 2);
                label.setAttribute('y', height + 20);
                label.setAttribute('text-anchor', 'middle');
                label.textContent = d.label;
                svgContent.appendChild(label);
            });

            // Draw axes
            drawAxes(svgContent);
        }

        function renderLineChart() {
            const svgContent = svg.querySelector('g') || document.createElementNS('http://www.w3.org/2000/svg', 'g');
            svgContent.setAttribute('transform', `translate(${margin.left}, ${margin.top})`);
            svg.appendChild(svgContent);
            svgContent.innerHTML = '';

            const maxValue = Math.max(...CHART_DATA.map(d => d.value));
            const scaleX = width / (CHART_DATA.length - 1);
            const scaleY = height / maxValue;

            // Draw grid
            if (config.showGrid) {
                for (let i = 0; i <= 5; i++) {
                    const y = (height / 5) * i;
                    const gridLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    gridLine.setAttribute('class', 'grid-line');
                    gridLine.setAttribute('x1', 0);
                    gridLine.setAttribute('y1', y);
                    gridLine.setAttribute('x2', width);
                    gridLine.setAttribute('y2', y);
                    svgContent.appendChild(gridLine);
                }
            }

            // Create line path
            let pathData = '';
            CHART_DATA.forEach((d, i) => {
                const x = i * scaleX;
                const y = height - (d.value * scaleY);
                pathData += (i === 0 ? 'M' : 'L') + ` ${x} ${y}`;
            });

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('class', 'line-path');
            path.setAttribute('d', pathData);
            path.setAttribute('role', 'img');
            path.setAttribute('aria-label', 'Line chart path');
            svgContent.appendChild(path);

            // Draw data points
            CHART_DATA.forEach((d, i) => {
                const x = i * scaleX;
                const y = height - (d.value * scaleY);

                const point = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                point.setAttribute('class', 'data-point');
                point.setAttribute('cx', x);
                point.setAttribute('cy', y);
                point.setAttribute('r', 6);
                point.setAttribute('fill', config.colors[0]);
                point.setAttribute('role', 'img');
                point.setAttribute('aria-label', `${d.label}: ${d.value}`);
                point.setAttribute('tabindex', '0');

                point.addEventListener('mouseenter', (e) => showTooltip(e, d.label, d.value));
                point.addEventListener('mouseleave', hideTooltip);
                point.addEventListener('focus', (e) => showTooltip(e, d.label, d.value));
                point.addEventListener('blur', hideTooltip);

                svgContent.appendChild(point);

                // Label
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('class', 'axis-label');
                label.setAttribute('x', x);
                label.setAttribute('y', height + 20);
                label.setAttribute('text-anchor', 'middle');
                label.textContent = d.label;
                svgContent.appendChild(label);
            });

            drawAxes(svgContent);
        }

        function renderPieChart() {
            // Pie chart implementation
            // AI can customize this
        }

        function drawAxes(parent) {
            // X-axis
            const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            xAxis.setAttribute('class', 'axis-line');
            xAxis.setAttribute('x1', 0);
            xAxis.setAttribute('y1', height);
            xAxis.setAttribute('x2', width);
            xAxis.setAttribute('y2', height);
            parent.appendChild(xAxis);

            // Y-axis
            const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            yAxis.setAttribute('class', 'axis-line');
            yAxis.setAttribute('x1', 0);
            yAxis.setAttribute('y1', 0);
            yAxis.setAttribute('x2', 0);
            yAxis.setAttribute('y2', height);
            parent.appendChild(yAxis);
        }

        function renderLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = '';

            CHART_DATA.forEach((d, i) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.setAttribute('role', 'listitem');

                const color = document.createElement('div');
                color.className = 'legend-color';
                color.style.backgroundColor = config.colors[i % config.colors.length];

                const label = document.createElement('span');
                label.className = 'legend-label';
                label.textContent = d.label;

                item.appendChild(color);
                item.appendChild(label);
                legend.appendChild(item);
            });
        }

        function renderDataTable() {
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');

            // Clear existing content
            header.innerHTML = '';
            body.innerHTML = '';

            // Header
            const thLabel = document.createElement('th');
            thLabel.textContent = 'Label';
            const thValue = document.createElement('th');
            thValue.textContent = 'Value';
            header.appendChild(thLabel);
            header.appendChild(thValue);

            // Rows
            CHART_DATA.forEach(d => {
                const row = document.createElement('tr');
                const tdLabel = document.createElement('td');
                tdLabel.textContent = d.label;
                const tdValue = document.createElement('td');
                tdValue.textContent = d.value;
                row.appendChild(tdLabel);
                row.appendChild(tdValue);
                body.appendChild(row);
            });
        }

        function showTooltip(event, label, value) {
            tooltip.querySelector('#tooltipLabel').textContent = label;
            tooltip.querySelector('#tooltipValue').textContent = value;
            tooltip.classList.add('show');
            tooltip.setAttribute('aria-hidden', 'false');

            const rect = event.target.getBoundingClientRect();
            tooltip.style.left = rect.left + rect.width / 2 + 'px';
            tooltip.style.top = rect.top - 60 + 'px';
        }

        function hideTooltip() {
            tooltip.classList.remove('show');
            tooltip.setAttribute('aria-hidden', 'true');
        }

        function animateChart() {
            // Animation implementation
            announceToScreenReader('Chart animation started');
        }

        function exportChart() {
            // Export implementation
            announceToScreenReader('Exporting chart');
        }

        // Screen reader announcements
        function announceToScreenReader(message) {
            const announcement = document.createElement('div');
            announcement.setAttribute('role', 'status');
            announcement.setAttribute('aria-live', 'polite');
            announcement.setAttribute('aria-atomic', 'true');
            announcement.className = 'sr-only';
            announcement.textContent = message;
            document.body.appendChild(announcement);
            setTimeout(() => document.body.removeChild(announcement), 1000);
        }

        // Initialize chart
        renderChart();
    </script>
</body>
</html>
