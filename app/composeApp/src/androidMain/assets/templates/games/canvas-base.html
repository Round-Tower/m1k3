<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive canvas game - {{GAME_TITLE}}">
    <title>{{GAME_TITLE}}</title>
    <style>
        /* Canvas Game Template CSS - M1K3 Canvas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 30px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Accessibility: Skip link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            z-index: 100;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Screen reader only content */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #667eea;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #333;
            font-size: 24px;
            font-weight: 700;
        }

        .canvas-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            background: #000;
        }

        /* Accessibility: Focus indicator for canvas */
        #gameCanvas:focus {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        .game-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .control-btn {
            grid-column: 2;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 44px; /* WCAG 2.2 AA touch target */
            min-width: 44px;
            background: #f8f9fa;
            color: #333;
        }

        .control-btn:hover:not(:disabled) {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .control-btn:focus {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .control-up {
            grid-row: 1;
        }

        .control-left {
            grid-column: 1;
            grid-row: 2;
        }

        .control-right {
            grid-column: 3;
            grid-row: 2;
        }

        .control-down {
            grid-row: 3;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 44px; /* WCAG 2.2 AA touch target */
            min-width: 44px;
        }

        .btn:focus {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .game-over-screen {
            display: none;
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-top: 20px;
        }

        .game-over-screen.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .game-over-title {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 15px;
        }

        .final-score {
            font-size: 48px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .instructions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .instructions h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .instructions ul {
            list-style: none;
            padding: 0;
        }

        .instructions li {
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .instructions li::before {
            content: "▸";
            position: absolute;
            left: 0;
            color: #667eea;
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 20px;
            }

            .game-header h1 {
                font-size: 24px;
            }

            .stat-value {
                font-size: 20px;
            }

            .game-controls {
                gap: 8px;
            }

            .control-btn {
                padding: 12px;
                font-size: 16px;
            }
        }

        /* Accessibility: Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Accessibility: Skip link -->
    <a href="#game-over" class="skip-link">Skip to game results</a>

    <main class="game-container" role="main" aria-label="Canvas Game">
        <header class="game-header">
            <h1 id="gameTitle">{{GAME_TITLE}}</h1>
        </header>

        <!-- Game Statistics -->
        <div class="game-stats" role="region" aria-label="Game statistics">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="scoreDisplay" aria-live="polite">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">High Score</div>
                <div class="stat-value" id="highScoreDisplay">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="levelDisplay" aria-live="polite">1</div>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"
                    width="400"
                    height="400"
                    tabindex="0"
                    role="img"
                    aria-label="Game canvas. Use arrow keys or on-screen buttons to control.">
                Your browser does not support the canvas element.
            </canvas>
        </div>

        <!-- Touch Controls (for mobile) -->
        <div class="game-controls" role="group" aria-label="Touch controls">
            <button class="control-btn control-up"
                    onclick="changeDirection('up')"
                    aria-label="Move up">
                ▲
            </button>
            <button class="control-btn control-left"
                    onclick="changeDirection('left')"
                    aria-label="Move left">
                ◀
            </button>
            <button class="control-btn control-right"
                    onclick="changeDirection('right')"
                    aria-label="Move right">
                ▶
            </button>
            <button class="control-btn control-down"
                    onclick="changeDirection('down')"
                    aria-label="Move down">
                ▼
            </button>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-primary" id="startBtn" onclick="startGame()"
                    aria-label="Start game">
                Start Game
            </button>
            <button class="btn btn-secondary" id="pauseBtn" onclick="togglePause()" disabled
                    aria-label="Pause game">
                Pause
            </button>
        </div>

        <!-- Game Over Screen -->
        <section class="game-over-screen" id="game-over" role="region" aria-labelledby="gameOverTitle">
            <h2 id="gameOverTitle" class="game-over-title">Game Over!</h2>
            <div class="final-score" id="finalScore" aria-live="assertive">0</div>
            <button class="btn btn-primary" onclick="resetGame()"
                    aria-label="Play again">
                Play Again
            </button>
        </section>

        <!-- Instructions -->
        <div class="instructions" role="region" aria-labelledby="instructionsTitle">
            <h2 id="instructionsTitle">How to Play</h2>
            <ul>
                <li>Use arrow keys or touch controls to move</li>
                <li>Collect items to increase your score</li>
                <li>Avoid obstacles and boundaries</li>
                <li>Press Space to pause/unpause</li>
            </ul>
        </div>
    </main>

    <script>
        // Canvas Game Template JavaScript - M1K3 Canvas

        // ===== AI FILLS THIS SECTION =====
        const GAME_CONFIG = {
            {{GAME_CONFIG}}
        };
        // ===== END AI SECTION =====

        // Game State
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameLoop = null;
        let isPaused = false;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let level = 1;

        // Default game configuration (AI can override)
        const config = {
            gridSize: 20,
            speed: 100,
            ...GAME_CONFIG
        };

        // Game objects (AI fills these)
        let player = {
            x: 200,
            y: 200,
            dx: 0,
            dy: 0,
            size: config.gridSize,
            color: '#667eea'
        };

        // Initialize high score display
        document.getElementById('highScoreDisplay').textContent = highScore;

        // Keyboard controls
        document.addEventListener('keydown', handleKeyboard);
        canvas.addEventListener('keydown', handleKeyboard);

        function handleKeyboard(e) {
            // Prevent default for arrow keys and space
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }

            switch(e.code) {
                case 'ArrowUp':
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                    changeDirection('right');
                    break;
                case 'Space':
                    if (gameLoop) togglePause();
                    break;
            }
        }

        function changeDirection(direction) {
            if (!gameLoop) return;

            switch(direction) {
                case 'up':
                    if (player.dy === 0) {
                        player.dx = 0;
                        player.dy = -config.gridSize;
                    }
                    break;
                case 'down':
                    if (player.dy === 0) {
                        player.dx = 0;
                        player.dy = config.gridSize;
                    }
                    break;
                case 'left':
                    if (player.dx === 0) {
                        player.dx = -config.gridSize;
                        player.dy = 0;
                    }
                    break;
                case 'right':
                    if (player.dx === 0) {
                        player.dx = config.gridSize;
                        player.dy = 0;
                    }
                    break;
            }
        }

        function startGame() {
            // Reset game state
            score = 0;
            level = 1;
            updateScore();

            // Reset player
            player.x = 200;
            player.y = 200;
            player.dx = 0;
            player.dy = 0;

            // Hide game over, show game
            document.getElementById('game-over').classList.remove('show');

            // Update buttons
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;

            // Start game loop
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, config.speed);

            // Focus canvas for keyboard input
            canvas.focus();

            // Announce to screen readers
            announceToScreenReader('Game started. Use arrow keys to move.');
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? 'Resume' : 'Pause';
            document.getElementById('pauseBtn').setAttribute('aria-label', isPaused ? 'Resume game' : 'Pause game');

            announceToScreenReader(isPaused ? 'Game paused' : 'Game resumed');
        }

        function update() {
            if (isPaused) return;

            // Update player position
            player.x += player.dx;
            player.y += player.dy;

            // Check boundaries (AI can customize collision logic)
            if (player.x < 0 || player.x >= canvas.width ||
                player.y < 0 || player.y >= canvas.height) {
                gameOver();
                return;
            }

            // AI fills custom game logic here
            // Example: collision detection, item collection, etc.

            // Draw
            draw();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (optional)
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += config.gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += config.gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // AI fills custom drawing logic here
        }

        function updateScore(points = 0) {
            score += points;
            document.getElementById('scoreDisplay').textContent = score;

            // Update level (every 100 points)
            const newLevel = Math.floor(score / 100) + 1;
            if (newLevel > level) {
                level = newLevel;
                document.getElementById('levelDisplay').textContent = level;
                announceToScreenReader(`Level ${level} reached!`);
            }

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
                document.getElementById('highScoreDisplay').textContent = highScore;
            }
        }

        function gameOver() {
            // Stop game loop
            clearInterval(gameLoop);
            gameLoop = null;

            // Show game over screen
            document.getElementById('finalScore').textContent = score;
            document.getElementById('game-over').classList.add('show');

            // Update buttons
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;

            // Announce to screen readers
            announceToScreenReader(`Game over! Final score: ${score}`);
        }

        function resetGame() {
            startGame();
        }

        // Screen reader announcements
        function announceToScreenReader(message) {
            const announcement = document.createElement('div');
            announcement.setAttribute('role', 'status');
            announcement.setAttribute('aria-live', 'polite');
            announcement.setAttribute('aria-atomic', 'true');
            announcement.className = 'sr-only';
            announcement.textContent = message;
            document.body.appendChild(announcement);
            setTimeout(() => document.body.removeChild(announcement), 1000);
        }

        // Initialize canvas focus
        canvas.setAttribute('tabindex', '0');
    </script>
</body>
</html>
