<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive presentation - {{PRESENTATION_TITLE}}">
    <title>{{PRESENTATION_TITLE}}</title>
    <style>
        /* Presentation Template CSS - M1K3 Canvas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Accessibility: Skip link */
        .skip-link {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            z-index: 1000;
            border-radius: 4px;
        }

        .skip-link:focus {
            outline: 3px solid white;
        }

        /* Screen reader only content */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .presentation-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            width: 90%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 60px 80px;
            display: none;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .slide.active {
            display: flex;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide.fade-out {
            animation: fadeOut 0.3s ease-out;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        /* Slide types */
        .slide-title {
            text-align: center;
        }

        .slide-title h1 {
            color: white;
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .slide-title .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 32px;
            font-weight: 400;
        }

        .slide-content h2 {
            color: white;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .slide-content p,
        .slide-content li {
            color: rgba(255, 255, 255, 0.95);
            font-size: 24px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .slide-content ul,
        .slide-content ol {
            list-style-position: inside;
            margin-left: 20px;
        }

        .slide-content li {
            margin-bottom: 15px;
        }

        .slide-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .slide-content blockquote {
            border-left: 4px solid white;
            padding-left: 20px;
            margin: 30px 0;
            font-style: italic;
            color: rgba(255, 255, 255, 0.95);
            font-size: 28px;
        }

        /* Two-column layout */
        .slide-two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .slide-two-column h2 {
            grid-column: 1 / -1;
        }

        /* Navigation controls */
        .nav-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .nav-btn {
            padding: 15px 30px;
            border: 2px solid white;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 44px; /* WCAG 2.2 AA touch target */
            min-width: 44px;
            backdrop-filter: blur(10px);
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .nav-btn:focus {
            outline: 3px solid white;
            outline-offset: 4px;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Progress indicator */
        .progress-indicator {
            position: fixed;
            top: 30px;
            right: 30px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .progress-bar-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
        }

        .progress-bar-fill {
            height: 100%;
            background: white;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* Fullscreen toggle */
        .fullscreen-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 12px 20px;
            border: 2px solid white;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn:focus {
            outline: 3px solid white;
            outline-offset: 4px;
        }

        /* Slide number */
        .slide-number {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .slide {
                padding: 30px 40px;
            }

            .slide-title h1 {
                font-size: 36px;
            }

            .slide-title .subtitle {
                font-size: 20px;
            }

            .slide-content h2 {
                font-size: 28px;
            }

            .slide-content p,
            .slide-content li {
                font-size: 18px;
            }

            .nav-controls {
                bottom: 15px;
            }

            .nav-btn {
                padding: 10px 20px;
                font-size: 16px;
            }

            .progress-indicator {
                top: 15px;
                right: 15px;
                font-size: 14px;
            }

            .fullscreen-btn {
                top: 15px;
                left: 15px;
                padding: 8px 16px;
                font-size: 14px;
            }
        }

        /* Accessibility: Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Print styles */
        @media print {
            .slide {
                display: flex !important;
                page-break-after: always;
                box-shadow: none;
            }

            .nav-controls,
            .progress-indicator,
            .fullscreen-btn,
            .progress-bar-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Accessibility: Skip link -->
    <a href="#slide-1" class="skip-link">Skip to first slide</a>

    <!-- Fullscreen toggle -->
    <button class="fullscreen-btn" onclick="toggleFullscreen()"
            aria-label="Toggle fullscreen mode">
        ⛶ Fullscreen
    </button>

    <!-- Progress indicator -->
    <div class="progress-indicator" aria-live="polite" aria-atomic="true">
        <span id="currentSlide">1</span> / <span id="totalSlides">0</span>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar-container" role="progressbar"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
         aria-label="Presentation progress">
        <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <main class="presentation-container" role="main" aria-label="Presentation slides">
        <!-- ===== AI FILLS THIS SECTION ===== -->
        {{SLIDES}}
        <!-- ===== END AI SECTION ===== -->
    </main>

    <!-- Navigation controls -->
    <nav class="nav-controls" aria-label="Slide navigation">
        <button class="nav-btn" id="prevBtn" onclick="previousSlide()"
                aria-label="Go to previous slide" disabled>
            ◀ Previous
        </button>
        <button class="nav-btn" id="nextBtn" onclick="nextSlide()"
                aria-label="Go to next slide">
            Next ▶
        </button>
    </nav>

    <script>
        // Presentation Template JavaScript - M1K3 Canvas

        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        // Initialize
        document.getElementById('totalSlides').textContent = totalSlides;
        if (slides.length > 0) {
            slides[0].classList.add('active');
            slides[0].id = 'slide-1';
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowRight':
                case ' ':
                case 'PageDown':
                    e.preventDefault();
                    nextSlide();
                    break;
                case 'ArrowLeft':
                case 'PageUp':
                    e.preventDefault();
                    previousSlide();
                    break;
                case 'Home':
                    e.preventDefault();
                    goToSlide(0);
                    break;
                case 'End':
                    e.preventDefault();
                    goToSlide(totalSlides - 1);
                    break;
                case 'f':
                case 'F':
                    toggleFullscreen();
                    break;
            }
        });

        // Touch swipe support
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchStartX - touchEndX > swipeThreshold) {
                nextSlide();
            } else if (touchEndX - touchStartX > swipeThreshold) {
                previousSlide();
            }
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                goToSlide(currentSlideIndex + 1);
            }
        }

        function previousSlide() {
            if (currentSlideIndex > 0) {
                goToSlide(currentSlideIndex - 1);
            }
        }

        function goToSlide(index) {
            if (index < 0 || index >= totalSlides) return;

            // Fade out current slide
            slides[currentSlideIndex].classList.add('fade-out');

            setTimeout(() => {
                slides[currentSlideIndex].classList.remove('active', 'fade-out');
                currentSlideIndex = index;
                slides[currentSlideIndex].classList.add('active');
                updateUI();
            }, 300);
        }

        function updateUI() {
            // Update progress
            const progress = ((currentSlideIndex + 1) / totalSlides) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressBar').parentElement.setAttribute('aria-valuenow', Math.round(progress));

            // Update slide number
            document.getElementById('currentSlide').textContent = currentSlideIndex + 1;

            // Update navigation buttons
            document.getElementById('prevBtn').disabled = currentSlideIndex === 0;
            document.getElementById('prevBtn').setAttribute('aria-disabled', currentSlideIndex === 0);

            document.getElementById('nextBtn').disabled = currentSlideIndex === totalSlides - 1;
            document.getElementById('nextBtn').setAttribute('aria-disabled', currentSlideIndex === totalSlides - 1);

            // Announce to screen readers
            announceToScreenReader(`Slide ${currentSlideIndex + 1} of ${totalSlides}`);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                announceToScreenReader('Entered fullscreen mode');
            } else {
                document.exitFullscreen();
                announceToScreenReader('Exited fullscreen mode');
            }
        }

        // Screen reader announcements
        function announceToScreenReader(message) {
            const announcement = document.createElement('div');
            announcement.setAttribute('role', 'status');
            announcement.setAttribute('aria-live', 'polite');
            announcement.setAttribute('aria-atomic', 'true');
            announcement.className = 'sr-only';
            announcement.textContent = message;
            document.body.appendChild(announcement);
            setTimeout(() => document.body.removeChild(announcement), 1000);
        }

        // Initialize UI
        updateUI();
    </script>
</body>
</html>
