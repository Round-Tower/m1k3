<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{QUIZ_TITLE}}</title>
    <style>
        /* Quiz Template CSS - M1K3 Canvas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .quiz-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            width: 0%;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-number {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .question-text {
            color: #333;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateX(4px);
        }

        .option input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
        }

        .option input[type="radio"]:checked::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
        }

        .option-text {
            flex: 1;
            color: #333;
            font-size: 16px;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .feedback {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            display: none;
        }

        .feedback.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .feedback.correct {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            display: none;
            text-align: center;
        }

        .results.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        .score-display {
            font-size: 64px;
            font-weight: 700;
            color: #667eea;
            margin: 20px 0;
        }

        .score-message {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 24px;
            }

            .quiz-header h1 {
                font-size: 24px;
            }

            .question-text {
                font-size: 18px;
            }

            .option {
                padding: 12px 16px;
            }

            .score-display {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>{{QUIZ_TITLE}}</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
        </div>

        <!-- Questions will be displayed here -->
        <div id="quizContent"></div>

        <!-- Results screen -->
        <div class="results" id="results">
            <h2>Quiz Complete!</h2>
            <div class="score-display" id="scoreDisplay"></div>
            <p class="score-message" id="scoreMessage"></p>
            <button class="btn btn-primary" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>

    <script>
        // Quiz Template JavaScript - M1K3 Canvas

        // ===== AI FILLS THIS SECTION =====
        const quizData = [
            {{QUESTIONS}}
        ];
        // ===== END AI SECTION =====

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;

        function loadQuestion() {
            const question = quizData[currentQuestion];
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            const html = `
                <div class="question-container">
                    <div class="question-number">Question ${currentQuestion + 1} of ${quizData.length}</div>
                    <div class="question-text">${question.question}</div>
                    <div class="options">
                        ${question.options.map((option, index) => `
                            <label class="option" data-index="${index}">
                                <input type="radio" name="answer" value="${index}"
                                       onchange="selectAnswer(${index})">
                                <span class="option-text">${option}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback"></div>
                </div>
                <div class="navigation">
                    <button class="btn btn-secondary" onclick="previousQuestion()"
                            ${currentQuestion === 0 ? 'disabled' : ''}>
                        Previous
                    </button>
                    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>
                        ${currentQuestion === quizData.length - 1 ? 'Finish' : 'Next'}
                    </button>
                </div>
            `;

            document.getElementById('quizContent').innerHTML = html;
        }

        function selectAnswer(index) {
            selectedAnswer = index;
            document.getElementById('submitBtn').disabled = false;
        }

        function submitAnswer() {
            if (selectedAnswer === null) return;

            const question = quizData[currentQuestion];
            const isCorrect = selectedAnswer === question.correctAnswer;

            if (isCorrect) {
                score++;
            }

            // Show feedback
            const options = document.querySelectorAll('.option');
            options[question.correctAnswer].classList.add('correct');
            if (!isCorrect) {
                options[selectedAnswer].classList.add('incorrect');
            }

            const feedback = document.getElementById('feedback');
            feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
            feedback.textContent = isCorrect ? question.correctFeedback : question.incorrectFeedback;

            // Disable further selection
            document.querySelectorAll('input[type="radio"]').forEach(input => {
                input.disabled = true;
            });

            // Change button to Next/Finish
            document.getElementById('submitBtn').textContent =
                currentQuestion === quizData.length - 1 ? 'View Results' : 'Next Question';
            document.getElementById('submitBtn').onclick = nextQuestion;
        }

        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                selectedAnswer = null;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                selectedAnswer = null;
                loadQuestion();
            }
        }

        function showResults() {
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('results').classList.add('show');
            document.getElementById('scoreDisplay').textContent = `${score}/${quizData.length}`;

            let message = '';
            if (percentage === 100) {
                message = '🎉 Perfect Score! Outstanding!';
            } else if (percentage >= 80) {
                message = '🌟 Excellent! Great job!';
            } else if (percentage >= 60) {
                message = '👍 Good work! Keep learning!';
            } else {
                message = '💪 Keep practicing! You\'ll improve!';
            }
            document.getElementById('scoreMessage').textContent = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            selectedAnswer = null;
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('results').classList.remove('show');
            loadQuestion();
        }

        // Initialize quiz
        loadQuestion();
    </script>
</body>
</html>
