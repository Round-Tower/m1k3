<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>間 Globe</title>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #map { width: 100%; height: 100%; background: #000000; overflow: hidden; }
  .maplibregl-ctrl-bottom-left,
  .maplibregl-ctrl-bottom-right,
  .maplibregl-ctrl-top-left,
  .maplibregl-ctrl-top-right { display: none !important; }
</style>
</head>
<body>
<div id="map"></div>
<script>
// ─────────────────────────────────────────────
// 間 AI — MapLibre Globe Background
// Ma design system: AMOLED black + orange accents
// ─────────────────────────────────────────────

const MA_ORANGE    = '#D97706';
const MA_ORANGE_DIM = '#7A4400';
const MA_WATER     = '#050505';
const MA_LAND      = '#141414';
const MA_LAND_DARK = '#0a0a0a';
const MA_BORDERS   = '#2a2a2a';
const MA_LABELS    = '#3a3a3a';

// 20 curated locations — the same as GlobeLocation.kt
const LOCATIONS = [
  { name: 'Tokyo',             lat: 35.6762, lon: 139.6503 },
  { name: 'Reykjavik',         lat: 64.1466, lon: -21.9426 },
  { name: 'Machu Picchu',      lat: -13.163, lon: -72.5450 },
  { name: 'Patagonia',         lat: -50.942, lon: -73.4068 },
  { name: 'Kyoto',             lat: 35.0116, lon: 135.7681 },
  { name: 'Svalbard',          lat: 78.2232, lon: 15.6469  },
  { name: 'Atacama',           lat: -24.500, lon: -69.2000 },
  { name: 'Norwegian Fjords',  lat: 61.2000, lon: 6.80000  },
  { name: 'Amazon',            lat: -3.4000, lon: -62.2000 },
  { name: 'Sahara',            lat: 23.4000, lon: 25.6000  },
  { name: 'Siberia',           lat: 62.0000, lon: 100.5000 },
  { name: 'New Zealand',       lat: -44.000, lon: 170.5000 },
  { name: 'Iceland',           lat: 65.0000, lon: -18.0000 },
  { name: 'Himalayas',         lat: 28.0000, lon: 84.5000  },
  { name: 'Great Barrier Reef',lat: -18.300, lon: 147.7000 },
  { name: 'Scottish Highlands',lat: 57.1000, lon: -4.70000 },
  { name: 'Serengeti',         lat: -2.3000, lon: 34.8000  },
  { name: 'Galapagos',         lat: -0.9000, lon: -89.6000 },
  { name: 'Faroe Islands',     lat: 61.9000, lon: -6.90000 },
  { name: 'Borneo',            lat: 1.00000, lon: 114.0000 }
];

// Ma dark map style — no labels, minimal land/water contrast
const MA_STYLE = {
  version: 8,
  glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
  sources: {
    'osm': {
      type: 'raster',
      tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
      tileSize: 256,
      attribution: '© OpenStreetMap contributors',
      maxzoom: 3
    },
    'natural-earth': {
      type: 'geojson',
      data: 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_land.geojson'
    }
  },
  layers: [
    // Ocean
    { id: 'background', type: 'background', paint: { 'background-color': MA_WATER } },
    // Land — very dark, barely visible
    {
      id: 'land',
      type: 'fill',
      source: 'natural-earth',
      paint: {
        'fill-color': MA_LAND,
        'fill-opacity': 0.95
      }
    },
    // Land outline — subtle orange glow
    {
      id: 'land-outline',
      type: 'line',
      source: 'natural-earth',
      paint: {
        'line-color': MA_ORANGE_DIM,
        'line-width': 0.4,
        'line-opacity': 0.5
      }
    }
  ]
};

// Darker offline-friendly alternative using demotiles
const MA_STYLE_OFFLINE = {
  version: 8,
  sources: {
    'demotiles': {
      type: 'vector',
      url: 'https://demotiles.maplibre.org/tiles/tiles.json'
    }
  },
  layers: [
    { id: 'background', type: 'background', paint: { 'background-color': MA_WATER } },
    {
      id: 'land',
      type: 'fill',
      source: 'demotiles',
      'source-layer': 'land',
      paint: { 'fill-color': MA_LAND }
    },
    {
      id: 'coastline',
      type: 'line',
      source: 'demotiles',
      'source-layer': 'coastline',
      paint: { 'line-color': MA_ORANGE_DIM, 'line-width': 0.5, 'line-opacity': 0.6 }
    },
    {
      id: 'countries',
      type: 'line',
      source: 'demotiles',
      'source-layer': 'countries',
      paint: { 'line-color': MA_BORDERS, 'line-width': 0.3, 'line-opacity': 0.4 }
    }
  ]
};

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
let map;
let locationIndex = 0;
let flyTimer = null;
let userLocation = null;

function init() {
  map = new maplibregl.Map({
    container: 'map',
    style: MA_STYLE_OFFLINE,
    center: [LOCATIONS[0].lon, LOCATIONS[0].lat],
    zoom: 1.5,
    projection: { type: 'globe' },
    interactive: false,         // No user interaction — it's a background
    attributionControl: false,
    pitchWithRotate: false,
    dragRotate: false,
    touchZoomRotate: false,
    fadeDuration: 0
  });

  // Subtle continuous slow rotation
  map.on('load', () => {
    startSlowRotation();
    scheduleFlyTo();
  });
}

// Slow east→west drift
let rotationFrame;
let rotAngle = 0;
function startSlowRotation() {
  function rotate() {
    rotAngle = (rotAngle + 0.008) % 360;
    if (map && !map._flying) {
      map.setCenter([LOCATIONS[locationIndex].lon + rotAngle, map.getCenter().lat]);
    }
    rotationFrame = requestAnimationFrame(rotate);
  }
  rotate();
}

// Fly to a new location every 28 seconds
function scheduleFlyTo() {
  flyTimer = setInterval(() => {
    locationIndex = (locationIndex + 1) % LOCATIONS.length;
    const loc = LOCATIONS[locationIndex];
    flyTo(loc.lon, loc.lat);
  }, 28000);
}

function flyTo(lon, lat) {
  if (!map) return;
  rotAngle = 0;
  map._flying = true;
  map.flyTo({
    center: [lon, lat],
    zoom: 1.6,
    duration: 6000,
    easing: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
    essential: true
  });
  setTimeout(() => { if (map) map._flying = false; }, 6500);
}

// ─────────────────────────────────────────────
// Android bridge — called from Kotlin
// ─────────────────────────────────────────────
window.GlobeBridge = {
  // Fly to specific lat/lon (curated or real location)
  flyToLocation: function(lat, lon) {
    locationIndex = -1;
    clearInterval(flyTimer);
    flyTo(lon, lat);
    // Resume auto-cycling after the fly
    setTimeout(scheduleFlyTo, 10000);
  },

  // Set overall opacity (dim during AI generation)
  setAlpha: function(alpha) {
    document.getElementById('map').style.opacity = alpha;
  },

  // Resume auto-cycling
  resumeCycle: function() {
    clearInterval(flyTimer);
    scheduleFlyTo();
  }
};

init();
</script>
</body>
</html>
