<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView Test</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
        }
        .test { margin: 10px 0; }
        .pass { color: #0f0; }
        .fail { color: #f00; }
    </style>
</head>
<body>
    <h1>M1K3 WebView Diagnostics</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function addResult(test, passed, details = '') {
            const div = document.createElement('div');
            div.className = `test ${passed ? 'pass' : 'fail'}`;
            div.textContent = `${passed ? '✓' : '✗'} ${test} ${details}`;
            results.appendChild(div);
        }

        // Test 1: JavaScript execution
        addResult('JavaScript execution', true);

        // Test 2: File access
        fetch('./assets/main-Bsu2MK1D.css')
            .then(r => addResult('CSS file accessible', r.ok, `(${r.status})`))
            .catch(e => addResult('CSS file accessible', false, e.message));

        // Test 3: Module loading
        import('./assets/main-CTeIOB6j.js')
            .then(() => addResult('JavaScript module loads', true))
            .catch(e => addResult('JavaScript module loads', false, e.message));

        // Test 4: Model file access
        fetch('./models/Colobus_Animations.glb')
            .then(r => addResult('Model file accessible', r.ok, `(${r.status})`))
            .catch(e => addResult('Model file accessible', false, e.message));

        // Test 5: THREE.js availability
        setTimeout(() => {
            addResult('THREE.js loaded', typeof window.THREE !== 'undefined',
                      typeof window.THREE !== 'undefined' ? `v${window.THREE.REVISION}` : '');
        }, 1000);

        // Test 6: Renderer available
        setTimeout(() => {
            addResult('Renderer available', typeof window.renderer !== 'undefined');
        }, 1500);
    </script>
</body>
</html>
