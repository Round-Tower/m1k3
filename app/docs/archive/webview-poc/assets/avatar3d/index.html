<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>間 AI - 3D Avatar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none; /* Prevent default touch behaviors */
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #avatar-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #E25303;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            z-index: 10;
        }

        #fps-counter {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #E25303;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            z-index: 5;
        }

        #debug-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            z-index: 5;
            max-width: 200px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="avatar-canvas"></canvas>
        <div id="loading">
            Loading 3D Avatar...<br>
            <small>Initializing WebGL</small>
        </div>
        <div id="fps-counter" class="hidden">FPS: --</div>
        <div id="debug-info" class="hidden">
            Renderer: --<br>
            WebGL: --<br>
            Device: --
        </div>
    </div>

    <!-- Three.js Core -->
    <script src="js/three.min.js"></script>
    <!-- Three.js Loaders and Controls (UMD format for WebView compatibility) -->
    <script src="js/GLTFLoader.js"></script>
    <script src="js/OrbitControls.js"></script>

    <script>
        // Use global THREE object (no ES6 imports)

        // ===========================
        // GLOBAL STATE
        // ===========================

        let scene, camera, renderer, controls;
        let currentModel = null;
        let mixer = null;
        let clock = new THREE.Clock();
        let currentEmotion = 'neutral';
        let currentActivity = 'IDLE';
        let lastBlinkTime = 0;
        let nextBlinkDelay = 3000; // Random 2-5 seconds

        // FPS tracking
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 0;

        // ===========================
        // INITIALIZATION
        // ===========================

        function init() {
            const canvas = document.getElementById('avatar-canvas');
            const container = document.getElementById('canvas-container');
            const loading = document.getElementById('loading');
            const fpsCounter = document.getElementById('fps-counter');
            const debugInfo = document.getElementById('debug-info');

            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            scene.fog = new THREE.Fog(0x1a1a1a, 10, 50);

            // Camera setup (perspective for 3D depth)
            const aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 1000);
            camera.position.set(0, 1.5, 4);
            camera.lookAt(0, 1, 0);

            // Renderer setup (optimized for mobile)
            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: false, // Disable for better mobile performance
                alpha: false,
                powerPreference: "high-performance"
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap at 2x
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // Orbit controls (touch-enabled)
            controls = new THREE.OrbitControls(camera, canvas);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 2;
            controls.maxDistance = 10;
            controls.maxPolarAngle = Math.PI / 2 + 0.2;
            controls.target.set(0, 1, 0);
            controls.update();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7.5);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.left = -10;
            directionalLight.shadow.camera.right = 10;
            directionalLight.shadow.camera.top = 10;
            directionalLight.shadow.camera.bottom = -10;
            scene.add(directionalLight);

            const fillLight = new THREE.DirectionalLight(0xE25303, 0.3);
            fillLight.position.set(-5, 5, -5);
            scene.add(fillLight);

            // Ground plane
            const groundGeometry = new THREE.PlaneGeometry(20, 20);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x2d2d2d,
                roughness: 0.8,
                metalness: 0.2
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Create initial placeholder (spinning cube)
            createPlaceholderCube();

            // Handle window resize
            window.addEventListener('resize', onWindowResize, false);

            // WebGL info for debug
            const gl = renderer.getContext();
            const debugRenderer = gl.getParameter(gl.RENDERER);
            const debugVendor = gl.getParameter(gl.VENDOR);
            const webglVersion = gl instanceof WebGL2RenderingContext ? '2.0' : '1.0';

            debugInfo.innerHTML = `
                Renderer: ${debugRenderer}<br>
                WebGL: ${webglVersion}<br>
                Device: ${navigator.userAgent.includes('Mobile') ? 'Mobile' : 'Desktop'}
            `;
            debugInfo.classList.remove('hidden');

            // Hide loading, show FPS
            loading.classList.add('hidden');
            fpsCounter.classList.remove('hidden');

            console.log('[間 AI 3D] WebGL initialized successfully');
            console.log(`[間 AI 3D] Renderer: ${debugRenderer}`);
            console.log(`[間 AI 3D] WebGL Version: ${webglVersion}`);

            // Start animation loop
            animate();
        }

        // ===========================
        // PLACEHOLDER GEOMETRY
        // ===========================

        function createPlaceholderCube() {
            const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const material = new THREE.MeshStandardMaterial({
                color: 0xE25303,
                roughness: 0.4,
                metalness: 0.6,
                emissive: 0xE25303,
                emissiveIntensity: 0.2
            });

            currentModel = new THREE.Mesh(geometry, material);
            currentModel.position.set(0, 1.5, 0);
            currentModel.castShadow = true;
            currentModel.receiveShadow = true;
            scene.add(currentModel);

            console.log('[間 AI 3D] Placeholder cube created');
        }

        // ===========================
        // MINIMAL MORPH TEST (DIAGNOSTIC)
        // ===========================

        /**
         * Creates a minimal test cube with one morph target to diagnose if morphs work at all.
         * This is a critical diagnostic tool to determine if the issue is:
         *   - Three.js/WebView configuration (cube doesn't animate)
         *   - Complex GLB model structure (cube animates but real models don't)
         */
        window.testMinimalMorph = function() {
            console.log('[間 AI 3D] 🧪 Creating minimal morph test cube...');

            // Remove existing model
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }

            // Stop any existing test animation
            if (window.morphTestInterval) {
                clearInterval(window.morphTestInterval);
            }

            // Create test cube geometry (1x1x1 box)
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const positions = geometry.attributes.position.array;

            // Clone positions for morph target (stretch top vertices)
            const morphPositions = new Float32Array(positions.length);
            morphPositions.set(positions);

            // Stretch top 4 vertices in Y-axis (2x height)
            // BoxGeometry vertex indices for top face: 1, 13, 25, 37 (Y component)
            [1, 13, 25, 37].forEach(i => morphPositions[i] *= 2);

            // Add morph target to geometry
            geometry.morphAttributes.position = [
                new THREE.BufferAttribute(morphPositions, 3)
            ];

            // Create material (morphTargets: true required for Three.js r128)
            const material = new THREE.MeshStandardMaterial({
                color: 0xff0000,
                morphTargets: true,  // CRITICAL for r128
                side: THREE.FrontSide
            });

            // Create mesh with morph target
            currentModel = new THREE.Mesh(geometry, material);
            currentModel.position.set(0, 1, 0);
            currentModel.castShadow = true;
            currentModel.receiveShadow = true;
            currentModel.morphTargetInfluences = [0]; // Start at 0% morph

            scene.add(currentModel);

            console.log('[間 AI 3D] ✅ Test cube created');
            console.log('[間 AI 3D] 📊 Morph targets:', currentModel.geometry.morphAttributes.position ? currentModel.geometry.morphAttributes.position.length : 0);
            console.log('[間 AI 3D] 📊 Initial influence:', currentModel.morphTargetInfluences[0]);
            console.log('[間 AI 3D] 📺 WATCH: Cube should stretch/shrink vertically');

            // Animate morph: 0 → 1 → 0 over 2 seconds (repeating)
            let startTime = Date.now();
            const animateMorph = () => {
                const elapsed = Date.now() - startTime;
                const cycle = (elapsed % 2000) / 2000; // 0 to 1
                const morph = Math.abs(cycle * 2 - 1); // 0 → 1 → 0

                if (currentModel && currentModel.morphTargetInfluences) {
                    currentModel.morphTargetInfluences[0] = morph;

                    // Log every 30 frames (~2Hz)
                    if (Math.random() < 0.033) {
                        console.log('[間 AI 3D] 📊 Morph influence:', morph.toFixed(3));
                    }
                }
            };

            // Run animation loop at ~60fps
            window.morphTestInterval = setInterval(animateMorph, 16);

            console.log('[間 AI 3D] 🎬 Animation started');
            console.log('[間 AI 3D] ');
            console.log('[間 AI 3D] ===== DIAGNOSTIC INTERPRETATION =====');
            console.log('[間 AI 3D] ✅ IF cube stretches/shrinks: Morphs work! Problem is GLB export.');
            console.log('[間 AI 3D] ❌ IF cube stays same size: Three.js or WebView issue.');
            console.log('[間 AI 3D] =====================================');
        };

        /**
         * Stop the minimal morph test animation
         */
        window.stopMinimalMorphTest = function() {
            if (window.morphTestInterval) {
                clearInterval(window.morphTestInterval);
                console.log('[間 AI 3D] ⏹️  Test stopped');
            }
        };

        /**
         * Manual morph test on current model
         * Tests if morphs are actually rendering by setting eyes.happy to 100%
         */
        window.testCurrentModelMorph = function(scale = 1.0) {
            if (!window.meshesWithMorphs || window.meshesWithMorphs.length === 0) {
                console.log('[間 AI 3D] ❌ No meshes with morph targets found');
                return;
            }

            console.log('[間 AI 3D] 🧪 Testing morph on current model (scale:', scale, ')...');

            window.meshesWithMorphs.forEach(mesh => {
                const morphDict = mesh.morphTargetDictionary;
                const influences = mesh.morphTargetInfluences;

                console.log('[間 AI 3D] 📊 Mesh:', mesh.name || 'unnamed');
                console.log('[間 AI 3D] 📊 Material.morphTargets:', mesh.material.morphTargets);
                console.log('[間 AI 3D] 📊 Morph count:', Object.keys(morphDict).length);

                // Test eyes.happy
                const happyIdx = morphDict['eyes.happy'];
                if (happyIdx !== undefined) {
                    const before = influences[happyIdx];
                    influences[happyIdx] = 1.0 * scale;
                    console.log('[間 AI 3D] 😊 Set eyes.happy:', before, '→', 1.0 * scale);
                } else {
                    console.log('[間 AI 3D] ⚠️  eyes.happy not found');
                }

                // Test eyes.blink
                const blinkIdx = morphDict['eyes.blink'];
                if (blinkIdx !== undefined) {
                    const before = influences[blinkIdx];
                    influences[blinkIdx] = 0.5 * scale;
                    console.log('[間 AI 3D] 👁️  Set eyes.blink:', before, '→', 0.5 * scale);
                } else {
                    console.log('[間 AI 3D] ⚠️  eyes.blink not found');
                }

                // Log first morph target data for debugging
                if (mesh.geometry.morphAttributes.position && mesh.geometry.morphAttributes.position.length > 0) {
                    const firstMorphData = mesh.geometry.morphAttributes.position[0];
                    const basePos = mesh.geometry.attributes.position;
                    console.log('[間 AI 3D] 🔍 Base position count:', basePos.count);
                    console.log('[間 AI 3D] 🔍 Morph position count:', firstMorphData.count);
                    console.log('[間 AI 3D] 🔍 First base vertex:', basePos.array[0], basePos.array[1], basePos.array[2]);
                    console.log('[間 AI 3D] 🔍 First morph vertex:', firstMorphData.array[0], firstMorphData.array[1], firstMorphData.array[2]);
                }
            });

            console.log('[間 AI 3D] ✅ Morph test complete - check if eyes changed!');
            console.log('[間 AI 3D] 💡 Try: window.testCurrentModelMorph(0.1) for 10% strength');
        };

        // ===========================
        // WINDOW RESIZE
        // ===========================

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            const aspect = container.clientWidth / container.clientHeight;

            camera.aspect = aspect;
            camera.updateProjectionMatrix();

            renderer.setSize(container.clientWidth, container.clientHeight);

            console.log('[間 AI 3D] Resized to:', container.clientWidth, 'x', container.clientHeight);
        }

        // ===========================
        // ANIMATION LOOP
        // ===========================

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Update mixer for skeletal animations (if loaded)
            if (mixer) {
                mixer.update(delta);
            }

            // Rotate placeholder cube (only if it's a mesh with BoxGeometry)
            if (currentModel && currentModel.geometry && currentModel.geometry.type === 'BoxGeometry') {
                currentModel.rotation.y += delta * 0.5;
                currentModel.rotation.x = Math.sin(Date.now() * 0.001) * 0.2;
            }

            // Automatic eye blink animation for models with morphs
            if (window.meshesWithMorphs && window.meshesWithMorphs.length > 0) {
                const now = Date.now();
                if (now - lastBlinkTime > nextBlinkDelay) {
                    // Perform blink
                    window.meshesWithMorphs.forEach(mesh => {
                        const blinkIndex = mesh.morphTargetDictionary['eyes.blink'];
                        if (blinkIndex !== undefined) {
                            // Quick blink: 0 -> 1 -> 0 over 200ms
                            const blinkDuration = 200;
                            const progress = Math.min((now - lastBlinkTime - nextBlinkDelay) / blinkDuration, 1);
                            if (progress < 0.5) {
                                mesh.morphTargetInfluences[blinkIndex] = progress * 2;  // 0 -> 1
                            } else if (progress < 1.0) {
                                mesh.morphTargetInfluences[blinkIndex] = 2 - (progress * 2);  // 1 -> 0
                            } else {
                                mesh.morphTargetInfluences[blinkIndex] = 0;
                                lastBlinkTime = now;
                                nextBlinkDelay = 2000 + Math.random() * 3000;  // Random 2-5 seconds
                            }
                        }
                    });
                }
            }

            // Activity-based continuous morph animations
            // These create dynamic movement for different avatar states
            if (window.meshesWithMorphs && window.meshesWithMorphs.length > 0 && currentActivity) {
                const now = Date.now();

                window.meshesWithMorphs.forEach(mesh => {
                    // THINKING: Slow contemplative eye drift
                    if (currentActivity === 'THINKING') {
                        const lookUpIdx = mesh.morphTargetDictionary['eyes.lookUp'];
                        if (lookUpIdx !== undefined) {
                            // Sine wave: 0.3 → 0.9 over 2 seconds
                            const phase = (now % 2000) / 2000 * Math.PI * 2;
                            mesh.morphTargetInfluences[lookUpIdx] = 0.6 + Math.sin(phase) * 0.3;
                        }
                    }

                    // GENERATING: Fast pulsing excited state
                    if (currentActivity === 'GENERATING') {
                        const excitedIdx = mesh.morphTargetDictionary['eyes.excited-1'];
                        if (excitedIdx !== undefined) {
                            // Fast pulse: 0.2 → 0.8 over 0.5 seconds
                            const phase = (now % 500) / 500 * Math.PI * 2;
                            mesh.morphTargetInfluences[excitedIdx] = 0.5 + Math.sin(phase) * 0.3;
                        }
                    }

                    // ERROR: Shake/trauma effect
                    if (currentActivity === 'ERROR') {
                        const traumaIdx = mesh.morphTargetDictionary['eyes.trauma'];
                        if (traumaIdx !== undefined) {
                            // Random jitter: 0.8 → 1.0
                            mesh.morphTargetInfluences[traumaIdx] = 0.9 + Math.random() * 0.1;
                        }
                    }
                });
            }

            // Update controls
            controls.update();

            // Render scene
            renderer.render(scene, camera);

            // Update FPS counter
            frameCount++;
            const currentTime = performance.now();
            if (currentTime >= lastTime + 1000) {
                fps = Math.round((frameCount * 1000) / (currentTime - lastTime));
                document.getElementById('fps-counter').textContent = `FPS: ${fps}`;
                frameCount = 0;
                lastTime = currentTime;
            }
        }

        // ===========================
        // PUBLIC API (for Kotlin bridge)
        // ===========================

        // Update avatar state from Kotlin
        window.updateAvatarState = function(stateJson) {
            try {
                const state = JSON.parse(stateJson);
                currentEmotion = state.emotion || 'neutral';
                currentActivity = state.activity || 'IDLE';

                console.log('[間 AI 3D] State updated:', state);

                // NEW: Play skeletal animation based on activity (prioritize) or emotion
                const animName = ACTIVITY_ANIMATION_MAP[currentActivity] ||
                                 EMOTION_ANIMATION_MAP[currentEmotion.toLowerCase()] ||
                                 'Idle_A';  // Fallback

                if (playAnimationByName(animName)) {
                    console.log('[間 AI 3D] 🎬 Activity:', currentActivity, '→ Animation:', animName);
                } else {
                    console.log('[間 AI 3D] ⚠️  Failed to play animation:', animName);
                }

                // Update visual representation (emissive color only)
                updateAvatarVisuals(state);
            } catch (error) {
                console.error('[間 AI 3D] Failed to parse state:', error);
            }
        };

        // Load GLB model from assets
        window.loadGLBModel = function(modelPath) {
            const loader = new THREE.GLTFLoader();
            const loading = document.getElementById('loading');

            loading.classList.remove('hidden');
            loading.innerHTML = 'Loading 3D Model...<br><small>Please wait</small>';

            loader.load(
                modelPath,
                (gltf) => {
                    // Remove existing model and properly dispose resources
                    if (currentModel) {
                        scene.remove(currentModel);

                        // Dispose geometry and materials to prevent memory leaks and duplicate rendering
                        currentModel.traverse((child) => {
                            if (child.isMesh) {
                                if (child.geometry) child.geometry.dispose();
                                if (child.material) {
                                    if (Array.isArray(child.material)) {
                                        child.material.forEach(mat => mat.dispose());
                                    } else {
                                        child.material.dispose();
                                    }
                                }
                            }
                        });

                        console.log('[間 AI 3D] Previous model disposed and removed');
                    }

                    currentModel = gltf.scene;

                    // Model is exported with export_yup=True, so it's already in Y-up (glTF standard)
                    // No rotation needed - Three.js uses Y-up natively
                    console.log('[間 AI 3D] ✅ Model loaded in Y-up coordinate system (glTF standard)');

                    // Calculate bounding box
                    const box = new THREE.Box3().setFromObject(currentModel);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());

                    // Center the model horizontally (X/Z) but keep it above the floor
                    currentModel.position.x = -center.x;
                    currentModel.position.z = -center.z;

                    // Position model slightly above floor to prevent z-fighting
                    // FIX: Add 5mm clearance to prevent back-faces from rendering below ground
                    currentModel.position.y = -box.min.y + 0.005;

                    // Scale to fit in view (max dimension = 2 units)
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 2.0 / maxDim;
                    currentModel.scale.setScalar(scale);

                    console.log('[間 AI 3D] Model bounds:', size, 'scale:', scale, 'floor Y:', box.min.y);

                    // Enable shadows, morphs, and force single-sided rendering
                    let morphMaterialsEnabled = 0;
                    currentModel.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;

                            // FIX: Force single-sided rendering to prevent z-fighting
                            // GLB materials have doubleSided=true which causes morph distortion
                            if (child.material) {
                                child.material.side = THREE.FrontSide;

                                // CRITICAL FIX: Enable morphTargets on material (required for Three.js r128)
                                // Without this, morph target rendering is completely broken!
                                if (child.morphTargetDictionary && Object.keys(child.morphTargetDictionary).length > 0) {
                                    const hadMorphTargets = child.material.morphTargets;
                                    const hadMorphNormals = child.material.morphNormals;

                                    child.material.morphTargets = true;

                                    // EXPERIMENT: Try WITHOUT morphNormals to see if stretching goes away
                                    // The normals exist but may be causing distortion
                                    child.material.morphNormals = false;
                                    morphMaterialsEnabled++;

                                    console.log('[間 AI 3D] 🔧 Material morphTargets:', hadMorphTargets, '→ true');
                                    console.log('[間 AI 3D] 🔧 Material morphNormals:', hadMorphNormals, '→ false (testing without)');

                                    // Check if normals exist in morph data
                                    if (child.geometry.morphAttributes.normal) {
                                        console.log('[間 AI 3D] ✅ Morph normals exist but disabled for testing');
                                    } else {
                                        console.log('[間 AI 3D] ⚠️  No morph normals in geometry');
                                    }
                                }

                                child.material.needsUpdate = true;
                            }
                        }
                    });
                    if (morphMaterialsEnabled > 0) {
                        console.log('[間 AI 3D] ✅ Enabled morphTargets on', morphMaterialsEnabled, 'material(s)');
                    }

                    scene.add(currentModel);

                    // Setup animation mixer
                    if (gltf.animations && gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(currentModel);

                        // Play first idle animation by default
                        const idleAnim = gltf.animations.find(clip =>
                            clip.name.toLowerCase().includes('idle')
                        );

                        if (idleAnim) {
                            // Clone animation to avoid modifying original
                            const clonedClip = idleAnim.clone();

                            // Remove morph target tracks to prevent flashing/pulsing
                            clonedClip.tracks = clonedClip.tracks.filter(track => {
                                // Keep only bone/position/rotation/scale tracks, remove .morphTargetInfluences
                                return !track.name.includes('.morphTargetInfluences');
                            });

                            console.log('[間 AI 3D] Removed', idleAnim.tracks.length - clonedClip.tracks.length, 'morph tracks');
                            console.log('[間 AI 3D] Kept', clonedClip.tracks.length, 'skeletal tracks');

                            const action = mixer.clipAction(clonedClip);
                            action.setLoop(THREE.LoopRepeat, Infinity);  // Loop forever
                            action.play();
                            console.log('[間 AI 3D] Playing animation (looped):', idleAnim.name);
                        }

                        console.log('[間 AI 3D] Loaded animations:', gltf.animations.map(a => a.name));
                    }

                    // Check for morph targets (shape keys)
                    let totalMorphs = 0;
                    currentModel.traverse((child) => {
                        if (child.isMesh && child.morphTargetDictionary) {
                            const morphNames = Object.keys(child.morphTargetDictionary);
                            totalMorphs += morphNames.length;
                            console.log('[間 AI 3D] ✅ Morph targets found:', morphNames.length);
                            console.log('[間 AI 3D] 📝 Names:', morphNames.join(', '));

                            // Log any non-zero default morph values (diagnostic)
                            console.log('[間 AI 3D] 🔍 Checking default morph values...');
                            let nonZeroCount = 0;
                            morphNames.forEach(morphName => {
                                const idx = child.morphTargetDictionary[morphName];
                                const value = child.morphTargetInfluences[idx];
                                if (value !== 0) {
                                    console.log(`[間 AI 3D] ⚠️  ${morphName} = ${value.toFixed(3)} (non-zero default!)`);
                                    nonZeroCount++;
                                }
                            });
                            if (nonZeroCount === 0) {
                                console.log('[間 AI 3D] ✅ All morphs at 0.0 (default state)');
                            }

                            // Store reference for morph animation
                            if (!window.meshesWithMorphs) window.meshesWithMorphs = [];
                            window.meshesWithMorphs.push(child);
                        }
                    });

                    if (totalMorphs > 0) {
                        console.log('[間 AI 3D] 🎉 TOTAL MORPH TARGETS:', totalMorphs);

                        // Force eye visibility morphs to safe defaults
                        // This ensures eyes are visible regardless of Blender export defaults
                        window.meshesWithMorphs.forEach(mesh => {
                            // Force eyes OPEN (blink = 0)
                            const blinkIdx = mesh.morphTargetDictionary['eyes.blink'];
                            if (blinkIdx !== undefined) {
                                mesh.morphTargetInfluences[blinkIdx] = 0.0;
                                console.log('[間 AI 3D] 👁️  Set eyes.blink = 0 (eyes open)');
                            }

                            // Force eyes ALIVE (dead = 0)
                            const deadIdx = mesh.morphTargetDictionary['eyes.dead'];
                            if (deadIdx !== undefined) {
                                mesh.morphTargetInfluences[deadIdx] = 0.0;
                                console.log('[間 AI 3D] 💚 Set eyes.dead = 0 (eyes alive)');
                            }

                            // Force eyes NORMAL SIZE (shrink = 0)
                            const shrinkIdx = mesh.morphTargetDictionary['eyes.shrink'];
                            if (shrinkIdx !== undefined) {
                                mesh.morphTargetInfluences[shrinkIdx] = 0.0;
                                console.log('[間 AI 3D] 📏 Set eyes.shrink = 0 (normal size)');
                            }
                        });

                        console.log('[間 AI 3D] ✅ Eye visibility morphs initialized');
                    } else {
                        console.log('[間 AI 3D] ⚠️  No morph targets found in model');
                    }

                    loading.classList.add('hidden');
                    console.log('[間 AI 3D] Model loaded successfully:', modelPath);
                },
                (progress) => {
                    const percent = Math.round((progress.loaded / progress.total) * 100);
                    loading.innerHTML = `Loading 3D Model...<br><small>${percent}%</small>`;
                },
                (error) => {
                    loading.innerHTML = 'Failed to load model<br><small>Check console</small>';
                    console.error('[間 AI 3D] Model load error:', error);
                }
            );
        };

        // Get current FPS (for Kotlin to read)
        window.getCurrentFPS = function() {
            return fps;
        };

        // ====================================================================================
        // SKELETAL ANIMATION CONTROL API (Matches Filament implementation)
        // ====================================================================================

        // Activity → Animation mapping (same as Avatar3DEngine.kt)
        const ACTIVITY_ANIMATION_MAP = {
            'LISTENING': 'Idle_A',      // Calm listening pose
            'THINKING': 'Spin',         // Contemplative spin
            'GENERATING': 'Run',        // Active generation
            'SPEAKING': 'Clicked',      // Talking animation
            'ERROR': 'Death',           // Error state
            'IDLE': 'Idle_C'           // Default resting state
        };

        // Emotion → Animation mapping (same as Avatar3DEngine.kt)
        const EMOTION_ANIMATION_MAP = {
            'happy': 'Idle_B',          // Happy idle
            'sad': 'Sit',               // Sad sitting
            'excited': 'Bounce',        // Energetic bounce
            'angry': 'Attack',          // Aggressive attack
            'surprised': 'Jump',        // Startled jump
            'love': 'Idle_B',           // Happy idle
            'thinking': 'Spin',         // Contemplative
            'sleepy': 'Sit',            // Tired sitting
            'neutral': 'Idle_A'         // Neutral stance
        };

        // Play animation by name (case-insensitive fuzzy match)
        window.playAnimationByName = function(animName, loop = true) {
            if (!mixer || !currentModel) {
                console.log('[間 AI 3D] ⚠️  No mixer/model - cannot play animation');
                return false;
            }

            // Find animation (case-insensitive partial match)
            const allAnims = mixer._root.animations || [];
            const anim = allAnims.find(clip =>
                clip.name.toLowerCase().includes(animName.toLowerCase())
            );

            if (!anim) {
                console.log('[間 AI 3D] ⚠️  Animation not found:', animName);
                console.log('[間 AI 3D] Available animations:', allAnims.map(a => a.name));
                return false;
            }

            // Stop all current actions
            mixer.stopAllAction();

            // Clone animation to avoid modifying original
            const clonedClip = anim.clone();

            // IMPORTANT: Remove morph target tracks to prevent morph interference
            clonedClip.tracks = clonedClip.tracks.filter(track => {
                return !track.name.includes('.morphTargetInfluences');
            });

            // Play new animation
            const action = mixer.clipAction(clonedClip);
            action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, Infinity);
            action.reset().play();

            console.log('[間 AI 3D] 🎬 Playing animation:', anim.name, '(loop:', loop + ')');
            return true;
        };

        // Get current playing animation name
        window.getCurrentAnimation = function() {
            if (!mixer) return null;

            // Find first active action
            for (const action of mixer._actions) {
                if (action.isRunning()) {
                    return action.getClip().name;
                }
            }
            return null;
        };

        // ====================================================================================
        // MORPH TARGET SYSTEM (DISABLED - Kept for future debugging)
        // ====================================================================================
        // The morph rendering is currently broken (stretching issue).
        // Skeletal animations provide superior emotion expression anyway.
        // This code is preserved for potential future fixes with:
        // - VRM format conversion
        // - Three.js r170+ upgrade
        // - Different export settings
        // ====================================================================================

        // Emotion to morph target mapping (based on discovered 29 blend shapes)
        const EMOTION_MORPH_MAP = {
            'happy': {
                'eyes.happy': 1.0,
                'eyes.blink': 0.0  // Open eyes
            },
            'sad': {
                'eyes.sad': 1.0,
                'teardrop-1.L': 0.5,
                'teardrop-1.R': 0.5
            },
            'angry': {
                'eyes.annoyed': 1.0,
                'eyes.squint': 0.5
            },
            'excited': {
                'eyes.excited-1': 0.7,
                'eyes.excited-2': 0.3,
                'eyes.happy': 0.5
            },
            'neutral': {
                // All morphs at 0 (default state)
            },
            'thinking': {
                'eyes.lookUp': 0.6,
                'eyes.squint': 0.3
            },
            'love': {
                'eyes.happy': 0.8,
                'eyes.excited-1': 0.5
            },
            'sleepy': {
                'eyes.sleep': 1.0,
                'eyes.blink': 0.3
            },
            'surprised': {
                'eyes.shrink': 0.8,
                'eyes.lookOut': 0.4
            },
            'fear': {
                'eyes.shrink': 1.0,
                'eyes.trauma': 0.5,
                'sweat-1.L': 0.8,
                'sweat-1.R': 0.8
            }
        };

        // Activity → Morph Target Mapping
        // Activities control avatar behavior state (listening, thinking, generating, speaking)
        // These morphs take PRIORITY over emotion morphs when both are active
        const ACTIVITY_MORPH_MAP = {
            'LISTENING': {
                'eyes.lookOut': 0.6,      // Alert, focused outward
                'ears.up': 0.8            // Attentive (if animal has ear morphs)
            },
            'THINKING': {
                'eyes.lookUp': 0.6,       // Contemplative upward gaze
                'eyes.squint': 0.3        // Slight focus/concentration
            },
            'GENERATING': {
                'eyes.excited-1': 0.5,    // Active, engaged
                'eyes.happy': 0.3         // Positive generation state
            },
            'SPEAKING': {
                'eyes.happy': 0.4         // Friendly expression while speaking
                // Note: mouth.open morph may not exist in all models
            },
            'ERROR': {
                'eyes.trauma': 1.0,       // Error/shocked state
                'eyes.dead': 0.8,         // System failure
                'sweat-1.L': 1.0,         // Stress indicators
                'sweat-1.R': 1.0
            },
            'IDLE': {
                // Neutral resting state - all morphs at 0.0
            }
        };

        // Get all morph names used in emotion maps (for selective reset)
        function getAllEmotionMorphNames() {
            const names = new Set();
            for (const emotion in EMOTION_MORPH_MAP) {
                for (const morphName in EMOTION_MORPH_MAP[emotion]) {
                    names.add(morphName);
                }
            }
            return names;
        }

        // Apply morph targets based on emotion
        function applyMorphTargets(mesh, morphMap, intensity = 1.0) {
            if (!mesh.morphTargetDictionary || !mesh.morphTargetInfluences) return;

            // Only reset morphs that we actively control (not all morphs!)
            // This preserves any base morphs needed for model integrity
            const emotionMorphs = getAllEmotionMorphNames();
            for (const morphName of emotionMorphs) {
                const index = mesh.morphTargetDictionary[morphName];
                if (index !== undefined) {
                    mesh.morphTargetInfluences[index] = 0;
                }
            }

            // Apply emotion-specific morphs
            for (const [morphName, value] of Object.entries(morphMap)) {
                const index = mesh.morphTargetDictionary[morphName];
                if (index !== undefined) {
                    mesh.morphTargetInfluences[index] = value * intensity;
                }
            }
        }

        // Update visual appearance based on state
        function updateAvatarVisuals(state) {
            if (!currentModel) return;

            const emotion = state.emotion.toLowerCase();
            const activity = state.activity || 'IDLE';
            const intensity = state.intensity || 1.0;

            // ===========================
            // MORPH TARGETS - DISABLED
            // ===========================
            // Morph rendering is currently broken (stretching issue).
            // Keeping code for future debugging (VRM format, Three.js upgrade, etc.)
            // Skeletal animations provide superior emotion expression.
            //
            // if (window.meshesWithMorphs && window.meshesWithMorphs.length > 0) {
            //     const emotionMorphs = EMOTION_MORPH_MAP[emotion] || {};
            //     const activityMorphs = ACTIVITY_MORPH_MAP[activity] || {};
            //     const finalMorphMap = { ...emotionMorphs, ...activityMorphs };
            //     window.meshesWithMorphs.forEach(mesh => {
            //         applyMorphTargets(mesh, finalMorphMap, intensity);
            //     });
            // }

            // Change emissive color based on emotion
            const emotionColors = {
                'happy': 0xFFD700,
                'sad': 0x4169E1,
                'angry': 0xFF4500,
                'excited': 0xFF69B4,
                'neutral': 0xE25303,
                'thinking': 0x9370DB,
                'love': 0xFF1493,
                'sleepy': 0x6495ED,
                'surprised': 0xFFA500,
                'fear': 0xFF6347
            };

            const color = emotionColors[emotion] || 0xE25303;

            currentModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (child.material.emissive) {
                        child.material.emissive.setHex(color);
                        child.material.emissiveIntensity = intensity * 0.3;
                    }
                }
            });
        }

        // ===========================
        // START
        // ===========================

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
