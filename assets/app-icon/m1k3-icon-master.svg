<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="M1K3 labyrinth app icon">
  <title>M1K3 — labyrinth app icon</title>
  <desc>A flat, light labyrinth: a single dark wall spiralling inward to a teal core, on a warm off-white macOS squircle.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- macOS squircle base (824x824 centered in 1024 with margin) -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184"
        fill="#F4F1E9" filter="url(#softShadow)"/>

  <!-- labyrinth wall: single continuous path spiralling to the core -->
  <path d="M 212 212 L 812 212 L 812 812 L 280 812 L 280 280 L 744 280 L 744 744 L 348 744 L 348 348 L 676 348 L 676 676 L 416 676 L 416 416 L 608 416 L 608 608 L 484 608 L 484 484"
        transform="translate(256 256) scale(0.5)"
        fill="none" stroke="#15302B" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
