<!DOCTYPE html>
<html>
<head>
    <title>Basic Engine Test</title>
    <style>
        body { background: #222; color: #9BBC0F; font-family: monospace; padding: 20px; }
        canvas { border: 1px solid #9BBC0F; margin: 10px; }
        .log { background: #333; padding: 10px; margin: 5px; border-radius: 3px; }
        .pass { border-left: 3px solid #9BBC0F; }
        .fail { border-left: 3px solid #ff6666; color: #ff6666; }
    </style>
</head>
<body>
    <h1>Basic GameboyPixelEngine Test</h1>
    <canvas id="testCanvas" width="256" height="256"></canvas>
    <div id="logs"></div>
    
    <script src="gameboy_pixel_engine.js"></script>
    <script>
        const logs = document.getElementById('logs');
        
        function log(message, pass = true) {
            const div = document.createElement('div');
            div.className = `log ${pass ? 'pass' : 'fail'}`;
            div.textContent = message;
            logs.appendChild(div);
            console.log(message);
        }
        
        try {
            // Step 1: Check if class exists
            if (typeof GameboyPixelEngine !== 'undefined') {
                log('✅ GameboyPixelEngine class found');
            } else {
                log('❌ GameboyPixelEngine class not found', false);
                throw new Error('Engine not loaded');
            }
            
            // Step 2: Try to create instance
            const canvas = document.getElementById('testCanvas');
            log(`✅ Canvas element: ${canvas.width}x${canvas.height}`);
            
            const engine = new GameboyPixelEngine(canvas);
            log('✅ Engine instance created');
            
            // Step 3: Check basic properties
            log(`✅ Grid size: ${engine.gridWidth}x${engine.gridHeight}`);
            log(`✅ Pixel size: ${engine.pixelSize}px`);
            log(`✅ Palette: ${engine.currentPalette?.length || 0} colors`);
            
            // Step 4: Check layers
            if (engine.layers) {
                const layerNames = Object.keys(engine.layers);
                log(`✅ Layers initialized: ${layerNames.join(', ')}`);
                
                // Check if layer contexts exist
                for (const [name, layer] of Object.entries(engine.layers)) {
                    if (layer.ctx) {
                        log(`✅ Layer '${name}' has context`);
                    } else {
                        log(`❌ Layer '${name}' missing context`, false);
                    }
                }
            } else {
                log('❌ Layers not initialized', false);
            }
            
            // Step 5: Test clearCanvas
            try {
                engine.clearCanvas();
                log('✅ clearCanvas() works');
            } catch (e) {
                log(`❌ clearCanvas() failed: ${e.message}`, false);
            }
            
            // Step 6: Test setPixel
            try {
                engine.setPixel(5, 5, 0);
                log('✅ setPixel() works');
            } catch (e) {
                log(`❌ setPixel() failed: ${e.message}`, false);
            }
            
            // Step 7: Test renderAvatar
            try {
                engine.renderAvatar();
                log('✅ renderAvatar() works');
            } catch (e) {
                log(`❌ renderAvatar() failed: ${e.message}`, false);
            }
            
            // Step 8: Test animation
            try {
                let frame = 0;
                const animate = () => {
                    frame++;
                    engine.clearCanvas();
                    
                    // Draw a simple moving dot
                    const x = 10 + Math.floor(Math.sin(frame * 0.1) * 5);
                    const y = 10 + Math.floor(Math.cos(frame * 0.1) * 5);
                    engine.setPixel(x, y, 3);
                    
                    // Try to render avatar too
                    engine.renderAvatar();
                    
                    if (frame < 300) { // Run for ~5 seconds
                        requestAnimationFrame(animate);
                    }
                };
                
                animate();
                log('✅ Animation started');
                
            } catch (e) {
                log(`❌ Animation failed: ${e.message}`, false);
            }
            
        } catch (error) {
            log(`❌ Critical error: ${error.message}`, false);
            console.error('Full error:', error);
        }
    </script>
</body>
</html>
