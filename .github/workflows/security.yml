name: Security

# Slim, high-signal security scanning. Replaced the old security-scanning.yml,
# which ran CodeQL (errored: needs repo "Code Security" enabled) and npm-audit
# (no real Node app — root had only a stub package.json). What's left is the
# cheap, genuinely-useful stuff for a privacy-focused local-AI project:
#   • secrets detection (verified only — no noise)
# The Python SAST (Bandit) moved to attic.yml with the archived Python surface —
# path-filtered on attic/**, same high/high gate.

on:
  push:
    branches: [master, develop]
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    name: Secrets · TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
