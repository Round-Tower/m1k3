name: M1K3 Unified Test Suite

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  unified-testing:
    name: 🧪 M1K3 Unified Testing & Reporting
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        python-version: [3.9, 3.11]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            tests/unified-suite/requirements.txt
      
      - name: 📦 Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: tests/unified-suite/package-lock.json
      
      - name: 🔧 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          cd tests/unified-suite
          pip install -r requirements.txt
      
      - name: 📦 Install Node Dependencies  
        run: |
          cd tests/unified-suite
          npm install
      
      - name: 🕷️ Install Playwright Browsers
        run: |
          cd tests/unified-suite
          npx playwright install --with-deps chromium firefox webkit
      
      - name: 🔍 Run Test Discovery
        run: |
          cd tests/unified-suite
          npm run discover
        continue-on-error: true
      
      - name: 🧪 Run Unit Tests
        run: |
          cd tests/unified-suite
          npm run test:unit
        continue-on-error: true
      
      - name: 🔗 Run Integration Tests
        run: |
          cd tests/unified-suite
          npm run test:integration
        continue-on-error: true
      
      - name: 🎨 Run Visual Tests
        run: |
          cd tests/unified-suite
          npm run test:visual
        continue-on-error: true
      
      - name: 🔒 Run Security Audit
        run: |
          cd tests/unified-suite
          npm run audit
        continue-on-error: true
      
      - name: 📊 Generate Unified Report
        run: |
          cd tests/unified-suite
          npm run report
        if: always()
      
      - name: 📈 Export Test Data
        run: |
          cd tests/unified-suite
          npm run export:json
          npm run export:csv
        if: always()
      
      - name: 📤 Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m1k3-test-reports-${{ matrix.node-version }}-${{ matrix.python-version }}
          path: |
            tests/unified-suite/output/reports/
            tests/unified-suite/output/data/
            tests/unified-suite/output/exports/
          retention-days: 30
      
      - name: 📤 Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m1k3-screenshots-${{ matrix.node-version }}-${{ matrix.python-version }}
          path: |
            tests/screenshots/current/
            tests/screenshots/diff/
          retention-days: 30
      
      - name: 📋 Comment PR with Results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            try {
              const discoveryPath = 'tests/unified-suite/output/data/test-discovery.json';
              if (fs.existsSync(discoveryPath)) {
                const discovery = JSON.parse(fs.readFileSync(discoveryPath, 'utf8'));
                
                const comment = `## 🧪 M1K3 Unified Test Results
                
                **📊 Test Discovery Summary:**
                - 📁 **${discovery.summary.total_files}** test files discovered
                - 🧪 **${discovery.summary.total_tests}** individual tests
                - ⏱️ **${discovery.summary.estimated_duration_readable}** estimated runtime
                
                **📈 Category Breakdown:**
                ${Object.entries(discovery.categories).map(([cat, data]) => 
                  `- **${cat}**: ${data.count} files, ${data.test_count} tests`
                ).join('\n')}
                
                **🔧 Framework Coverage:**
                ${Object.entries(discovery.frameworks).map(([fw, count]) => 
                  `- **${fw}**: ${count} files`
                ).join('\n')}
                
                **📸 Visual Coverage:**
                - Screenshots: Available in artifacts
                - User Journeys: Validated across devices
                
                **🎯 Matrix Results:**
                - Node.js: ${{ matrix.node-version }}
                - Python: ${{ matrix.python-version }}
                
                📄 **Detailed reports available in job artifacts**
                `;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('Could not post test results comment:', error);
            }

  deploy-reports:
    name: 🚀 Deploy Test Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: unified-testing
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5
      
      - name: 📦 Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
      
      - name: 🔧 Install Dependencies
        run: |
          cd tests/unified-suite
          npm install
      
      - name: 📊 Generate Latest Report
        run: |
          cd tests/unified-suite
          npm run discover
          npm run report
      
      - name: 📄 Setup Pages
        uses: actions/configure-pages@v5
      
      - name: 🏗️ Build Pages Site
        run: |
          mkdir -p _site
          cp -r tests/unified-suite/output/reports/* _site/
          
          # Create index.html that redirects to latest report
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>M1K3 Test Reports</title>
            <meta http-equiv="refresh" content="0; url=./$(ls _site/*.html | head -1 | xargs basename)">
          </head>
          <body>
            <h1>🧪 M1K3 Test Reports</h1>
            <p>Redirecting to latest report...</p>
            <ul>
          EOF
          
          for file in _site/*.html; do
            if [ "$file" != "_site/index.html" ]; then
              echo "<li><a href=\"./$(basename "$file")\">$(basename "$file")</a></li>" >> _site/index.html
            fi
          done
          
          echo '</ul></body></html>' >> _site/index.html
      
      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site
      
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  quality-gates:
    name: 🚨 Quality Gates
    runs-on: ubuntu-latest
    needs: unified-testing
    if: always()
    
    steps:
      - name: 📥 Download Test Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: m1k3-test-reports-*
          merge-multiple: true
      
      - name: 🔍 Analyze Test Results
        run: |
          echo "🔍 Analyzing test results for quality gates..."
          
          # Check if discovery results exist
          if [ -f "data/test-discovery.json" ]; then
            TOTAL_FILES=$(jq '.summary.total_files' data/test-discovery.json)
            TOTAL_TESTS=$(jq '.summary.total_tests' data/test-discovery.json)
            
            echo "📊 Found $TOTAL_FILES test files with $TOTAL_TESTS tests"
            
            # Quality gate: Minimum test coverage
            if [ "$TOTAL_TESTS" -lt 50 ]; then
              echo "❌ Quality Gate Failed: Insufficient test coverage ($TOTAL_TESTS < 50)"
              exit 1
            fi
            
            echo "✅ Quality Gate Passed: Test coverage adequate ($TOTAL_TESTS tests)"
          else
            echo "⚠️ No test discovery results found"
          fi
      
      - name: 📈 Update Status Badge
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "🏷️ Updating status badges..."
          # This would integrate with shields.io or similar badge service
          echo "Badge update placeholder - integrate with your preferred badge service"