name: CI

# Lean test pipeline — tests what M1K3 actually ships.
#   • swift-mac : the Mac-native MVP (the active surface), via `swift test`
#
# The legacy Python smoke subset moved to attic.yml (path-filtered on attic/**)
# when the Python surface was archived. Replaced the old Node/Playwright
# "unified suite" (quick-tests / unified-tests / release-testing), which tested
# a web dashboard, was perpetually red, and never covered the Swift work. See
# attic/tests/CI_TRIAGE.md for the Python story.

on:
  push:
    branches: [master, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-mac:
    name: Swift · Mac MVP (swift test)
    # macos/ targets .macOS(.v26): the package COMPILES on macos-latest (Xcode 26
    # SDK) but the test binary links FoundationModels.framework, a macOS 26 runtime
    # framework — so the tests must RUN on an actual Tahoe runner. macos-latest's
    # OS still lags the SDK (build for 26 / run on 15 → dlopen fails). Pin macos-26.
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode (26.x, pinned)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26" # pinned: Xcode 27 GA must be a deliberate bump, never a silent one

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: macos/.build
          key: spm-${{ runner.os }}-${{ hashFiles('macos/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: swift test
        working-directory: macos
        # MLX/Metal + WhisperKit integration tests are env-gated OFF: they only
        # run from a bundled .app (see project-memory "metallib wall"), never CLI.
        env:
          M1K3_MLX_INTEGRATION: "0"
        run: swift test --parallel

  app-build:
    name: Swift · App shell (xcodebuild)
    # `swift test` compiles only the SwiftPM PACKAGE. The app shell (M1K3App/:
    # AppEnvironment + its extensions, SelfTest, MCPHostController, IssueReporter,
    # every SwiftUI view) is an Xcode target that otherwise compiles ONLY in
    # Xcode Cloud, post-merge — so a break there passes every PR check and first
    # fails at release time, disconnected from its cause. This builds it unsigned
    # (no secrets, no archive) purely to prove it COMPILES + links on each PR.
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode (26.x, pinned)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26" # pinned: Xcode 27 GA must be a deliberate bump, never a silent one

      # Speeds package resolution (mlx-swift-lm is a heavy clone) by caching
      # xcodebuild's resolved SourcePackages between runs.
      - name: Cache resolved packages
        uses: actions/cache@v4
        with:
          path: macos/.spm-cache
          key: xcodebuild-spm-${{ runner.os }}-${{ hashFiles('macos/Package.resolved') }}
          restore-keys: xcodebuild-spm-${{ runner.os }}-

      # M1K3.xcodeproj is gitignored (project.yml is the source of truth). xcodegen
      # regenerates it. xcbeautify formats the build log. Homebrew works on the
      # macos-26 GH runner (unlike the Xcode Cloud beta image, which fetches a
      # pinned xcodegen binary in ci_scripts/ci_post_clone.sh).
      - name: Install xcodegen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: macos
        run: xcodegen generate

      - name: Build app (unsigned)
        working-directory: macos
        # Unsigned: CODE_SIGNING_ALLOWED=NO drops the signing phase (no certs on a
        # PR runner). The default GH Actions shell sets `pipefail`, so a build
        # failure still fails the job even through the xcbeautify pipe.
        run: |
          xcodebuild \
            -project M1K3.xcodeproj \
            -scheme M1K3 \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build | xcbeautify

  mobile-build:
    name: Swift · iOS + visionOS shells (xcodebuild)
    # The iOS/visionOS shell (M1K3iOSApp/ on the portable package graph) was
    # local-verify-only since PR #9 — a PR could break the mobile compile and
    # first fail at release. Builds both schemes unsigned against the SIMULATOR
    # SDKs (generic destination, no boot) purely to prove compile + link. One
    # job, two steps: the checkout/xcodegen/SPM-resolve cost is paid once and
    # the visionOS build reuses the shared clone cache. The macos-26 runner
    # image ships the visionOS SDK + simulators (verified 2026-07-08).
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode (26.x, pinned)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26" # same deliberate-bump rule as app-build

      - name: Cache resolved packages
        uses: actions/cache@v4
        with:
          path: macos/.spm-cache
          key: xcodebuild-spm-mobile-${{ runner.os }}-${{ hashFiles('macos/Package.resolved') }}
          restore-keys: xcodebuild-spm-mobile-${{ runner.os }}-

      - name: Install xcodegen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: macos
        run: xcodegen generate

      - name: Build iOS app (unsigned, simulator SDK)
        working-directory: macos
        run: |
          xcodebuild \
            -project M1K3.xcodeproj \
            -scheme M1K3iOS \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build | xcbeautify

      - name: Build visionOS app (unsigned, simulator SDK)
        working-directory: macos
        run: |
          xcodebuild \
            -project M1K3.xcodeproj \
            -scheme M1K3visionOS \
            -destination 'generic/platform=visionOS Simulator' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build | xcbeautify

  scheme-drift:
    # The native Xcode Cloud Test action runs the test targets hand-listed in the
    # M1K3-Tests workspace scheme (the app project can't reference package test
    # targets). Guard against a `.testTarget` added to Package.swift but not the
    # scheme — which would silently never run. Pure-Python, no build, seconds.
    name: Test scheme covers all targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Check M1K3-Tests scheme vs Package.swift
        working-directory: macos
        run: python3 tools/ci/check_test_scheme.py

  doc-drift:
    # Guard the docs against silent staleness: every `.library` product in
    # Package.swift must appear in the macos/CLAUDE.md Module map (and no ghost
    # rows). Born from four modules going undocumented — the first thing a
    # contributor reads must not lie. Pure-Python, no build, seconds.
    name: Docs match the code (module map)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Check CLAUDE.md Module map vs Package.swift
        working-directory: macos
        run: python3 tools/ci/check_doc_drift.py

  # Posts a per-job build-status list to Slack (same shape as the dyslexia-ai-server
  # `verify` workflow: act10ns/slack, if-always, ✅/❌ per job). No-op until the
  # SLACK_WEBHOOK_URL secret is set, so it never reddens CI before Slack is wired.
  # Wire it: repo Settings → Secrets and variables → Actions → new secret
  # SLACK_WEBHOOK_URL = a Slack incoming-webhook URL (posts to its bound channel).
  notify:
    name: Notify Slack
    needs: [swift-mac, app-build, mobile-build, scheme-drift, doc-drift]
    runs-on: ubuntu-latest
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Slack build status
        if: env.SLACK_WEBHOOK_URL != ''
        uses: act10ns/slack@v2.2.0
        with:
          status: ${{ (needs.swift-mac.result == 'success' && needs.app-build.result == 'success' && needs.mobile-build.result == 'success' && needs.scheme-drift.result == 'success' && needs.doc-drift.result == 'success') && 'success' || 'failure' }}
          message: |
            M1K3 CI · ${{ github.ref_name }} (${{ github.event_name }})

            ${{ needs.swift-mac.result == 'success' && '✅' || '❌' }} : Swift · Mac MVP (swift test)
            ${{ needs.app-build.result == 'success' && '✅' || '❌' }} : Swift · App shell (xcodebuild)
            ${{ needs.mobile-build.result == 'success' && '✅' || '❌' }} : Swift · iOS + visionOS shells (xcodebuild)
            ${{ needs.scheme-drift.result == 'success' && '✅' || '❌' }} : Test scheme covers all targets
            ${{ needs.doc-drift.result == 'success' && '✅' || '❌' }} : Docs match the code (module map)

            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run> · by ${{ github.actor }}

# Signed: Kev + claude-opus-4-8, 2026-06-06, Confidence 0.75, Prior: Unknown
# CI overhaul: ripped out the red Node/Playwright "unified suite" (tested a web
# dashboard, never covered the Swift MVP). Replaced with swift test + a curated,
# empirically-verified green Python smoke subset (44 files / 102 tests / ~24s).
# Confidence 0.75 not higher: the swift-mac job is verify-by-CI — it depends on
# the hosted runner image shipping Xcode 26 (macOS 26 SDK), which I could not
# confirm from here. The python-smoke set IS verified green locally.
