name: Release Testing

on:
  release:
    types: [published]

jobs:
  comprehensive-testing:
    name: 🚀 Release Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: 🔧 Install Dependencies
        shell: bash
        run: |
          cd tests/unified-suite
          npm install
          pip install -r requirements.txt
      
      - name: 🕷️ Install Playwright
        run: |
          cd tests/unified-suite
          npx playwright install --with-deps chromium
      
      - name: 🔍 Full Test Discovery
        run: |
          cd tests/unified-suite
          npm run discover
      
      - name: 🧪 Run All Test Categories
        run: |
          cd tests/unified-suite
          npm run test:unit
          npm run test:integration
          npm run test:api
        continue-on-error: true
      
      - name: 🎨 Run Visual Tests
        run: |
          cd tests/unified-suite
          npm run test:visual
        continue-on-error: true
      
      - name: 🔒 Complete Security Audit
        run: |
          cd tests/unified-suite
          npm run audit
        continue-on-error: true
      
      - name: 📊 Generate Platform Report
        run: |
          cd tests/unified-suite
          npm run report
        if: always()
      
      - name: 📈 Export Data
        run: |
          cd tests/unified-suite
          npm run export:json
          npm run export:csv
        if: always()
      
      - name: 📤 Upload Release Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-test-results
          path: |
            tests/unified-suite/output/
            tests/screenshots/
          retention-days: 30
      
      - name: 📊 Release Test Summary
        if: always()
        run: |
          echo "## 🚀 Release Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Linux (ubuntu-latest)" >> $GITHUB_STEP_SUMMARY
          echo "- **Node.js**: 20.x" >> $GITHUB_STEP_SUMMARY
          echo "- **Python**: 3.11" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

          if [ -f "tests/unified-suite/output/data/test-discovery.json" ]; then
            echo "- **Tests Discovered**: $(jq '.summary.total_tests' tests/unified-suite/output/data/test-discovery.json)" >> $GITHUB_STEP_SUMMARY
            echo "- **Duration**: $(jq -r '.summary.estimated_duration_readable' tests/unified-suite/output/data/test-discovery.json)" >> $GITHUB_STEP_SUMMARY
          fi

  release-report:
    name: 📋 Generate Release Report
    runs-on: ubuntu-latest
    needs: comprehensive-testing
    if: always()
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5
      
      - name: 📦 Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
      
      - name: 📥 Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: release-test-results
      
      - name: 🔧 Install Report Dependencies
        run: |
          cd tests/unified-suite
          npm install
      
      - name: 📊 Generate Consolidated Release Report
        run: |
          cd tests/unified-suite
          
          # Create consolidated report
          cat > release-summary.md << 'EOF'
          # 🚀 M1K3 Release Test Report
          
          **Release**: ${{ github.event.release.tag_name || inputs.version }}
          **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Commit**: ${{ github.sha }}
          
          ## 📊 Test Coverage Summary
          
          EOF
          
          # Add platform results
          if [ -f "../output/data/test-discovery.json" ]; then
            jq -r '
              "**Total Test Files**: " + (.summary.total_files | tostring) + "\n" +
              "**Total Tests**: " + (.summary.total_tests | tostring) + "\n" +
              "**Estimated Duration**: " + .summary.estimated_duration_readable + "\n\n" +
              "### Test Categories\n" +
              (
                .categories | to_entries | map(
                  "- **" + (.key | ascii_upcase) + "**: " + 
                  (.value.count | tostring) + " files, " + 
                  (.value.test_count | tostring) + " tests"
                ) | join("\n")
              ) + "\n\n" +
              "### Framework Coverage\n" +
              (
                .frameworks | to_entries | map(
                  "- **" + .key + "**: " + (.value | tostring) + " files"
                ) | join("\n")
              )
            ' ../output/data/test-discovery.json >> release-summary.md
          fi
          
          echo "

          ## 🎯 Quality Gates

          - ✅ **Platform**: Linux (ubuntu-latest)
          - ✅ **Runtime**: Node.js 20.x, Python 3.11
          - ✅ **Test Coverage**: Unit, Integration, API, Visual
          - ✅ **Security Audit**: Comprehensive dependency scanning
          
          ## 📈 Artifacts
          
          - **Test Reports**: Complete HTML reports with M1K3 branding
          - **Screenshots**: Visual regression test results  
          - **Data Exports**: JSON, CSV, XML, YAML formats
          - **Security Reports**: Comprehensive vulnerability analysis
          
          ---
          
          **Generated by M1K3 Unified Test Suite** 🤖
          " >> release-summary.md
          
          cat release-summary.md
      
      - name: 📤 Upload Release Report
        uses: actions/upload-artifact@v4
        with:
          name: m1k3-release-report-${{ github.event.release.tag_name }}
          path: |
            tests/unified-suite/release-summary.md
            tests/unified-suite/output/
          retention-days: 90
      
      - name: 💬 Add Release Comment
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            if (fs.existsSync('tests/unified-suite/release-summary.md')) {
              const summary = fs.readFileSync('tests/unified-suite/release-summary.md', 'utf8');
              
              github.rest.repos.createReleaseComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: context.payload.release.id,
                body: summary
              });
            }