name: Update Status Badges

on:
  workflow_run:
    workflows: ["M1K3 Unified Test Suite", "Quick Tests"]
    types: [completed]
  schedule:
    # Update badges daily at 7 AM UTC
    - cron: '0 7 * * *'

jobs:
  update-badges:
    name: 🏷️ Update Status Badges
    runs-on: ubuntu-latest
    if: github.repository_owner != 'dependabot[bot]'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: 🔍 Get Latest Test Results
        run: |
          cd tests/unified-suite
          npm install
          npm run discover
      
      - name: 🏷️ Generate Badge Data
        id: badge-data
        run: |
          cd tests/unified-suite
          
          if [ -f "output/data/test-discovery.json" ]; then
            TOTAL_TESTS=$(jq '.summary.total_tests' output/data/test-discovery.json)
            TOTAL_FILES=$(jq '.summary.total_files' output/data/test-discovery.json)
            DURATION=$(jq -r '.summary.estimated_duration_readable' output/data/test-discovery.json)
            
            echo "tests=$TOTAL_TESTS" >> $GITHUB_OUTPUT
            echo "files=$TOTAL_FILES" >> $GITHUB_OUTPUT
            echo "duration=$DURATION" >> $GITHUB_OUTPUT
            
            # Calculate coverage percentage (files with tests / total files)
            COVERAGE=$(echo "scale=1; $TOTAL_TESTS / $TOTAL_FILES * 100" | bc)
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            
            # Determine coverage color
            if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
              echo "coverage_color=brightgreen" >> $GITHUB_OUTPUT
            elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
              echo "coverage_color=yellow" >> $GITHUB_OUTPUT
            else
              echo "coverage_color=red" >> $GITHUB_OUTPUT
            fi
          else
            echo "tests=unknown" >> $GITHUB_OUTPUT
            echo "files=unknown" >> $GITHUB_OUTPUT
            echo "duration=unknown" >> $GITHUB_OUTPUT
            echo "coverage=0" >> $GITHUB_OUTPUT
            echo "coverage_color=lightgrey" >> $GITHUB_OUTPUT
          fi
      
      - name: 📊 Create Badge JSON
        run: |
          mkdir -p .badges
          
          # Test count badge
          cat > .badges/tests.json << EOF
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${{ steps.badge-data.outputs.tests }}",
            "color": "blue",
            "style": "flat-square"
          }
          EOF
          
          # Test files badge
          cat > .badges/files.json << EOF
          {
            "schemaVersion": 1,
            "label": "test files",
            "message": "${{ steps.badge-data.outputs.files }}",
            "color": "blue",
            "style": "flat-square"
          }
          EOF
          
          # Duration badge
          cat > .badges/duration.json << EOF
          {
            "schemaVersion": 1,
            "label": "test duration",
            "message": "${{ steps.badge-data.outputs.duration }}",
            "color": "informational",
            "style": "flat-square"
          }
          EOF
          
          # Coverage badge
          cat > .badges/coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "test coverage",
            "message": "${{ steps.badge-data.outputs.coverage }}%",
            "color": "${{ steps.badge-data.outputs.coverage_color }}",
            "style": "flat-square"
          }
          EOF
          
          # Build status badge (from workflow status)
          STATUS_COLOR="brightgreen"
          STATUS_MESSAGE="passing"
          
          if [ "${{ github.event.workflow_run.conclusion }}" == "failure" ]; then
            STATUS_COLOR="red"
            STATUS_MESSAGE="failing"
          elif [ "${{ github.event.workflow_run.conclusion }}" == "cancelled" ]; then
            STATUS_COLOR="yellow"
            STATUS_MESSAGE="cancelled"
          fi
          
          cat > .badges/build.json << EOF
          {
            "schemaVersion": 1,
            "label": "build",
            "message": "$STATUS_MESSAGE",
            "color": "$STATUS_COLOR",
            "style": "flat-square"
          }
          EOF
      
      - name: 📤 Upload Badge Files
        uses: actions/upload-artifact@v4
        with:
          name: status-badges
          path: .badges/
          retention-days: 30
      
      - name: 🎯 Update README Badges
        run: |
          # Create badge URLs for README
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          
          echo "Add these badges to your README.md:"
          echo ""
          echo "![Build Status](https://img.shields.io/github/actions/workflow/status/$REPO/unified-tests.yml?branch=$BRANCH&style=flat-square&label=tests)"
          echo "![Test Count](https://img.shields.io/badge/tests-${{ steps.badge-data.outputs.tests }}-blue?style=flat-square)"
          echo "![Test Files](https://img.shields.io/badge/test%20files-${{ steps.badge-data.outputs.files }}-blue?style=flat-square)"
          echo "![Test Duration](https://img.shields.io/badge/duration-${{ steps.badge-data.outputs.duration }}-informational?style=flat-square)"
          echo "![Coverage](https://img.shields.io/badge/coverage-${{ steps.badge-data.outputs.coverage }}%25-${{ steps.badge-data.outputs.coverage_color }}?style=flat-square)"
          echo ""
          echo "Or use the dynamic badges:"
          echo "![Tests](https://github.com/$REPO/actions/workflows/unified-tests.yml/badge.svg)"
          echo "![Quick Tests](https://github.com/$REPO/actions/workflows/quick-tests.yml/badge.svg)"

  create-shields:
    name: 🛡️ Generate Shield Badges
    runs-on: ubuntu-latest
    needs: update-badges
    
    steps:
      - name: 📥 Download Badge Data
        uses: actions/download-artifact@v4
        with:
          name: status-badges
      
      - name: 🛡️ Generate Shields.io URLs
        run: |
          echo "## 🏷️ M1K3 Test Status Badges"
          echo ""
          echo "### Current Status"
          
          # Extract values from JSON files
          if [ -f "tests.json" ]; then
            TESTS=$(jq -r '.message' tests.json)
            FILES=$(jq -r '.message' files.json)
            DURATION=$(jq -r '.message' duration.json)
            COVERAGE=$(jq -r '.message' coverage.json)
            BUILD=$(jq -r '.message' build.json)
            
            echo "- 🧪 **Tests**: $TESTS"
            echo "- 📁 **Test Files**: $FILES"
            echo "- ⏱️ **Duration**: $DURATION"
            echo "- 📊 **Coverage**: $COVERAGE"
            echo "- 🔨 **Build**: $BUILD"
          fi
          
          echo ""
          echo "### Badge URLs for README.md"
          echo '```markdown'
          echo "![M1K3 Tests](https://img.shields.io/github/actions/workflow/status/${{ github.repository }}/unified-tests.yml?style=for-the-badge&label=M1K3%20Tests&logo=github)"
          echo "![Test Count](https://img.shields.io/badge/dynamic/json?url=https://raw.githubusercontent.com/${{ github.repository }}/main/.badges/tests.json&query=message&style=for-the-badge&label=Tests&logo=checkmarx)"
          echo "![Test Coverage](https://img.shields.io/badge/dynamic/json?url=https://raw.githubusercontent.com/${{ github.repository }}/main/.badges/coverage.json&query=message&style=for-the-badge&label=Coverage&logo=codecov)"
          echo '```'