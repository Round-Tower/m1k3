name: Repo Visualizer

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  visualize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update diagram
        uses: githubocto/repo-visualizer@0.9.1
        with:
          output_file: diagram.svg
          excluded_paths: >-
            node_modules,dist,out,build,.next,.yarn,.vscode,
            package-lock.json,yarn.lock,
            __pycache__,.pytest_cache,.mypy_cache,
            mlx-env,venv,.venv,env,
            .git,target,
            models,*.gguf,*.bin,*.safetensors
          commit_message: "repo-visualizer: update diagram"
