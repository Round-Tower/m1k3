# The attic still boots. Smoke tests + SAST for the archived Python surface,
# path-filtered so it only spends CI minutes when attic/ itself changes.
# (Moved out of ci.yml/security.yml when the legacy tree moved to attic/ —
# the museum piece stays provably alive without taxing every PR.)
name: Attic

on:
  push:
    branches: [master]
    paths: ["attic/**", ".github/workflows/attic.yml"]
  pull_request:
    paths: ["attic/**", ".github/workflows/attic.yml"]

permissions:
  contents: read

jobs:
  python-smoke:
    name: Python · smoke subset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: attic
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: attic/requirements-ci.txt

      - name: Install slim CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run smoke subset
        # Explicit allowlist (not `-m ci_smoke`) so the swamp files — which crash
        # at COLLECTION time (top-level sys.exit, heavy ML imports) — are never
        # imported. The ci_smoke / quarantine markers are still applied (see
        # tests/conftest.py) for local `pytest -m ci_smoke` / `-m quarantine`.
        run: |
          mapfile -t SMOKE < <(grep -vE '^\s*(#|$)' tests/ci_smoke.txt)
          echo "Running ${#SMOKE[@]} smoke files"
          pytest "${SMOKE[@]}" -q --no-header

  python-sast:
    name: Python · Bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit
      - name: Bandit (fail only on high severity + high confidence)
        # Legacy code has plenty of low/medium noise (subprocess, asserts);
        # gate on high/high so this stays green but still catches real issues.
        run: bandit -r attic/src -q --severity-level high --confidence-level high
