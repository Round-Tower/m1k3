<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M1K3 WebSocket Logger</title>
    <style>
        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --bg-tertiary: #1F1F1F;
            --bg-elevated: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --text-disabled: #666666;
            --m1k3-orange: #E25303;
            --m1k3-green: #92B48B;
            --m1k3-blue: #0F4C81;
            --m1k3-red: #8E354A;
            --accent-sent: #4CAF50;
            --accent-received: #2196F3;
            --accent-error: #F44336;
            --accent-warning: #FF9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .logger-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            padding: 16px;
            gap: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--bg-tertiary);
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--m1k3-orange);
        }

        .connection-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.875rem;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: var(--accent-sent);
        }

        .status-indicator.disconnected {
            background: var(--accent-error);
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: var(--bg-elevated);
            border: 1px solid var(--bg-tertiary);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--m1k3-orange);
        }

        .btn.active {
            background: var(--m1k3-orange);
            border-color: var(--m1k3-orange);
        }

        .log-container {
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--bg-tertiary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--bg-elevated);
        }

        .log-stats {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .filters {
            display: flex;
            gap: 4px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--bg-elevated);
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--m1k3-orange);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--m1k3-orange);
            border-color: var(--m1k3-orange);
            color: var(--bg-primary);
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .log-entry {
            display: flex;
            margin-bottom: 2px;
            padding: 4px 8px;
            border-radius: 3px;
            border-left: 3px solid transparent;
            transition: background-color 0.2s;
        }

        .log-entry:hover {
            background: var(--bg-tertiary);
        }

        .log-entry.sent {
            border-left-color: var(--accent-sent);
            background: rgba(76, 175, 80, 0.05);
        }

        .log-entry.received {
            border-left-color: var(--accent-received);
            background: rgba(33, 150, 243, 0.05);
        }

        .log-entry.error {
            border-left-color: var(--accent-error);
            background: rgba(244, 67, 54, 0.05);
        }

        .log-entry.hidden {
            display: none;
        }

        .log-timestamp {
            color: var(--text-disabled);
            width: 80px;
            flex-shrink: 0;
            font-size: 0.7rem;
        }

        .log-direction {
            width: 60px;
            flex-shrink: 0;
            font-weight: bold;
            font-size: 0.7rem;
        }

        .log-direction.sent {
            color: var(--accent-sent);
        }

        .log-direction.received {
            color: var(--accent-received);
        }

        .log-direction.error {
            color: var(--accent-error);
        }

        .log-type {
            width: 120px;
            flex-shrink: 0;
            color: var(--m1k3-orange);
            font-weight: bold;
            font-size: 0.7rem;
        }

        .log-message {
            flex: 1;
            word-break: break-all;
            color: var(--text-primary);
        }

        .log-json {
            background: var(--bg-elevated);
            padding: 8px;
            border-radius: 3px;
            margin-top: 4px;
            white-space: pre-wrap;
            font-size: 0.7rem;
            color: var(--text-secondary);
            border: 1px solid var(--bg-tertiary);
            max-height: 200px;
            overflow-y: auto;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--bg-tertiary);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .send-test {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .test-input {
            background: var(--bg-primary);
            border: 1px solid var(--bg-tertiary);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            width: 200px;
        }

        .test-input:focus {
            outline: none;
            border-color: var(--m1k3-orange);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .log-entry {
            animation: slideIn 0.3s ease-out;
        }

        /* Scrollbar styling */
        .log-content::-webkit-scrollbar {
            width: 8px;
        }

        .log-content::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .log-content::-webkit-scrollbar-thumb {
            background: var(--bg-elevated);
            border-radius: 4px;
        }

        .log-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-disabled);
        }
    </style>
</head>
<body>
    <div class="logger-container">
        <div class="header">
            <div>
                <h1>🔍 M1K3 WebSocket Logger</h1>
                <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
                    Real-time WebSocket debugging for avatar dashboard
                </div>
            </div>
            <div class="connection-info">
                <div class="status-indicator disconnected" id="statusIndicator"></div>
                <span id="connectionStatus">Disconnected</span>
                <div class="controls">
                    <button class="btn" id="connectBtn">Connect</button>
                    <button class="btn" id="clearBtn">Clear</button>
                    <button class="btn" id="exportBtn">Export</button>
                    <button class="btn" id="autoscrollBtn" data-active="true">Auto-scroll</button>
                </div>
            </div>
        </div>

        <div class="log-container">
            <div class="log-header">
                <div class="log-stats">
                    <span>Messages: <strong id="messageCount">0</strong></span>
                    <span>Sent: <strong id="sentCount">0</strong></span>
                    <span>Received: <strong id="receivedCount">0</strong></span>
                    <span>Errors: <strong id="errorCount">0</strong></span>
                    <span>Rate: <strong id="messageRate">0/s</strong></span>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="sent">Sent</button>
                    <button class="filter-btn" data-filter="received">Received</button>
                    <button class="filter-btn" data-filter="emotion">Emotion</button>
                    <button class="filter-btn" data-filter="chat">Chat</button>
                    <button class="filter-btn" data-filter="state">State</button>
                    <button class="filter-btn" data-filter="sound">Sound</button>
                    <button class="filter-btn" data-filter="metrics">Metrics</button>
                    <button class="filter-btn" data-filter="error">Errors</button>
                </div>
            </div>
            <div class="log-content" id="logContent">
                <div class="log-entry">
                    <div class="log-timestamp">--:--:--</div>
                    <div class="log-direction">SYSTEM</div>
                    <div class="log-type">INFO</div>
                    <div class="log-message">WebSocket logger initialized. Click "Connect" to start monitoring.</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="send-test">
                <input type="text" class="test-input" id="testMessage" placeholder='{"type": "ping"}'>
                <button class="btn" id="sendBtn">Send Test</button>
                <select class="btn" id="quickTests">
                    <option value="">Quick Tests</option>
                    <option value='{"type": "ping"}'>Ping</option>
                    <option value='{"type": "chat_user", "message": "Test message"}'>User Chat</option>
                    <option value='{"type": "sound_trigger", "sound": "test"}'>Sound Trigger</option>
                    <option value='{"type": "metrics_request"}'>Request Metrics</option>
                </select>
            </div>
            <div>
                <span>WebSocket: ws://localhost:8081</span>
            </div>
        </div>
    </div>

    <script>
        // WebSocket Logger Implementation
        let websocket = null;
        let isConnected = false;
        let messageCount = 0;
        let sentCount = 0;
        let receivedCount = 0;
        let errorCount = 0;
        let lastMessageTime = Date.now();
        let messageRate = 0;
        let autoScroll = true;
        let activeFilter = 'all';

        // DOM Elements
        const statusIndicator = document.getElementById('statusIndicator');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectBtn = document.getElementById('connectBtn');
        const clearBtn = document.getElementById('clearBtn');
        const exportBtn = document.getElementById('exportBtn');
        const autoscrollBtn = document.getElementById('autoscrollBtn');
        const logContent = document.getElementById('logContent');
        const testMessage = document.getElementById('testMessage');
        const sendBtn = document.getElementById('sendBtn');
        const quickTests = document.getElementById('quickTests');

        // Stats elements
        const messageCountEl = document.getElementById('messageCount');
        const sentCountEl = document.getElementById('sentCount');
        const receivedCountEl = document.getElementById('receivedCount');
        const errorCountEl = document.getElementById('errorCount');
        const messageRateEl = document.getElementById('messageRate');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            updateStats();
            startMessageRateCalculation();
        });

        function setupEventListeners() {
            connectBtn.addEventListener('click', toggleConnection);
            clearBtn.addEventListener('click', clearLog);
            exportBtn.addEventListener('click', exportLog);
            autoscrollBtn.addEventListener('click', toggleAutoScroll);
            sendBtn.addEventListener('click', sendTestMessage);
            
            testMessage.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendTestMessage();
                }
            });

            quickTests.addEventListener('change', function() {
                if (this.value) {
                    testMessage.value = this.value;
                    this.value = '';
                }
            });

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    setFilter(this.dataset.filter);
                });
            });
        }

        function toggleConnection() {
            if (isConnected) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            try {
                websocket = new WebSocket('ws://localhost:8081');
                
                websocket.onopen = function(event) {
                    isConnected = true;
                    updateConnectionStatus(true);
                    logMessage('SYSTEM', 'Connected to M1K3 Avatar Server', 'connection', 'sent');
                    
                    // Send initial ping
                    sendMessage({type: 'ping', timestamp: Date.now()});
                };
                
                websocket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        const messageType = data.type || 'unknown';
                        logMessage('RECEIVED', formatMessage(data), messageType, 'received', data);
                        receivedCount++;
                        updateStats();
                    } catch (e) {
                        logMessage('ERROR', 'Failed to parse message: ' + event.data, 'parse_error', 'error');
                        errorCount++;
                        updateStats();
                    }
                };
                
                websocket.onclose = function(event) {
                    isConnected = false;
                    updateConnectionStatus(false);
                    logMessage('SYSTEM', `Connection closed (code: ${event.code})`, 'connection', 'error');
                };
                
                websocket.onerror = function(error) {
                    logMessage('ERROR', 'WebSocket error occurred', 'connection', 'error');
                    errorCount++;
                    updateStats();
                };
                
            } catch (e) {
                logMessage('ERROR', 'Failed to connect: ' + e.message, 'connection', 'error');
                errorCount++;
                updateStats();
            }
        }

        function disconnect() {
            if (websocket) {
                websocket.close();
                websocket = null;
            }
            isConnected = false;
            updateConnectionStatus(false);
            logMessage('SYSTEM', 'Disconnected from server', 'connection', 'sent');
        }

        function sendMessage(data) {
            if (websocket && isConnected) {
                const message = JSON.stringify(data);
                websocket.send(message);
                logMessage('SENT', formatMessage(data), data.type || 'unknown', 'sent', data);
                sentCount++;
                updateStats();
            } else {
                logMessage('ERROR', 'Cannot send - not connected', 'connection', 'error');
                errorCount++;
                updateStats();
            }
        }

        function sendTestMessage() {
            const message = testMessage.value.trim();
            if (!message) return;
            
            try {
                const data = JSON.parse(message);
                sendMessage(data);
                testMessage.value = '';
            } catch (e) {
                logMessage('ERROR', 'Invalid JSON: ' + e.message, 'parse_error', 'error');
                errorCount++;
                updateStats();
            }
        }

        function formatMessage(data) {
            const type = data.type || 'unknown';
            
            switch (type) {
                case 'emotion':
                    return `${data.emotion} (${data.intensity}%): ${data.message || ''}`;
                case 'state':
                    return `State: ${data.state}`;
                case 'chat_user':
                    return `User: ${data.message}`;
                case 'chat_ai_chunk':
                    return `AI chunk: "${data.chunk}"`;
                case 'chat_ai_start':
                    return 'AI response starting...';
                case 'chat_ai_complete':
                    return 'AI response complete';
                case 'sound':
                    return `Sound: ${data.sound}`;
                case 'metrics':
                    return `Metrics - Energy: ${data.energy_saved}, Water: ${data.water_saved}`;
                case 'progress':
                    return `Progress: ${data.stage} ${data.progress}% (${data.tokens} tokens)`;
                case 'ping':
                    return 'Ping';
                case 'pong':
                    return 'Pong';
                default:
                    return `${type}: ${JSON.stringify(data).substring(0, 100)}`;
            }
        }

        function logMessage(direction, message, type, category, rawData = null) {
            const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
            const entry = document.createElement('div');
            entry.className = `log-entry ${category}`;
            entry.dataset.type = type;
            entry.dataset.category = category;
            
            entry.innerHTML = `
                <div class="log-timestamp">${timestamp}</div>
                <div class="log-direction ${category}">${direction}</div>
                <div class="log-type">${type.toUpperCase()}</div>
                <div class="log-message">${message}</div>
            `;
            
            // Add JSON details for complex messages
            if (rawData && typeof rawData === 'object') {
                const jsonDiv = document.createElement('div');
                jsonDiv.className = 'log-json';
                jsonDiv.textContent = JSON.stringify(rawData, null, 2);
                entry.appendChild(jsonDiv);
            }
            
            logContent.appendChild(entry);
            messageCount++;
            
            // Apply current filter
            if (activeFilter !== 'all' && !matchesFilter(entry, activeFilter)) {
                entry.classList.add('hidden');
            }
            
            // Auto-scroll
            if (autoScroll) {
                entry.scrollIntoView({ behavior: 'smooth' });
            }
            
            // Limit log entries (keep last 1000)
            const entries = logContent.querySelectorAll('.log-entry');
            if (entries.length > 1000) {
                entries[0].remove();
            }
            
            updateStats();
        }

        function clearLog() {
            logContent.innerHTML = '';
            messageCount = 0;
            sentCount = 0;
            receivedCount = 0;
            errorCount = 0;
            updateStats();
            
            logMessage('SYSTEM', 'Log cleared', 'system', 'sent');
        }

        function exportLog() {
            const entries = Array.from(logContent.querySelectorAll('.log-entry')).map(entry => {
                const timestamp = entry.querySelector('.log-timestamp').textContent;
                const direction = entry.querySelector('.log-direction').textContent;
                const type = entry.querySelector('.log-type').textContent;
                const message = entry.querySelector('.log-message').textContent;
                const json = entry.querySelector('.log-json');
                
                let line = `[${timestamp}] ${direction} ${type}: ${message}`;
                if (json) {
                    line += '\n' + json.textContent;
                }
                return line;
            });
            
            const logData = entries.join('\n');
            const blob = new Blob([logData], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `m1k3-websocket-log-${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.txt`;
            a.click();
            
            URL.revokeObjectURL(url);
            logMessage('SYSTEM', 'Log exported', 'export', 'sent');
        }

        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            autoscrollBtn.textContent = autoScroll ? 'Auto-scroll' : 'Manual';
            autoscrollBtn.classList.toggle('active', autoScroll);
            
            if (autoScroll) {
                logContent.scrollTop = logContent.scrollHeight;
            }
        }

        function setFilter(filter) {
            activeFilter = filter;
            
            // Update filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            
            // Apply filter to entries
            document.querySelectorAll('.log-entry').forEach(entry => {
                if (filter === 'all' || matchesFilter(entry, filter)) {
                    entry.classList.remove('hidden');
                } else {
                    entry.classList.add('hidden');
                }
            });
        }

        function matchesFilter(entry, filter) {
            const category = entry.dataset.category;
            const type = entry.dataset.type;
            
            switch (filter) {
                case 'sent':
                    return category === 'sent';
                case 'received':
                    return category === 'received';
                case 'error':
                    return category === 'error';
                case 'emotion':
                    return type === 'emotion';
                case 'chat':
                    return type.startsWith('chat_');
                case 'state':
                    return type === 'state';
                case 'sound':
                    return type === 'sound';
                case 'metrics':
                    return type === 'metrics';
                default:
                    return true;
            }
        }

        function updateConnectionStatus(connected) {
            statusIndicator.className = `status-indicator ${connected ? 'connected' : 'disconnected'}`;
            connectionStatus.textContent = connected ? 'Connected' : 'Disconnected';
            connectBtn.textContent = connected ? 'Disconnect' : 'Connect';
            connectBtn.classList.toggle('active', connected);
        }

        function updateStats() {
            messageCountEl.textContent = messageCount;
            sentCountEl.textContent = sentCount;
            receivedCountEl.textContent = receivedCount;
            errorCountEl.textContent = errorCount;
        }

        function startMessageRateCalculation() {
            let lastCount = messageCount;
            
            setInterval(() => {
                const currentCount = messageCount;
                messageRate = currentCount - lastCount;
                lastCount = currentCount;
                messageRateEl.textContent = messageRate + '/s';
            }, 1000);
        }

        // Auto-connect on load
        setTimeout(connect, 500);
    </script>
</body>
</html>
