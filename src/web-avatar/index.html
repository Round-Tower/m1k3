<!DOCTYPE html>
<html lang="en" data-theme="terminal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1K3 AVATAR SYSTEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body class="bg-crt-dark text-crt-white min-h-screen overflow-hidden">
  <!-- Scanlines overlay -->
  <div class="scanlines"></div>

  <!-- CRT Frame -->
  <div class="crt-frame">
    <!-- Terminal Header -->
    <header class="terminal-header">
      <div class="flex items-center gap-3">
        <span class="text-crt-dim">M1K3://</span>
        <span class="crt-glow">AVATAR SYSTEM</span>
        <span class="text-crt-dim font-mono text-xs">v1.0</span>
      </div>
      <div class="flex items-center gap-2 text-xs">
        <span class="status-dot" id="status-dot"></span>
        <span id="ws-status" class="font-mono text-crt-dim">OFFLINE</span>
      </div>
    </header>

    <!-- Avatar Stage (Center) -->
    <main id="avatar-container" class="avatar-stage">
      <div id="loading" class="text-center">
        <div class="spinner mx-auto mb-4"></div>
        <div class="font-pixel text-crt-dim">LOADING MODEL...</div>
      </div>
    </main>

    <!-- Terminal Footer (Minimal Controls) -->
    <footer class="terminal-footer">
      <button class="ctrl-btn" id="btn-emotion" title="Cycle emotion">
        <span id="emotion-label">EMO</span>
      </button>
      <button class="ctrl-btn" id="btn-model" title="Change model">MDL</button>
      <button class="ctrl-btn" id="btn-random" title="Random model">RND</button>
      <button class="ctrl-btn" id="btn-activity" title="Cycle activity">ACT</button>

      <div class="flex-1"></div>

      <div class="font-pixel text-xs text-crt-dim">
        <span id="status-model">-</span>
        <span class="mx-2">|</span>
        <span id="status-anim">-</span>
      </div>
    </footer>
  </div>

  <!-- Model Selector Modal -->
  <div id="model-modal" class="modal-backdrop hidden">
    <div class="modal-panel">
      <div class="text-crt-white mb-4 border-b border-white/20 pb-2">SELECT MODEL</div>
      <div class="grid grid-cols-2 gap-2 max-h-64 overflow-y-auto" id="model-grid"></div>
      <button class="ctrl-btn w-full mt-4" id="modal-close">CLOSE</button>
    </div>
  </div>

  <script type="module">
    import { AvatarRenderer, ModelRegistry } from './src/index.ts';
    import { WebSocketBridge } from './src/communication/WebSocketBridge.ts';

    let renderer = null;
    let bridge = null;
    let currentEmotionIndex = 0;
    let currentActivityIndex = 0;

    const EMOTIONS = ['NEUTRAL', 'HAPPY', 'SAD', 'ANGRY', 'SURPRISED', 'LOVE', 'THINKING', 'SLEEPY', 'EXCITED'];
    const ACTIVITIES = ['IDLE', 'LISTENING', 'THINKING', 'GENERATING', 'SPEAKING'];
    const container = document.getElementById('avatar-container');

    function updateStatus() {
      if (!renderer) return;
      const metadata = renderer.getModelMetadata();
      const controller = renderer.getAnimationController();
      const currentAnim = controller?.getCurrentAnimation();

      document.getElementById('status-model').textContent =
        metadata?.modelPath.split('/').pop()?.replace('.glb', '').toUpperCase() || '-';
      document.getElementById('status-anim').textContent =
        currentAnim?.name?.toUpperCase() || 'IDLE';
    }

    function updateActivityClass(activity) {
      container.classList.remove('speaking', 'listening', 'thinking');
      const cls = { SPEAKING: 'speaking', LISTENING: 'listening', THINKING: 'thinking', GENERATING: 'thinking' }[activity];
      if (cls) container.classList.add(cls);
    }

    function updateConnectionStatus(connected) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('ws-status');
      if (connected) {
        dot.classList.add('online');
        dot.classList.remove('offline');
        text.textContent = 'ONLINE';
        text.classList.remove('text-crt-dim');
        text.classList.add('text-crt-white');
      } else {
        dot.classList.remove('online');
        dot.classList.add('offline');
        text.textContent = 'OFFLINE';
        text.classList.add('text-crt-dim');
        text.classList.remove('text-crt-white');
      }
    }

    function populateModelGrid() {
      const grid = document.getElementById('model-grid');
      const models = ModelRegistry.allModels;
      grid.innerHTML = models.map(m => `
        <button class="dropdown-item" data-model="${m.id}">${m.id.toUpperCase()}</button>
      `).join('');

      grid.querySelectorAll('[data-model]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const modelId = btn.dataset.model;
          document.getElementById('loading').style.display = 'block';
          document.getElementById('model-modal').classList.add('hidden');
          await renderer.loadModel(modelId);
          document.getElementById('loading').style.display = 'none';
          updateStatus();
        });
      });
    }

    async function init() {
      try {
        renderer = new AvatarRenderer({
          container: '#avatar-container',
          assetsBasePath: '/',
          enableControls: true,
          backgroundColor: '#0A0A0A',
        });

        await renderer.loadModel('colobus');
        renderer.start();
        document.getElementById('loading').style.display = 'none';
        updateStatus();

        // Connect to backend
        bridge = new WebSocketBridge({ url: 'ws://localhost:8081' });

        bridge.onConnectionChange(updateConnectionStatus);

        bridge.onAvatarStateChange((state) => {
          renderer.setState(state);
          if (state.activity) updateActivityClass(state.activity);
          if (state.emotion) {
            const idx = EMOTIONS.indexOf(state.emotion);
            if (idx >= 0) currentEmotionIndex = idx;
          }
          updateStatus();
        });

        bridge.onAvatarModelChange(async (modelId) => {
          document.getElementById('loading').style.display = 'block';
          await renderer.loadModel(modelId);
          document.getElementById('loading').style.display = 'none';
          updateStatus();
        });

        bridge.connect();
        populateModelGrid();
        console.log('[M1K3] Avatar system initialized');

      } catch (err) {
        console.error('[M1K3] Init error:', err);
        document.getElementById('loading').innerHTML = `
          <div class="text-red-400">ERROR: ${err.message}</div>
          <div class="text-crt-dim text-xs mt-2">Run: npm run dev</div>
        `;
      }
    }

    // Controls
    document.getElementById('btn-emotion').addEventListener('click', () => {
      if (!renderer) return;
      currentEmotionIndex = (currentEmotionIndex + 1) % EMOTIONS.length;
      const emotion = EMOTIONS[currentEmotionIndex];
      renderer.setState({ emotion });
      document.getElementById('emotion-label').textContent = emotion.slice(0, 3);
      updateStatus();
    });

    document.getElementById('btn-activity').addEventListener('click', () => {
      if (!renderer) return;
      currentActivityIndex = (currentActivityIndex + 1) % ACTIVITIES.length;
      const activity = ACTIVITIES[currentActivityIndex];
      renderer.setState({ activity });
      updateActivityClass(activity);
      updateStatus();
    });

    document.getElementById('btn-model').addEventListener('click', () => {
      document.getElementById('model-modal').classList.remove('hidden');
    });

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('model-modal').classList.add('hidden');
    });

    document.getElementById('btn-random').addEventListener('click', async () => {
      if (!renderer) return;
      const models = ModelRegistry.allModels;
      const model = models[Math.floor(Math.random() * models.length)];
      document.getElementById('loading').style.display = 'block';
      await renderer.loadModel(model.id);
      document.getElementById('loading').style.display = 'none';
      updateStatus();
    });

    // Close modal on backdrop click
    document.getElementById('model-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.add('hidden');
      }
    });

    init();
  </script>
</body>
</html>
