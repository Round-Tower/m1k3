<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1K3 Avatar</title>
  <style>
    :root {
      --ma-orange: #D97706;
      --ma-bg-primary: #000000;
      --ma-bg-elevated: rgba(255, 255, 255, 0.08);
      --ma-bg-elevated-2: rgba(255, 255, 255, 0.12);
      --ma-text-primary: rgba(255, 255, 255, 0.98);
      --ma-text-secondary: rgba(255, 255, 255, 0.65);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      background: var(--ma-bg-primary);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Draggable title bar */
    #titlebar {
      height: 32px;
      background: var(--ma-bg-elevated);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    #titlebar .title {
      font-size: 12px;
      font-weight: 500;
      color: var(--ma-text-secondary);
      letter-spacing: 0.5px;
    }

    #titlebar .controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    #titlebar .controls button {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #titlebar .controls button:hover {
      opacity: 0.8;
    }

    .btn-close { background: #FF5F57; }
    .btn-minimize { background: #FFBD2E; }

    /* Avatar container */
    #avatar-container {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    /* Activity indicators */
    #avatar-container.speaking::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--ma-orange), transparent);
      animation: speaking-pulse 1s ease-in-out infinite;
    }

    @keyframes speaking-pulse {
      0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
      50% { opacity: 1; transform: scaleX(1); }
    }

    #avatar-container.listening::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150px;
      height: 150px;
      transform: translate(-50%, -50%);
      border: 2px solid var(--ma-orange);
      border-radius: 50%;
      opacity: 0;
      animation: listening-ripple 2s ease-out infinite;
      pointer-events: none;
    }

    @keyframes listening-ripple {
      0% { width: 80px; height: 80px; opacity: 0.8; }
      100% { width: 200px; height: 200px; opacity: 0; }
    }

    #avatar-container.thinking::after {
      content: '';
      position: absolute;
      top: 12px;
      right: 12px;
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: var(--ma-orange);
      border-radius: 50%;
      animation: thinking-spin 0.8s linear infinite;
    }

    @keyframes thinking-spin {
      to { transform: rotate(360deg); }
    }

    /* Loading */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--ma-text-secondary);
      font-size: 12px;
    }

    #loading .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--ma-bg-elevated-2);
      border-top-color: var(--ma-orange);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Bottom controls */
    #controls {
      height: 44px;
      background: var(--ma-bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      flex-shrink: 0;
    }

    #controls button {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: var(--ma-bg-elevated-2);
      color: var(--ma-text-primary);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #controls button:hover {
      background: var(--ma-orange);
    }

    #controls button.active {
      background: var(--ma-orange);
    }

    /* Status indicator */
    #status {
      font-size: 10px;
      color: var(--ma-text-secondary);
      margin-left: auto;
    }

    #status .connected {
      color: #4ADE80;
    }

    #status .disconnected {
      color: #F87171;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <span class="title">M1K3</span>
      <div class="controls">
        <button class="btn-minimize" id="btn-minimize" title="Minimize"></button>
        <button class="btn-close" id="btn-close" title="Close"></button>
      </div>
    </div>

    <div id="avatar-container">
      <div id="loading">
        <div class="spinner"></div>
        <div>Loading...</div>
      </div>
    </div>

    <div id="controls">
      <button id="btn-mic" title="Voice input (hold)">🎤</button>
      <button id="btn-random" title="Random model">🎲</button>
      <button id="btn-emotion" title="Cycle emotion">😊</button>
      <div id="status">
        <span id="ws-status" class="disconnected">Offline</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { AvatarRenderer, ModelRegistry } from '../web-avatar/src/index.ts';
    import { WebSocketBridge } from '../web-avatar/src/communication/WebSocketBridge.ts';

    let renderer = null;
    let bridge = null;
    let currentEmotionIndex = 0;
    const container = document.getElementById('avatar-container');
    const emotionList = ['NEUTRAL', 'HAPPY', 'SAD', 'ANGRY', 'SURPRISED', 'LOVE', 'THINKING', 'SLEEPY', 'EXCITED'];

    const ACTIVITY_CLASSES = {
      SPEAKING: 'speaking',
      LISTENING: 'listening',
      THINKING: 'thinking',
      GENERATING: 'thinking',
    };

    function updateActivityClass(activity) {
      container.classList.remove('speaking', 'listening', 'thinking');
      const cls = ACTIVITY_CLASSES[activity];
      if (cls) container.classList.add(cls);
    }

    async function init() {
      try {
        renderer = new AvatarRenderer({
          container: '#avatar-container',
          // Use the web-avatar dev server for models
          assetsBasePath: 'http://localhost:5174/',
          enableControls: false,
          backgroundColor: '#000000',
        });

        await renderer.loadModel('colobus');
        renderer.start();
        document.getElementById('loading').style.display = 'none';

        // Connect to M1K3 backend via WebSocket
        bridge = new WebSocketBridge({ url: 'ws://localhost:8081' });

        bridge.onConnectionChange((connected) => {
          const el = document.getElementById('ws-status');
          el.textContent = connected ? 'Online' : 'Offline';
          el.className = connected ? 'connected' : 'disconnected';
        });

        bridge.onAvatarStateChange((state) => {
          renderer.setState(state);
          if (state.activity) updateActivityClass(state.activity);
        });

        bridge.onAvatarModelChange(async (modelId) => {
          document.getElementById('loading').style.display = 'block';
          await renderer.loadModel(modelId);
          document.getElementById('loading').style.display = 'none';
        });

        bridge.connect();
        console.log('[Popover] Initialized');

      } catch (err) {
        console.error('[Popover] Error:', err);
        document.getElementById('loading').innerHTML =
          `<div style="color:#F87171">Error: ${err.message}</div>`;
      }
    }

    // Window controls
    document.getElementById('btn-close').addEventListener('click', async () => {
      const { getCurrentWindow } = await import('@tauri-apps/api/window');
      await getCurrentWindow().hide();
    });

    document.getElementById('btn-minimize').addEventListener('click', async () => {
      const { getCurrentWindow } = await import('@tauri-apps/api/window');
      await getCurrentWindow().minimize();
    });

    // Avatar controls
    document.getElementById('btn-mic').addEventListener('mousedown', () => {
      if (renderer) {
        renderer.setState({ activity: 'LISTENING' });
        updateActivityClass('LISTENING');
      }
    });

    document.getElementById('btn-mic').addEventListener('mouseup', () => {
      if (renderer) {
        renderer.setState({ activity: 'THINKING' });
        updateActivityClass('THINKING');
        // Simulate processing
        setTimeout(() => {
          renderer.setState({ activity: 'IDLE' });
          updateActivityClass('IDLE');
        }, 2000);
      }
    });

    document.getElementById('btn-random').addEventListener('click', async () => {
      if (!renderer) return;
      const models = ModelRegistry.allModels;
      const model = models[Math.floor(Math.random() * models.length)];
      document.getElementById('loading').style.display = 'block';
      await renderer.loadModel(model.id);
      document.getElementById('loading').style.display = 'none';
    });

    document.getElementById('btn-emotion').addEventListener('click', () => {
      if (!renderer) return;
      currentEmotionIndex = (currentEmotionIndex + 1) % emotionList.length;
      const emotion = emotionList[currentEmotionIndex];
      renderer.setState({ emotion });
      // Update button emoji
      const emojis = { NEUTRAL: '😐', HAPPY: '😊', SAD: '😢', ANGRY: '😠',
        SURPRISED: '😲', LOVE: '😍', THINKING: '🤔', SLEEPY: '😴', EXCITED: '🤩' };
      document.getElementById('btn-emotion').textContent = emojis[emotion] || '😊';
    });

    init();
  </script>
</body>
</html>
