    <script>
        // Global state
        let websocket = null;
        let isConnected = false;
        let reconnectTimer = null;
        let startTime = Date.now();
        let messageCount = 1;
        let isRecording = false;
        let recognition = null;
        let audioContext = null;
        let soundsEnabled = true;
        let debugConsole = null;
        
        // Event system
        let eventBus = null;
        let statusOverlay = null;

        // Avatar state
        let currentEmotion = 'happy';
        let currentState = 'idle';
        let currentStyle = 'robot';
        let currentColor = '#E25303';
        let emotionIntensity = 50;
        let frameCount = 0;
        
        // Gameboy Pixel Engine
        let pixelEngine = null;
        
        // Canvas contexts
        let canvas = null;
        let ctx = null;
        let particleCanvas = null;
        let particleCtx = null;

        // Particle system
        let particles = [];
        let animationFrame = null;
        let animationState = { breathing: 0, time: 0 };
        
        function createParticle() {
            const size = Math.random() * 2 + 1;
            particles.push({
                x: Math.random() * particleCanvas.width,
                y: Math.random() * particleCanvas.height,
                size: size,
                speed: Math.random() * 0.5 + 0.2,
                color: `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.2})`,
                life: Math.random() * 2 + 1
            });
        }
        
        // System metrics - synced with GameboyPixelEngine structure
        let systemMetrics = {
            battery: 100,
            cpu: 0,
            memory: 0,
            temperature: 25,
            network: true,
            networkStrength: 80, // Fixed property name
            eco_savings: 0,
            ecoSavings: 0 // Alias for GameboyPixelEngine
        };
        
        // Helper function to map HTML metrics to GameboyPixelEngine format
        function mapMetricsForEngine(metrics) {
            return {
                battery: metrics.battery,
                cpu: metrics.cpu,
                memory: metrics.memory,
                temperature: metrics.temperature,
                network: metrics.network,
                networkStrength: metrics.networkStrength || metrics.wifi_strength || 80,
                ecoSavings: metrics.eco_savings || metrics.ecoSavings || 0
            };
        }

        // Initialize everything when DOM loads
        document.addEventListener('DOMContentLoaded', function() {
            initializeEventSystem();
            initializeDebugConsole();
            initializeCanvas();
            connectWebSocket();
            initializeChat();
            initializeSpeechRecognition();
            initializeAudio();
            
            // Initial canvas resize before generating avatar
            // Longer delay on mobile to ensure layout stabilization
            const isMobileDevice = window.innerWidth <= 767;
            const initDelay = isMobileDevice ? 300 : 100;
            
            setTimeout(() => {
                resizeCanvas();
                generateAvatar();
            }, initDelay);
            
            startAnimation();
            
            console.log('✅ M1K3 Enhanced Dashboard Initialized');
            
            // Add test functions to global scope for debugging
            window.testStatusOverlay = testStatusOverlay;
        });
        
        // Test function for status overlay
        function testStatusOverlay() {
            if (!eventBus) {
                console.error('Event bus not initialized');
                return;
            }
            
            console.log('🧪 Testing status overlay events...');
            
            // Test emotion update
            setTimeout(() => {
                eventBus.dispatchEvent(new CustomEvent('avatar.emotion', {
                    detail: { emotion: 'excited', intensity: 85 }
                }));
            }, 1000);
            
            // Test state update
            setTimeout(() => {
                eventBus.dispatchEvent(new CustomEvent('avatar.state', {
                    detail: { state: 'thinking' }
                }));
            }, 2000);
            
            // Test system metrics
            setTimeout(() => {
                eventBus.dispatchEvent(new CustomEvent('system.metrics', {
                    detail: { cpu: 75, memory: 60, temperature: 45 }
                }));
            }, 3000);
            
            // Test AI generation
            setTimeout(() => {
                eventBus.dispatchEvent(new CustomEvent('ai.generation', {
                    detail: { generationSpeed: 42.5, tokenCount: 128 }
                }));
            }, 4000);
            
            // Test care update
            setTimeout(() => {
                eventBus.dispatchEvent(new CustomEvent('care.update', {
                    detail: { hp: 80, nrg: 65 }
                }));
            }, 5000);
            
            console.log('✅ Status overlay test sequence started');
        }
        
        function initializeEventSystem() {
            // Create event bus
            eventBus = new EventTarget();
            
            // Initialize status overlay
            statusOverlay = new StatusOverlay({
                position: window.innerWidth <= 768 ? 'floating' : 'embedded',
                autoHide: window.innerWidth <= 768
            });
            
            // Subscribe status overlay to events
            statusOverlay.subscribe(eventBus);
            
            console.log('📡 Event system initialized');
        }

        function initializeDebugConsole() {
            debugConsole = new DebugConsole();
            
            // Bind debug console events
            const clearDebugLog = document.getElementById('clearDebugLog');
            const exportDebugLog = document.getElementById('exportDebugLog');
            const closeDebugConsole = document.getElementById('closeDebugConsole');
            
            if (clearDebugLog) {
                clearDebugLog.addEventListener('click', () => {
                    debugConsole.clear();
                });
            }
            
            if (exportDebugLog) {
                exportDebugLog.addEventListener('click', () => {
                    debugConsole.export();
                });
            }
            
            if (closeDebugConsole) {
                closeDebugConsole.addEventListener('click', () => {
                    debugConsole.toggle();
                });
            }
        }

        function mapMessageToEvent(data) {
            // Map WebSocket message types to event types
            switch (data.type) {
                case 'emotion':
                case 'avatar_emotion':
                    return 'avatar.emotion';
                case 'state':
                case 'avatar_state':
                    return 'avatar.state';
                case 'system_metrics':
                case 'system':
                    return 'system.metrics';
                case 'classification':
                case 'ai_classification':
                    return 'ai.classification';
                case 'thinking_phase':
                case 'ai_thinking':
                    return 'ai.thinking';
                case 'generation_stream':
                case 'ai_generation':
                    return 'ai.generation';
                case 'care_update':
                case 'care':
                    return 'care.update';
                default:
                    return null;
            }
        }

        function connectWebSocket() {
            try {
                websocket = new WebSocket('ws://localhost:8081');
                
                websocket.onopen = function(event) {
                    console.log('✅ Connected to M1K3 Avatar Server');
                    isConnected = true;
                    updateConnectionStatus(true);
                    playSound('connect');
                    debugConsole?.logConnection('Connected');
                    
                    // Send identification message to help with debugging
                    sendMessage({
                        type: 'client_identify', 
                        client_type: 'web_avatar',
                        timestamp: Date.now(),
                        user_agent: navigator.userAgent
                    });
                };
                
                websocket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        debugConsole?.logReceived(data);
                        
                        // Dispatch event to event bus
                        if (eventBus) {
                            const eventType = mapMessageToEvent(data);
                            if (eventType) {
                                eventBus.dispatchEvent(new CustomEvent(eventType, { detail: data }));
                            }
                        }
                        
                        // Still handle via traditional method for backward compatibility
                        handleServerMessage(data);
                    } catch (e) {
                        console.error('Error parsing message:', e);
                        debugConsole?.logError(`Parse error: ${e.message}`);
                    }
                };
                
                websocket.onclose = function(event) {
                    console.log(`🔌 Disconnected from M1K3 Avatar Server (code: ${event.code}, reason: ${event.reason})`);
                    isConnected = false;
                    updateConnectionStatus(false);
                    debugConsole?.logConnection(`Disconnected: ${event.code} - ${event.reason}`);
                    
                    if (reconnectTimer) clearTimeout(reconnectTimer);
                    if (event.code !== 1000) { // Only reconnect if not a normal closure
                        console.log('🔄 Will attempt reconnection in 3 seconds...');
                        reconnectTimer = setTimeout(connectWebSocket, 3000);
                    }
                };
                
                websocket.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    debugConsole?.logError(`WebSocket error: ${error.message || error}`);
                };
                
            } catch (e) {
                console.error('❌ Failed to connect to WebSocket:', e);
                debugConsole?.logError(`Connection failed: ${e.message}`);
                if (reconnectTimer) clearTimeout(reconnectTimer);
                console.log('🔄 Will retry connection in 5 seconds...');
                reconnectTimer = setTimeout(connectWebSocket, 5000);
            }
        }

        function sendMessage(data) {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify(data));
                debugConsole?.logSent(data);
                console.log('📤 Sent to server:', data.type || 'unknown');
            } else {
                console.warn('⚠️  WebSocket not connected, message not sent:', data);
                debugConsole?.logError(`Cannot send message - WebSocket not open: ${JSON.stringify(data)}`);
            }
        }

        // Optimized Protocol Decoder (from original)
        class M1K3Protocol {
            constructor() {
                this.MessageType = {
                    SYSTEM_UPDATE: 1,
                    AVATAR_UPDATE: 2,
                    CARE_UPDATE: 3,
                    STATE_CHANGE: 4,
                    TEXT_DISPLAY: 5,
                    PING: 6,
                    ERROR: 7
                };
                
                this.stateMap = {
                    'i': 'idle',
                    't': 'thinking',
                    'g': 'generating', 
                    's': 'speaking',
                    'e': 'error',
                    'l': 'listening'
                };
            }
            
            decodeMessage(data) {
                try {
                    // Handle binary system updates
                    if (data instanceof ArrayBuffer && data.byteLength === 11) {
                        return this.decodeSystemBinary(data);
                    }
                    
                    // Handle JSON messages - data is already a parsed object from websocket.onmessage
                    const msg = typeof data === 'string' ? JSON.parse(data) : data;
                    
                    // Route optimized messages
                    switch (msg.type) {
                        case this.MessageType.SYSTEM_UPDATE:
                            return { type: 'system', data: msg };
                        case this.MessageType.AVATAR_UPDATE:
                            return { type: 'avatar', data: msg };
                        case this.MessageType.CARE_UPDATE:
                            return { type: 'care', data: msg };
                        case this.MessageType.STATE_CHANGE:
                            return { type: 'state', data: this.stateMap[msg.s] || msg.s };
                        case this.MessageType.TEXT_DISPLAY:
                            return { type: 'text', data: msg };
                        default:
                            return { type: msg.type || 'unknown', data: msg };
                    }
                } catch (error) {
                    console.error('Protocol decode error:', error);
                    return { type: 'error', error: error.message };
                }
            }
            
            decodeSystemBinary(buffer) {
                const view = new DataView(buffer);
                return {
                    type: 'system',
                    data: {
                        bat: view.getUint8(1),
                        cpu: view.getUint8(2),
                        mem: view.getUint8(3),
                        temp: view.getUint8(4),
                        net: view.getUint8(5),
                        wifi: view.getUint8(6),
                        eco: view.getFloat32(7, false)
                    }
                };
            }
        }
        
        // Initialize protocol decoder
        const protocol = new M1K3Protocol();

        function handleServerMessage(data) {
            const decoded = protocol.decodeMessage(data);
            console.log('📨 Received:', decoded);
            updateUnifiedStats(decoded);
        }

        function updateUnifiedStats(decoded) {
            switch (decoded.type) {
                case 'system':
                case 'metrics':
                    updateSystemStats(decoded.data);
                    break;
                case 'avatar':
                case 'emotion':
                case 'state':
                    updateAvatarStats(decoded.type, decoded.data);
                    break;
                case 'classification':
                case 'thinking_phase':
                case 'generation_stream':
                case 'progress':
                    updateAIStats(decoded.type, decoded.data);
                    break;
                case 'care':
                    updateCareStats(decoded.data);
                    break;
                case 'chat_ai_chunk':
                    appendToLastMessage(decoded.data.chunk);
                    break;
                case 'chat_user':
                    addMessage(decoded.data.message, 'user');
                    break;
                case 'chat_ai_start':
                    addMessage('', 'ai');
                    showTypingIndicator(true);
                    break;
                case 'chat_ai_complete':
                    showTypingIndicator(false);
                    playSound('message_received');
                    break;
                default:
                    // Handle other message types like sound, welcome, pong, etc.
                    break;
            }
        }

        function updateSystemStats(data) {
            const systemCard = document.getElementById('systemStatus');
            if (systemCard) {
                systemCard.style.display = 'block';
                const valueElement = systemCard.querySelector('.stat-value');
                // Simple summary for now, could be more detailed
                valueElement.textContent = `CPU: ${data.cpu}% | MEM: ${data.mem}%`;
            }
            updateMetrics(data); // Keep old function for detailed updates elsewhere
        }

        function updateAvatarStats(type, data) {
            if (type === 'emotion' || data.emo) {
                updateEmotion(data.emotion || data.emo, data.intensity || data.int || 50);
            }
            if (type === 'state' || data.state) {
                updateState(data.state || data);
            }
        }

        function updateAIStats(type, data) {
            const generationCard = document.getElementById('generationStatus');
            if (generationCard) generationCard.style.display = 'block';

            if (type === 'classification') {
                updateClassificationDisplay(data);
            }
            if (type === 'thinking_phase' || type === 'progress') {
                updateThinkingPhase(data.phase || data.stage, data.progress, data.insight, data.confidence);
            }
            if (type === 'generation_stream') {
                updateGenerationStream(data.token_count, data.generation_speed, data.content_preview);
            }
        }

        function updateCareStats(data) {
            const careCard = document.getElementById('careStatus');
            if (careCard) {
                careCard.style.display = 'block';
                const valueElement = careCard.querySelector('.stat-value');
                valueElement.textContent = `❤️ ${data.hp}% | ⚡️ ${data.nrg}%`;
            }
            if (pixelEngine) {
                Object.assign(pixelEngine.avatarState, {
                    health: data.hp,
                    energy: data.nrg,
                    evolution: data.evo,
                    mood: data.mood
                });
            }
        }

        function resizeCanvas() {
            const container = document.querySelector('.canvas-container');
            const avatarContainer = document.querySelector('.avatar-container');
            
            if (!container || !canvas) return;
            
            // Get device pixel ratio for high-DPI displays
            const devicePixelRatio = window.devicePixelRatio || 1;
            const isMobile = window.innerWidth <= 767;
            
            // Get actual available dimensions
            const rect = container.getBoundingClientRect();
            let availableWidth = rect.width;
            let availableHeight = rect.height;
            
            // Account for CSS padding: mobile has no padding, desktop uses --space-sm (8px)
            const padding = isMobile ? 0 : 16; // No padding on mobile, 8px * 2 on desktop
            availableWidth -= padding;
            availableHeight -= padding;
            
            // Calculate optimal canvas size - allow rectangular on mobile for full width
            let canvasWidth, canvasHeight;
            
            if (isMobile) {
                // On mobile, use full width and maintain reasonable height
                canvasWidth = Math.floor(availableWidth * 0.98);
                canvasHeight = Math.floor(availableHeight * 0.98);
                
                // Ensure we don't exceed viewport constraints
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const maxMobileWidth = Math.floor(viewportWidth * 0.95);
                const maxMobileHeight = Math.floor(viewportHeight * 0.65);
                
                canvasWidth = Math.min(canvasWidth, maxMobileWidth);
                canvasHeight = Math.min(canvasHeight, maxMobileHeight);
                
                console.log(`📱 Mobile sizing: viewport ${viewportWidth}x${viewportHeight}, canvas ${canvasWidth}x${canvasHeight}`);
            } else {
                // Desktop: maintain square aspect ratio
                const size = Math.min(availableWidth, availableHeight);
                const finalSize = Math.max(size, 200);
                canvasWidth = canvasHeight = Math.floor(finalSize);
            }
            
            // Ensure minimum sizes for readability
            const minSize = isMobile ? 150 : 200;
            canvasWidth = Math.max(canvasWidth, minSize);
            canvasHeight = Math.max(canvasHeight, minSize);
            
            console.log(`📐 Resizing canvas to ${canvasWidth}x${canvasHeight} (available: ${availableWidth}x${availableHeight}, mobile: ${isMobile}, DPR: ${devicePixelRatio})`);
            
            // Update canvas dimensions - let GameboyPixelEngine handle the context
            if (canvas) {
                // Set the CSS size (what users see)
                canvas.style.width = canvasWidth + 'px';
                canvas.style.height = canvasHeight + 'px';
                
                // For high-DPI displays, use higher internal resolution
                // But keep it simpler for mobile compatibility
                const internalWidth = isMobile ? canvasWidth : Math.floor(canvasWidth * Math.min(devicePixelRatio, 2));
                const internalHeight = isMobile ? canvasHeight : Math.floor(canvasHeight * Math.min(devicePixelRatio, 2));
                canvas.width = internalWidth;
                canvas.height = internalHeight;
                
                console.log(`🖼️ Canvas: CSS ${canvasWidth}x${canvasHeight}, internal ${internalWidth}x${internalHeight}`);
            }
            
            if (particleCanvas) {
                // Same treatment for particle canvas
                particleCanvas.style.width = canvasWidth + 'px';
                particleCanvas.style.height = canvasHeight + 'px';
                
                const internalParticleWidth = isMobile ? canvasWidth : Math.floor(canvasWidth * Math.min(devicePixelRatio, 2));
                const internalParticleHeight = isMobile ? canvasHeight : Math.floor(canvasHeight * Math.min(devicePixelRatio, 2));
                particleCanvas.width = internalParticleWidth;
                particleCanvas.height = internalParticleHeight;
            }
            
            // Reinitialize pixel engine with the CSS size (not internal resolution)
            if (pixelEngine && pixelEngine.updateDimensions) {
                pixelEngine.updateDimensions(canvasWidth, canvasHeight);
            } else if (pixelEngine) {
                // Fallback: reinitialize avatar
                generateAvatar();
            }
        }

        function initializeCanvas() {
            canvas = document.getElementById('avatarCanvas');
            particleCanvas = document.getElementById('particleCanvas');
            
            if (particleCanvas) {
                particleCtx = particleCanvas.getContext('2d');
            }
            
            // Create initial particles
            if (particleCtx) {
                for (let i = 0; i < 20; i++) {
                    createParticle();
                }
            }
            
            // Set up resize observer for dynamic scaling
            if (typeof ResizeObserver !== 'undefined') {
                const resizeObserver = new ResizeObserver(() => {
                    // Debounce resize calls
                    clearTimeout(window.canvasResizeTimeout);
                    window.canvasResizeTimeout = setTimeout(() => {
                        resizeCanvas();
                    }, 100);
                });
                
                const container = document.querySelector('.canvas-container');
                if (container) {
                    resizeObserver.observe(container);
                    console.log('📏 ResizeObserver attached to canvas container');
                }
            } else {
                console.warn('ResizeObserver not supported, using window resize');
            }
            
            // Always add window resize listener for mobile orientation changes
            window.addEventListener('resize', () => {
                clearTimeout(window.canvasResizeTimeout);
                window.canvasResizeTimeout = setTimeout(() => {
                    console.log('🔄 Window resize triggered');
                    resizeCanvas();
                }, 150); // Slightly longer delay for mobile
            });
            
            // Specific handling for mobile orientation changes
            window.addEventListener('orientationchange', () => {
                console.log('📱 Orientation change detected');
                setTimeout(() => {
                    resizeCanvas();
                }, 300); // Longer delay for orientation change
            });
            
            // Initial canvas sizing will be handled by resizeCanvas()
            
            // Polyfill for roundRect if not available
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius = 0) {
                    if (radius === 0) {
                        this.rect(x, y, width, height);
                        return;
                    }
                    
                    this.moveTo(x + radius, y);
                    this.lineTo(x + width - radius, y);
                    this.arcTo(x + width, y, x + width, y + radius, radius);
                    this.lineTo(x + width, y + height - radius);
                    this.arcTo(x + width, y + height, x + width - radius, y + height, radius);
                    this.lineTo(x + radius, y + height);
                    this.arcTo(x, y + height, x, y + height - radius, radius);
                    this.lineTo(x, y + radius);
                    this.arcTo(x, y, x + radius, y, radius);
                };
            }

            // Initialize Enhanced Gameboy Pixel Engine with styled pixels
            if (typeof GameboyPixelEngine !== 'undefined' && canvas) {
                try {
                    pixelEngine = new GameboyPixelEngine(canvas, {
                        pixelSize: 12, // Larger pixels for visibility (was 6)
                        mode: 'avatar',
                        enableCare: true,
                        enableEInk: false,
                        debugMode: true
                    });
                    
                    // Direct initialization like index.html
                    // Switch to monochrome palette for consistency  
                    pixelEngine.currentPalette = pixelEngine.palettes.monochrome;
                    console.log('🎨 Current palette:', pixelEngine.currentPalette);
                    console.log('🎨 Background color (palette[0]):', pixelEngine.currentPalette[0]);
                    
                    // Set initial system state with proper mapping
                    if (pixelEngine.updateSystemState) {
                        pixelEngine.updateSystemState(mapMetricsForEngine(systemMetrics));
                    }
                    
                    // Debug: Check if methods exist
                    console.log('🔍 setAvatar method exists:', typeof pixelEngine.setAvatar === 'function');
                    console.log('🔍 animate method exists:', typeof pixelEngine.animate === 'function');
                    console.log('🔍 renderAvatar method exists:', typeof pixelEngine.renderAvatar === 'function');
                    
                    // Set initial avatar state
                    pixelEngine.setAvatar({
                        emotion: 'happy',
                        style: 'robot',
                        color: '#E25303',
                        intensity: 70
                    });
                    
                    // Force immediate render to ensure visibility
                    pixelEngine.renderAvatar();
                    
                    
                    // Use built-in animation system (sets isAnimating flag correctly)
                    console.log('🔍 isAnimating before startAnimationLoop:', pixelEngine.isAnimating);
                    pixelEngine.startAnimationLoop();
                    console.log('🔍 isAnimating after startAnimationLoop:', pixelEngine.isAnimating);
                    
                    console.log('✅ M1K3 Avatar system initialized with built-in animation');
                    
                } catch (error) {
                    console.error('❌ Failed to initialize GameboyPixelEngine:', error);
                    pixelEngine = null;
                }
            } else {
                console.warn('⚠️ GameboyPixelEngine not loaded or canvas not available, using fallback avatar rendering');
            }
        }

        function initializeChat() {
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendButton');
            
            if (chatInput) {
                chatInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendChatMessage();
                    }
                });
                
                // Auto-resize textarea
                chatInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
                });
            }
            
            if (sendBtn) {
                sendBtn.addEventListener('click', sendChatMessage);
            }
            
        }

        function initializeSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';
                
                const voiceButton = document.getElementById('voiceButton');
                if (voiceButton) {
                    voiceButton.addEventListener('mousedown', startRecording);
                    voiceButton.addEventListener('mouseup', stopRecording);
                    voiceButton.addEventListener('mouseleave', stopRecording);
                    
                    // Touch events for mobile
                    voiceButton.addEventListener('touchstart', startRecording);
                    voiceButton.addEventListener('touchend', stopRecording);
                }
            }
        }

        function initializeAudio() {
            // Initialize Web Audio API for sound effects (delayed until user interaction)
        }

        function generateAvatar() {
            if (pixelEngine) {
                // Update avatar state with current settings
                pixelEngine.avatarState.mood = currentEmotion;
                pixelEngine.avatarState.health = emotionIntensity;
                
                // Update system state
                pixelEngine.updateSystemState(mapMetricsForEngine(systemMetrics));
                
                // Render the avatar
                pixelEngine.renderAvatar();
            } else {
                // Fallback avatar rendering
                if (!canvas) return;
                const fallbackCtx = canvas.getContext('2d');
                if (!fallbackCtx) return;
                
                fallbackCtx.clearRect(0, 0, 768, 576);
                
                const centerX = 384; // Center of 768px width
                const centerY = 288; // Center of 576px height  
                const size = 80;
                
                fallbackCtx.fillStyle = currentColor || '#E25303';
                fallbackCtx.beginPath();
                fallbackCtx.arc(centerX, centerY, size/2, 0, Math.PI * 2);
                fallbackCtx.fill();
                
                // Eyes
                fallbackCtx.fillStyle = '#FFFFFF';
                fallbackCtx.beginPath();
                fallbackCtx.arc(centerX - 15, centerY - 10, 5, 0, Math.PI * 2);
                fallbackCtx.arc(centerX + 15, centerY - 10, 5, 0, Math.PI * 2);
                fallbackCtx.fill();
            }
        }

        function startAnimation() {
            function animate() {
                animationState.time += 0.016;
                animationState.breathing = Math.sin(animationState.time * 2) * 0.5 + 0.5;
                
                // Let GameboyPixelEngine handle its own animation loop
                // Only handle particles and HTML-specific animations here
                if (!pixelEngine) {
                    generateAvatar(); // Fallback for when pixelEngine not loaded
                }
                
                updateParticles();
                animationFrame = requestAnimationFrame(animate);
            }
            animate();
        }

        // Additional helper functions
        function updateConnectionStatus(connected) {
            const statusDot = document.getElementById('statusDot');
            const textElement = document.getElementById('connectionText');
            
            if (statusDot && textElement) {
                if (connected) {
                    statusDot.classList.remove('offline');
                    textElement.textContent = 'Connected';
                } else {
                    statusDot.classList.add('offline');
                    textElement.textContent = 'Disconnected';
                }
            }
        }

        function updateEmotion(emotion, intensity, message, metadata) {
            currentEmotion = emotion;
            emotionIntensity = intensity;
            
            // Trigger event for StatusOverlay
            if (eventBus) {
                eventBus.dispatchEvent(new CustomEvent('avatar.emotion', { 
                    detail: { emotion, intensity, metadata, message }
                }));
            }
            
            // Legacy DOM update (for backward compatibility)
            const emotionIndicator = document.getElementById('emotionStatus');
            if (emotionIndicator) {
                emotionIndicator.querySelector('.stat-value').textContent = `${getEmotionEmoji(emotion)} ${emotion.charAt(0).toUpperCase() + emotion.slice(1)}`;
            }
            
            if (pixelEngine && pixelEngine.setEmotion) {
                // Use the new API method
                pixelEngine.setEmotion(emotion, intensity);
            } else if (pixelEngine && pixelEngine.avatarState && pixelEngine.renderAvatar) {
                // Fallback to direct state manipulation
                pixelEngine.avatarState.mood = emotion;
                pixelEngine.avatarState.health = intensity;
                pixelEngine.avatarState.lastInteraction = Date.now();
                pixelEngine.renderAvatar();
                console.log(`🎭 Avatar emotion updated: ${emotion} (${intensity}%)`);
            } else {
                generateAvatar();
            }
            
            // Update classification display if metadata available
            if (metadata) {
                updateClassificationDisplay(metadata);
            }
            
            if (message) {
                console.log('Emotion message:', message);
            }
        }
        
        function updateClassificationDisplay(classification) {
            console.log('🧠 Classification:', classification);
            const confidenceElement = document.getElementById('confidenceStatus');
            if (confidenceElement && classification.confidence) {
                const confidence = (classification.confidence * 100).toFixed(1);
                confidenceElement.querySelector('.stat-value').textContent = `${confidence}%`;
            }
        }
        
        function updateThinkingPhase(phase, progress, insight, confidence) {
            console.log('🤔 Thinking phase:', phase, `${progress}%`);
            updateState(phase); // Still useful for avatar state changes
            const generationCard = document.getElementById('generationStatus');
            if (generationCard) {
                const valueElement = generationCard.querySelector('.stat-value');
                valueElement.textContent = `${phase}: ${progress}%`;
            }
        }
        
        function updateGenerationStream(tokenCount, generationSpeed, contentPreview) {
            console.log('⚡ Generation:', `${tokenCount} tokens @ ${generationSpeed.toFixed(1)} tok/s`);
            const generationCard = document.getElementById('generationStatus');
            if (generationCard) {
                const valueElement = generationCard.querySelector('.stat-value');
                valueElement.textContent = `${generationSpeed.toFixed(1)} tok/s`;
            }
        }

        function updateState(state) {
            currentState = state;
            
            // Trigger event for StatusOverlay
            if (eventBus) {
                eventBus.dispatchEvent(new CustomEvent('avatar.state', { 
                    detail: { state }
                }));
            }
            
            // Legacy DOM update (for backward compatibility)
            const stateIndicator = document.getElementById('stateStatus');
            if (stateIndicator) {
                stateIndicator.querySelector('.stat-value').textContent = `${getStateEmoji(state)} ${state.charAt(0).toUpperCase() + state.slice(1)}`;
            }
            
            if (pixelEngine && pixelEngine.setState) {
                // Use the new API method
                pixelEngine.setState(state);
            } else if (pixelEngine && pixelEngine.avatarState && pixelEngine.renderAvatar) {
                // Fallback to direct state manipulation
                const stateMoodMap = {
                    'idle': 'sleepy',
                    'thinking': 'thinking', 
                    'generating': 'excited',
                    'speaking': 'happy',
                    'error': 'sad'
                };
                pixelEngine.avatarState.mood = stateMoodMap[state] || 'happy';
                pixelEngine.avatarState.lastInteraction = Date.now();
                pixelEngine.renderAvatar();
                console.log(`🔄 State changed: ${state}`);
            }
            
            const avatarDisplay = document.getElementById('avatarDisplay');
            if (avatarDisplay) {
                avatarDisplay.className = 'avatar-container ' + state;
            }
        }

        function updateStyle(style, color) {
            currentStyle = style;
            if (color) {
                currentColor = color;
            }
            
            if (pixelEngine && pixelEngine.setStyle) {
                // Use the new API method
                pixelEngine.setStyle(style, color);
            } else if (pixelEngine && pixelEngine.palettes && pixelEngine.renderAvatar) {
                // Fallback to direct style manipulation
                currentStyle = style;
                currentColor = color;
                
                // Switch palettes based on style
                const stylePaletteMap = {
                    'robot': 'monochrome',
                    'organic': 'forest',
                    'crystal': 'crystal',
                    'ghost': 'ocean',
                    'energy': 'sunset',
                    'cute': 'classic'
                };
                
                const paletteKey = stylePaletteMap[style] || 'monochrome';
                if (pixelEngine.palettes[paletteKey]) {
                    pixelEngine.currentPalette = pixelEngine.palettes[paletteKey];
                }
                
                pixelEngine.renderAvatar();
                console.log(`🎨 Style updated: ${style} with ${paletteKey} palette`);
            } else {
                generateAvatar();
            }
        }

        function updateProgress(stage, progress, tokens, message) {
            console.log(`Progress: ${stage} - ${progress}% (${tokens} tokens)`);
            
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            if (progressBar && progressFill) {
                if (progress > 0) {
                    progressBar.style.display = 'block';
                    progressFill.style.width = progress + '%';
                } else {
                    progressBar.style.display = 'none';
                }
            }
        }

        function updateMetrics(data) {
            // Handle optimized protocol data formats
            if (data.type === 'system') {
                // Direct system metrics update
                Object.assign(systemMetrics, {
                    battery: data.bat || data.battery,
                    cpu: data.cpu,
                    memory: data.mem || data.memory,
                    temperature: data.temp || data.temperature,
                    network: data.net !== undefined ? !!data.net : data.network,
                    wifi_strength: data.wifi || data.wifi_strength,
                    eco_savings: data.eco || data.eco_savings || systemMetrics.eco_savings
                });
                
                // Update pixel engine
                if (pixelEngine) {
                    pixelEngine.updateSystemState(mapMetricsForEngine(systemMetrics));
                }
                
                console.log('📊 System metrics updated:', systemMetrics);
                return;
            }
            
            // Legacy format support
            if (data.eco_metrics) {
                const { energy_saved, water_saved, co2_saved } = data.eco_metrics;
                
                const energyElement = document.getElementById('energySaved');
                const waterElement = document.getElementById('waterSaved');
                const co2Element = document.getElementById('co2Saved');
                
                if (energyElement) energyElement.textContent = `${energy_saved} Wh`;
                if (waterElement) waterElement.textContent = `${water_saved} ml`;
                if (co2Element) co2Element.textContent = `${co2_saved}g`;
                
                // Update system metrics for care mechanics
                systemMetrics.eco_savings = parseFloat(energy_saved) || 0;
            }
            
            // Update system metrics (legacy format)
            if (data.system_metrics) {
                Object.assign(systemMetrics, data.system_metrics);
                
                // Update pixel engine with new system state
                if (pixelEngine) {
                    pixelEngine.updateSystemState(mapMetricsForEngine(systemMetrics));
                }
            }
            
            console.log('Metrics update:', data);
        }

        function addMessage(message, sender) {
            const chatMessages = document.getElementById('chatMessages');
            if (!chatMessages) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            const text = document.createElement('div');
            text.className = 'message-text';
            text.textContent = message;
            
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString();
            
            content.appendChild(text);
            content.appendChild(time);
            messageDiv.appendChild(content);
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            messageCount++;
        }

        function appendToLastMessage(chunk) {
            const chatMessages = document.getElementById('chatMessages');
            if (!chatMessages) return;
            
            const lastMessage = chatMessages.lastElementChild;
            if (lastMessage && lastMessage.classList.contains('ai')) {
                const textElement = lastMessage.querySelector('.message-text');
                if (textElement) {
                    textElement.textContent += chunk;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }
        }

        function showTypingIndicator(show) {
            const chatMessages = document.getElementById('chatMessages');
            if (!chatMessages) return;
            
            const existingIndicator = chatMessages.querySelector('.typing-indicator');
            if (existingIndicator) {
                existingIndicator.remove();
            }
            
            if (show) {
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.innerHTML = `
                    <span>M1K3 is thinking</span>
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                chatMessages.appendChild(indicator);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        function sendChatMessage() {
            const chatInput = document.getElementById('chatInput');
            if (!chatInput || !chatInput.value.trim()) return;
            
            const message = chatInput.value.trim();
            addMessage(message, 'user');
            
            sendMessage({
                type: 'chat_user',
                message: message
            });
            
            chatInput.value = '';
            chatInput.style.height = 'auto';
        }

        function startRecording() {
            if (recognition && !isRecording) {
                isRecording = true;
                const voiceButton = document.getElementById('voiceButton');
                if (voiceButton) {
                    voiceButton.classList.add('recording');
                }
                
                recognition.start();
                
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    const chatInput = document.getElementById('chatInput');
                    if (chatInput) {
                        chatInput.value = transcript;
                    }
                };
            }
        }

        function stopRecording() {
            if (recognition && isRecording) {
                isRecording = false;
                const voiceButton = document.getElementById('voiceButton');
                if (voiceButton) {
                    voiceButton.classList.remove('recording');
                }
                recognition.stop();
            }
        }

        function playSound(soundName) {
            if (!soundsEnabled) return;
            console.log('Playing sound:', soundName);
        }

        function updateParticles() {
            if (!particleCtx) return;
            
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            particles = particles.filter(particle => {
                particle.y -= particle.speed;
                particle.life -= 0.01;
                
                if (particle.life > 0) {
                    particleCtx.globalAlpha = particle.life;
                    particleCtx.fillStyle = particle.color;
                    particleCtx.fillRect(particle.x, particle.y, particle.size, particle.size);
                    return true;
                }
                return false;
            });

            if (Math.random() > 0.95) {
                createParticle();
            }
        }

        function getEmotionEmoji(emotion) {
            const emojiMap = {
                'happy': '😊',
                'sad': '😢', 
                'angry': '😠',
                'surprised': '😲',
                'love': '😍',
                'thinking': '🤔',
                'sleepy': '😴',
                'excited': '🤩'
            };
            return emojiMap[emotion] || '😊';
        }

            const stateMap = {
                'idle': '💤',
                'thinking': '🤔',
                'pre_thinking': '🧠',
                'analyzing': '🔍',

        }
        
        function getIntentEmoji(intent) {
            const intentMap = {
                'mathematical_calculation': '🧮',
                'code_debugging': '🐛',
                'factual_query': '❓',
                'explanation_request': '💡',

                'creative_writing': '✍️',
                'brainstorming': '💭',
                'casual_conversation': '💬',
                'greeting': '👋',

        function getStrategyEmoji(strategy) {

                'deterministic': '🎯',
                'balanced': '⚖️',
                'creative': '🎨',
                'conversational': '💬',
                'structured': '📊',

            return strategyMap[strategy] || '⚖️';
        }
        
        function getConfidenceLevel(confidence) {
            if (confidence >= 0.8) return 'high';
            if (confidence >= 0.5) return 'medium';
            return 'low';
        }

        // Debug Console class
        if (typeof DebugConsole === 'undefined') {
            window.DebugConsole = class DebugConsole {
                constructor() {
                    this.messages = [];
                    this.visible = false;
                    this.consoleElement = document.getElementById('debugConsole');
                    this.sentCount = 0;
                    this.receivedCount = 0;
                }
                
                toggle() {
                    this.visible = !this.visible;
                    if (this.consoleElement) {
                        this.consoleElement.style.display = this.visible ? 'flex' : 'none';
                    }
                }
                
                logConnection(status) {
                    this.log(`Connection ${status}`, 'info');
                    this.updateConnectionStatus(status);
                }
                
                logSent(data) {
                    this.log(`SENT: ${data.type}`, 'sent');
                    this.sentCount++;
                    this.updateStats();
                }
                
                logReceived(data) {
                    this.log(`RECEIVED: ${data.type}`, 'received');
                    this.receivedCount++;
                    this.updateStats();
                }
                
                logError(error) {
                    this.log(`ERROR: ${error}`, 'error');
                }
                
                log(message, type) {
                    const timestamp = new Date().toLocaleTimeString();
                    const logEntry = { timestamp, message, type };
                    this.messages.push(logEntry);
                    
                    const messagesContainer = document.getElementById('debugMessages');
                    if (messagesContainer) {
                        const entry = document.createElement('div');
                        entry.className = `debug-message ${type}`;
                        entry.innerHTML = `
                            <span class="debug-timestamp">${timestamp}</span>
                            <span class="debug-type">[${type.toUpperCase()}]</span>
                            <span class="debug-content">${message}</span>
                        `;
                        messagesContainer.appendChild(entry);
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }
                }
                
                updateStats() {
                    const sentElement = document.getElementById('debugSentCount');
                    const receivedElement = document.getElementById('debugReceivedCount');
                    const activityElement = document.getElementById('debugLastActivity');
                    
                    if (sentElement) sentElement.textContent = this.sentCount;
                    if (receivedElement) receivedElement.textContent = this.receivedCount;
                    if (activityElement) activityElement.textContent = new Date().toLocaleTimeString();
                }
                
                updateConnectionStatus(status) {
                    const statusElement = document.getElementById('debugConnectionStatus');
                    if (statusElement) {
                        statusElement.textContent = status;
                    }
                }
                
                clear() {
                    this.messages = [];
                    const messagesContainer = document.getElementById('debugMessages');
                    if (messagesContainer) {
                        messagesContainer.innerHTML = `
                            <div class="debug-message info">
                                <span class="debug-timestamp">${new Date().toLocaleTimeString()}</span>
                                <span class="debug-type">[INFO]</span>
                                <span class="debug-content">Debug console cleared</span>
                            </div>
                        `;
                    }
                }
                
                export() {
                    const data = JSON.stringify(this.messages, null, 2);
                    const blob = new Blob([data], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `m1k3-debug-log-${Date.now()}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            };
        }
    </script>
