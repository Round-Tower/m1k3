<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- M1K3 phosphor mark: a pixel "M" on a dark CRT tile. Self-hosted, no CDN. -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <g fill="#ffffff">
    <rect x="6" y="6" width="4" height="4"/><rect x="22" y="6" width="4" height="4"/>
    <rect x="6" y="10" width="4" height="4"/><rect x="10" y="10" width="4" height="4"/><rect x="18" y="10" width="4" height="4"/><rect x="22" y="10" width="4" height="4"/>
    <rect x="6" y="14" width="4" height="4"/><rect x="14" y="14" width="4" height="4"/><rect x="22" y="14" width="4" height="4"/>
    <rect x="6" y="18" width="4" height="4"/><rect x="22" y="18" width="4" height="4"/>
    <rect x="6" y="22" width="4" height="4"/><rect x="22" y="22" width="4" height="4"/>
  </g>
</svg>
