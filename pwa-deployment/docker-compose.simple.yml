# M1K3 PWA Simple Development Environment
services:
  m1k3-pwa:
    build:
      context: .
      dockerfile: Dockerfile.simple
    ports:
      - "8080:80"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s