name: M1K3 PWA Build and Deploy

on:
  push:
    branches: [ main, master ]
    paths:
      - 'pwa-deployment/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'pwa-deployment/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: m1k3-pwa

jobs:
  test:
    name: Test Backend Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pwa-deployment
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov
    
    - name: Run backend tests
      run: |
        pytest backend/tests/ -v --cov=backend --cov-report=xml
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./pwa-deployment/coverage.xml
        flags: backend
        name: backend-coverage

  frontend-test:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pwa-deployment/frontend
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install serve for testing
      run: npm install -g serve
      
    - name: Validate HTML
      run: |
        # Basic HTML validation
        grep -q "<!DOCTYPE html>" index.html
        grep -q "manifest.json" index.html
        grep -q "sw.js" index.html
        echo "✅ HTML structure valid"
        
    - name: Validate PWA Manifest
      run: |
        # Validate manifest.json structure
        python3 -c "
        import json
        with open('manifest.json') as f:
            manifest = json.load(f)
        assert 'name' in manifest
        assert 'icons' in manifest
        assert 'start_url' in manifest
        print('✅ PWA manifest valid')
        "
        
    - name: Check Service Worker
      run: |
        # Validate service worker structure
        grep -q "addEventListener.*install" sw.js
        grep -q "addEventListener.*activate" sw.js  
        grep -q "addEventListener.*fetch" sw.js
        echo "✅ Service Worker structure valid"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, frontend-test]
    defaults:
      run:
        working-directory: ./pwa-deployment
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./pwa-deployment
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    
    steps:
    - name: Deploy to staging environment
      run: |
        echo "🚀 Deploying to staging..."
        echo "Image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
        # Add your deployment commands here
        # Examples:
        # - kubectl apply -f k8s/
        # - docker run --rm -d -p 8080:80 $IMAGE
        # - SSH to server and pull/restart container
        
    - name: Run smoke tests
      run: |
        echo "🧪 Running smoke tests..."
        # Wait for deployment
        sleep 30
        # Test basic endpoints
        # curl -f http://staging.example.com/health || exit 1
        # curl -f http://staging.example.com/api/models || exit 1
        echo "✅ Smoke tests passed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: Deploy to production environment
      run: |
        echo "🎯 Deploying to production..."
        echo "Image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
        # Add your production deployment commands here
        
    - name: Run production health checks
      run: |
        echo "🏥 Running production health checks..."
        # Production smoke tests
        echo "✅ Production deployment successful"

  notification:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
    - name: Notify success
      if: needs.deploy-production.result == 'success'
      run: |
        echo "🎉 M1K3 PWA successfully deployed to production!"
        # Add notification logic (Slack, Discord, email, etc.)
        
    - name: Notify failure
      if: needs.deploy-production.result == 'failure'
      run: |
        echo "❌ M1K3 PWA deployment failed"
        # Add failure notification logic