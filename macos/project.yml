# M1K3 — macOS app shell (XcodeGen)
#
# Source of truth for M1K3.xcodeproj. Regenerate with `xcodegen generate`; the
# pbxproj is a build artifact, not hand-maintained — this sidesteps the stale-
# settings / ID-churn trap of copying a hand-authored project from another repo.
#
# The app target is a thin SwiftUI shell over the local SwiftPM package at `.`
# (same package `swift test` drives). macOS 26 Tahoe only: real Liquid Glass +
# on-device Foundation Models. App-sandboxed + hardened from day one so the
# runtime constraints the unit tests can't see (sandbox file paths, entitlements)
# surface now, not at ship.
#
# Signed: Kev + claude-opus-4-8, 2026-06-06, Confidence 0.8, Prior: Unknown

name: M1K3

options:
  bundleIdPrefix: app.m1k3
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # A STABLE signing identity is load-bearing, not cosmetic: macOS keys both the
    # Keychain ACL and TCC (microphone / Speech) grants to the app's code-signing
    # identity. An empty team here makes every `xcodegen generate` fall back to bare
    # ad-hoc linker-signing, whose cdhash changes each build — so the app looks
    # brand-new every launch: the Keychain re-prompts for the password and Speech
    # authorization silently fails (transcripts capture nothing). Pinning the Round
    # Tower team gives one consistent identity → grants persist, entitlements +
    # sandbox actually apply.
    # Signed: Kev + claude-opus-4-8, 2026-06-12, Confidence 0.9, Prior: Unknown
    DEVELOPMENT_TEAM: "76DJH43A4P"
    CODE_SIGN_STYLE: Automatic

packages:
  M1K3:
    path: .

# The shared mobile shell (iOS + visionOS): one source list, one dependency set,
# so the two platform targets can't silently drift apart. This was a pair of YAML
# anchors hanging off M1K3iOS until 2026-07-20 — promoted to a real XcodeGen
# template when the targets first needed to DIVERGE (app-icon assets: Icon
# Composer can't author visionOS icons, so each carries its own). A target's own
# `sources:` are appended to the template's, which is what makes that possible.
targetTemplates:
  MobileShell:
    sources:
      - path: M1K3iOSApp
      # Shared, cross-platform look-and-feel lifted from the macOS app target:
      # the procedural pixel-face avatar (now #if-guarded for UIColor), its
      # emotion→colour map (pure SwiftUI), the reading modes (ReadingMode enum +
      # ReadingText renderer — zero AppKit), the Silkscreen pixel brand font,
      # and the OpenDyslexic faces the dyslexia reading mode needs
      # (BundledFonts.register() already lists them; it silently skips missing
      # resources, so the .otf lines below are load-bearing).
      - path: M1K3App/AvatarView.swift
      - path: M1K3App/AvatarEmotion+SwiftUI.swift
      - path: M1K3App/PixelFont.swift
      - path: M1K3App/ReadingMode.swift
      - path: M1K3App/ReadingText.swift
      - path: M1K3App/Resources/Fonts/Silkscreen-Regular.ttf
        buildPhase: resources
      - path: M1K3App/Resources/Fonts/Silkscreen-Bold.ttf
        buildPhase: resources
      - path: M1K3App/Resources/Fonts/OpenDyslexic-Regular.otf
        buildPhase: resources
      - path: M1K3App/Resources/Fonts/OpenDyslexic-Bold.otf
        buildPhase: resources
    dependencies:
      # The portable package pipeline (protocol-seam first, so it cross-compiles):
      # RAG chat + knowledge + memory + inference + MLX + the agent tool loop +
      # the avatar. NO Kokoro/WhisperKit/Calls/MCP — voice + the in-app server are
      # Phase-B. M1K3Preview links transitively via M1K3AgentTools.
      - package: M1K3
        product: M1K3Chat
      - package: M1K3
        product: M1K3Knowledge
      - package: M1K3
        product: M1K3Memory
      - package: M1K3
        product: M1K3MemoryChatBridge
      - package: M1K3
        product: M1K3Inference
      - package: M1K3
        product: M1K3Agent
      - package: M1K3
        product: M1K3AgentTools
      - package: M1K3
        product: M1K3KnowledgeTools
      - package: M1K3
        product: M1K3MLX
      - package: M1K3
        product: M1K3Avatar

targets:
  M1K3:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: M1K3App
      # Icon Composer (.icon) app icon — referenced as a single file so XcodeGen
      # doesn't recurse into the bundle; actool compiles it via APPICON_NAME below.
      - path: M1K3.icon
        type: file
        buildPhase: resources
    dependencies:
      - package: M1K3
        product: M1K3Chat
      - package: M1K3
        product: M1K3Knowledge
      - package: M1K3
        product: M1K3Inference
      - package: M1K3
        product: M1K3Voice
      - package: M1K3
        product: M1K3Agent
      - package: M1K3
        product: M1K3LanguageModel
      - package: M1K3
        product: M1K3KnowledgeTools
      - package: M1K3
        product: M1K3AgentTools
      - package: M1K3
        product: M1K3MLX
      - package: M1K3
        product: M1K3WhisperKit
      - package: M1K3
        product: M1K3Calls
      - package: M1K3
        product: M1K3Avatar
      - package: M1K3
        product: M1K3Kokoro
      - package: M1K3
        product: M1K3MCPKit
      - package: M1K3
        product: M1K3MCPLog
      - package: M1K3
        product: M1K3Eval
      - package: M1K3
        product: M1K3Launch
      - package: M1K3
        product: M1K3Memory
      - package: M1K3
        product: M1K3MemoryChatBridge
      - package: M1K3
        product: M1K3MemoryViz
      - package: M1K3
        product: M1K3Preview
      - package: M1K3
        product: M1K3Diagnostics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.m1k3
        PRODUCT_NAME: M1K3
        ASSETCATALOG_COMPILER_APPICON_NAME: M1K3
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Kevin Murphy"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        # DEFAULT to the App-Store-SAFE entitlements (no audioanalyticsd
        # mach-lookup exception, which ITMS-90285 rejects). The privileged direct-
        # distribution set (M1K3.entitlements, with the exception) is an explicit
        # OPT-IN in release-macos.sh's archive override — so any path that DOESN'T
        # opt in (Xcode Organizer "Distribute App", the Xcode Cloud Release archive,
        # release-mas.sh) is App-Store-safe by default. Least privilege as the
        # default; the dangerous entitlement can only ship if a script asks for it.
        # (Build 53 was rejected because the old default leaked the exception into a
        # TestFlight archive that never passed through release-mas.sh's override.)
        # Signed: Kev + claude-opus-4-8, 2026-06-19, Confidence 0.85, Prior: Unknown
        CODE_SIGN_ENTITLEMENTS: M1K3App/M1K3-MAS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: M1K3App/Info.generated.plist
      properties:
        CFBundleDisplayName: M1K3
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableDescription: "Local, private AI companion."
        NSMicrophoneUsageDescription: "M1K3 uses the microphone for voice input. Audio is transcribed on-device and never leaves your Mac."
        NSSpeechRecognitionUsageDescription: "M1K3 transcribes your speech on-device to let you ask questions by voice. Nothing is sent to Apple or any server."
        # Export compliance: M1K3 uses only standard, exempt encryption (HTTPS/TLS
        # for on-device model-weight downloads). Declaring this up front skips the
        # per-submission encryption prompt in App Store Connect and prevents an
        # accidental mis-answer. Flip to true only if non-exempt crypto is ever added.
        ITSAppUsesNonExemptEncryption: false

  # The iOS shipping shell — the shared adaptive app (2026-07-06). Grew out of the
  # on-device derisk harness into the real, tabbed app (Chat / Memories / Documents
  # / Settings) over the SAME package pipeline the Mac ships (AppCore.swift wires
  # it; the Mac's AppEnvironment is untouched). Voice (AVAudioSession) + the in-app
  # MCP server are the Phase-B/E follow-ons (docs/IOS_VISIONOS_PORT.md). Inherits
  # DEVELOPMENT_TEAM + Automatic signing from the project base, so it provisions to
  # a connected device with no extra config.
  #
  # The visionOS sibling target (M1K3visionOS) shares this exact source list +
  # dependency set — the shell renders as a spatial window; the volumetric-avatar /
  # walkable-constellation flagship is the Phase-D follow. Kept as two XcodeGen
  # targets (one platform each) rather than one multi-platform target so each gets
  # a clean, unambiguous Xcode Cloud archive lane.
  M1K3iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    templates: [MobileShell]
    # Icon Composer (.icon) app icon — the SAME document the Mac target ships.
    # icon.json declares "squares": "shared", so one Icon Composer file authors
    # both the macOS and iOS square icons; referenced as a single file so
    # XcodeGen doesn't recurse into the bundle, and actool compiles it via
    # APPICON_NAME below. This deliberately lives on the target rather than in
    # the MobileShell template: Icon Composer has NO visionOS support (Xcode
    # 26.x), so the visionOS sibling carries a hand-built layered image stack
    # instead. The icon asset is the one thing the two mobile targets can't share.
    sources:
      - path: M1K3.icon
        type: file
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.m1k3.ios
        PRODUCT_NAME: M1K3iOS
        ASSETCATALOG_COMPILER_APPICON_NAME: M1K3
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.2"
    info:
      path: M1K3iOSApp/Info.generated.plist
      properties:
        CFBundleDisplayName: M1K3
        ITSAppUsesNonExemptEncryption: false

  # visionOS sibling — same shell, same portable graph, rendered spatially as a
  # window. The Kokoro visionOS gap (no xrOS ONNX slice) is RESOLVED as of
  # 2026-07-18 — the ONNX Runtime backend was replaced with a pure-MLX one
  # (M1K3Kokoro now links MLX/MLXNN/MLXFFT/MLXFast, which already build for
  # visionOS 26), so M1K3 Voice has no per-platform gap once it's wired into
  # this shell. The Phase-D spatial flagship (volumetric avatar + walkable
  # memory constellation) is the differentiated follow.
  M1K3visionOS:
    type: application
    platform: visionOS
    deploymentTarget: "26.0"
    templates: [MobileShell]
    # Hand-authored layered app icon. Icon Composer has NO visionOS support as of
    # Xcode 26.x, so the shared M1K3.icon the Mac/iOS targets use CANNOT author
    # this one — visionOS needs a 1-3 layer `.solidimagestack` (each layer a
    # 1024×1024 PNG; the Back layer MUST be fully opaque or actool errors), and
    # the system applies the circular mask + parallax depth itself. Deliberately
    # lives OUTSIDE M1K3iOSApp/ so the template's `- path: M1K3iOSApp` doesn't
    # sweep a vision-idiom asset into the iOS bundle. Regenerated by
    # tools/icons/build_visionos_icon.py from the same wordmark art.
    sources:
      - path: M1K3visionOS/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.m1k3.visionos
        PRODUCT_NAME: M1K3visionOS
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.2"
    info:
      path: M1K3iOSApp/Info.generated.plist
      properties:
        CFBundleDisplayName: M1K3
        ITSAppUsesNonExemptEncryption: false

# A SHARED M1K3 scheme, explicit so xcodegen emits it to xcshareddata/xcschemes/.
# Without this, Xcode only auto-creates an ephemeral user scheme — invisible to
# Xcode Cloud (which can build only shared schemes). Because the pbxproj is
# gitignored, ci_scripts/ci_post_clone.sh regenerates the project (and this
# scheme) in the cloud, so the Archive→TestFlight workflow can find M1K3.
schemes:
  M1K3:
    build:
      targets:
        M1K3: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  # The iOS shell scheme — select this + your iPhone (or a Simulator), then ⌘R.
  M1K3iOS:
    build:
      targets:
        M1K3iOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  # The visionOS shell scheme — select this + a Vision Pro (or its Simulator).
  M1K3visionOS:
    build:
      targets:
        M1K3visionOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
