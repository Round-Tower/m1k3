<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M1K3 Integration Tests</title>
    <style>
        body {
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            background: #000;
            color: #00ff00;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #00ff00;
            margin-bottom: 30px;
        }
        .test-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #000;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .test-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            border: 2px solid #00ff00;
            padding: 20px;
            text-align: center;
        }
        .status-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }
        .status-label {
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .test-results {
            border: 2px solid #00ff00;
            padding: 20px;
        }
        .test-result {
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid;
            background: rgba(0, 255, 0, 0.1);
        }
        .test-result.pass {
            border-left-color: #00ff00;
        }
        .test-result.fail {
            border-left-color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
            color: #ffcccc;
        }
        .test-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .test-message {
            opacity: 0.9;
            font-size: 0.9em;
        }
        .test-error {
            color: #ff6666;
            font-size: 0.8em;
            margin-top: 5px;
            font-style: italic;
        }
        .console-output {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            padding: 20px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.9em;
        }
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.8;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid #00ff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success { color: #00ff00; }
        .warning { color: #ffaa00; }
        .error { color: #ff0000; }
        .highlight {
            background: rgba(0, 255, 0, 0.2);
            padding: 2px 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 M1K3 INTEGRATION TESTS</h1>
            <p>Comprehensive testing of real-time web interface functionality</p>
        </div>

        <div class="test-controls">
            <button class="btn" id="runUserFlowTests">Run User Flow Tests</button>
            <button class="btn" id="runEdgeComputingTests">Run Edge Computing Tests</button>
            <button class="btn" id="runAllTests">Run All Tests</button>
            <button class="btn" id="clearResults">Clear Results</button>
        </div>

        <div class="test-status" id="testStatus">
            <div class="status-card">
                <div class="status-value" id="totalTests">0</div>
                <div class="status-label">Total Tests</div>
            </div>
            <div class="status-card">
                <div class="status-value success" id="passedTests">0</div>
                <div class="status-label">Passed</div>
            </div>
            <div class="status-card">
                <div class="status-value error" id="failedTests">0</div>
                <div class="status-label">Failed</div>
            </div>
            <div class="status-card">
                <div class="status-value" id="successRate">0%</div>
                <div class="status-label">Success Rate</div>
            </div>
            <div class="status-card">
                <div class="status-value" id="testDuration">0ms</div>
                <div class="status-label">Duration</div>
            </div>
            <div class="status-card">
                <div class="status-value" id="testStatus">Ready</div>
                <div class="status-label">Status</div>
            </div>
        </div>

        <div class="console-output" id="consoleOutput">
            <div class="loading">
                <div class="spinner"></div>
                Initializing test environment...
            </div>
        </div>

        <div class="test-results" id="testResults" style="display: none;">
            <h3>📊 Test Results</h3>
            <div id="testResultsList"></div>
        </div>
    </div>

    <!-- Load test dependencies -->
    <script>
        // Redirect console.log to our output display
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        const consoleOutput = document.getElementById('consoleOutput');
        const testResultsList = document.getElementById('testResultsList');
        
        function appendToConsole(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'warn' ? 'warning' : 'success';
            consoleOutput.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = (...args) => {
            originalLog.apply(console, args);
            appendToConsole(args.join(' '), 'log');
        };
        
        console.error = (...args) => {
            originalError.apply(console, args);
            appendToConsole(args.join(' '), 'error');
        };
        
        console.warn = (...args) => {
            originalWarn.apply(console, args);
            appendToConsole(args.join(' '), 'warn');
        };
        
        // Initialize test environment
        let testRunning = false;
        let allResults = [];
        
        function updateTestStatus(stats) {
            document.getElementById('totalTests').textContent = stats.total || 0;
            document.getElementById('passedTests').textContent = stats.passed || 0;
            document.getElementById('failedTests').textContent = stats.failed || 0;
            document.getElementById('successRate').textContent = `${stats.successRate || 0}%`;
            document.getElementById('testDuration').textContent = `${stats.duration || 0}ms`;
            document.getElementById('testStatus').textContent = stats.status || 'Ready';
        }
        
        function displayResults(results) {
            const testResultsDiv = document.getElementById('testResults');
            testResultsDiv.style.display = 'block';
            
            testResultsList.innerHTML = '';
            
            results.forEach(result => {
                const resultDiv = document.createElement('div');
                resultDiv.className = `test-result ${result.status.toLowerCase()}`;
                
                resultDiv.innerHTML = `
                    <div class="test-name">${result.status === 'PASS' ? '✅' : '❌'} ${result.test}</div>
                    <div class="test-message">${result.message}</div>
                    ${result.error ? `<div class="test-error">Error: ${result.error}</div>` : ''}
                `;
                
                testResultsList.appendChild(resultDiv);
            });
        }
        
        function setButtonsDisabled(disabled) {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.disabled = disabled;
            });
        }
        
        // Test runners
        async function runUserFlowTests() {
            if (testRunning) return;
            testRunning = true;
            setButtonsDisabled(true);
            
            console.log('🚀 Starting User Flow Tests...');
            updateTestStatus({ status: 'Running User Flow Tests', total: 0, passed: 0, failed: 0 });
            
            try {
                if (typeof runUserFlowTests === 'function') {
                    const results = await window.runUserFlowTests();
                    const summary = window.userFlowTestResults?.summary || {};
                    
                    allResults = allResults.concat(results);
                    updateTestStatus({
                        ...summary,
                        status: 'User Flow Tests Complete'
                    });
                    displayResults(results);
                } else {
                    throw new Error('User flow tests not loaded');
                }
            } catch (error) {
                console.error('Failed to run user flow tests:', error);
                updateTestStatus({ status: 'Error', total: 0, passed: 0, failed: 1 });
            } finally {
                testRunning = false;
                setButtonsDisabled(false);
            }
        }
        
        async function runEdgeComputingTests() {
            if (testRunning) return;
            testRunning = true;
            setButtonsDisabled(true);
            
            console.log('🚀 Starting Edge Computing Tests...');
            updateTestStatus({ status: 'Running Edge Computing Tests', total: 0, passed: 0, failed: 0 });
            
            try {
                if (typeof runEdgeComputingTests === 'function') {
                    const results = await window.runEdgeComputingTests();
                    const summary = window.edgeComputingTestResults?.summary || {};
                    
                    allResults = allResults.concat(results);
                    updateTestStatus({
                        ...summary,
                        status: 'Edge Computing Tests Complete'
                    });
                    displayResults(results);
                } else {
                    throw new Error('Edge computing tests not loaded');
                }
            } catch (error) {
                console.error('Failed to run edge computing tests:', error);
                updateTestStatus({ status: 'Error', total: 0, passed: 0, failed: 1 });
            } finally {
                testRunning = false;
                setButtonsDisabled(false);
            }
        }
        
        async function runAllTests() {
            if (testRunning) return;
            testRunning = true;
            setButtonsDisabled(true);
            
            console.log('🚀 Starting Complete Test Suite...');
            allResults = [];
            
            try {
                // Run user flow tests
                await runUserFlowTestsInternal();
                await new Promise(resolve => setTimeout(resolve, 1000)); // Brief pause
                
                // Run edge computing tests
                await runEdgeComputingTestsInternal();
                
                // Calculate combined results
                const totalPassed = allResults.filter(r => r.status === 'PASS').length;
                const totalFailed = allResults.filter(r => r.status === 'FAIL').length;
                const total = totalPassed + totalFailed;
                const successRate = total > 0 ? ((totalPassed / total) * 100).toFixed(1) : '0.0';
                
                updateTestStatus({
                    total,
                    passed: totalPassed,
                    failed: totalFailed,
                    successRate: parseFloat(successRate),
                    status: 'All Tests Complete'
                });
                
                displayResults(allResults);
                
                console.log(`🎉 Complete test suite finished: ${totalPassed}/${total} passed (${successRate}%)`);
                
            } catch (error) {
                console.error('Failed to run complete test suite:', error);
                updateTestStatus({ status: 'Error' });
            } finally {
                testRunning = false;
                setButtonsDisabled(false);
            }
        }
        
        // Internal test runners (don't change UI state)
        async function runUserFlowTestsInternal() {
            console.log('Running User Flow Tests...');
            if (typeof window.runUserFlowTests === 'function') {
                return await window.runUserFlowTests();
            }
            throw new Error('User flow tests not available');
        }
        
        async function runEdgeComputingTestsInternal() {
            console.log('Running Edge Computing Tests...');
            if (typeof window.runEdgeComputingTests === 'function') {
                return await window.runEdgeComputingTests();
            }
            throw new Error('Edge computing tests not available');
        }
        
        function clearResults() {
            consoleOutput.innerHTML = '<div class="success">Console cleared</div>';
            testResultsList.innerHTML = '';
            document.getElementById('testResults').style.display = 'none';
            allResults = [];
            updateTestStatus({
                total: 0,
                passed: 0,
                failed: 0,
                successRate: 0,
                duration: 0,
                status: 'Ready'
            });
        }
        
        // Event listeners
        document.getElementById('runUserFlowTests').addEventListener('click', runUserFlowTests);
        document.getElementById('runEdgeComputingTests').addEventListener('click', runEdgeComputingTests);
        document.getElementById('runAllTests').addEventListener('click', runAllTests);
        document.getElementById('clearResults').addEventListener('click', clearResults);
        
        // Initialize
        console.log('🧪 M1K3 Integration Test Runner initialized');
        console.log('💡 Click "Run All Tests" to start comprehensive testing');
        updateTestStatus({ status: 'Ready' });
    </script>
    
    <!-- Load test scripts -->
    <script>
        // Dynamic script loading function
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        
        // Load all required scripts
        async function loadTestScripts() {
            try {
                // Load test suites
                await loadScript('/static/js/test/user-flow-tests.js');
                await loadScript('/static/js/test/edge-computing-tests.js');
                
                console.log('✅ All test scripts loaded successfully');
                updateTestStatus({ status: 'Test Scripts Loaded' });
                
            } catch (error) {
                console.error('❌ Failed to load test scripts:', error);
                updateTestStatus({ status: 'Script Loading Error' });
            }
        }
        
        // Load scripts when page is ready
        document.addEventListener('DOMContentLoaded', loadTestScripts);
    </script>
</body>
</html>
