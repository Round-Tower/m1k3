<!DOCTYPE html>
<html>
<head>
    <title>Minimal Test</title>
    <style>
        body { background: #222; color: #9BBC0F; font-family: monospace; padding: 20px; }
        canvas { border: 1px solid #9BBC0F; }
    </style>
</head>
<body>
    <h1>Minimal Avatar Test</h1>
    <canvas id="testCanvas" width="256" height="256"></canvas>
    
    <script src="gameboy_pixel_engine.js"></script>
    <script>
        console.log('Starting minimal test...');
        
        try {
            const canvas = document.getElementById('testCanvas');
            console.log('Canvas found:', canvas);
            
            // Test if GameboyPixelEngine exists
            if (typeof GameboyPixelEngine === 'undefined') {
                document.body.innerHTML += '<p>❌ GameboyPixelEngine not found!</p>';
                throw new Error('GameboyPixelEngine not loaded');
            }
            
            console.log('GameboyPixelEngine found, creating instance...');
            
            const engine = new GameboyPixelEngine(canvas);
            console.log('Engine created:', engine);
            
            // Clear canvas first
            engine.clearCanvas();
            
            // Draw some test pixels
            engine.setPixel(5, 5, 0);  // Lightest color
            engine.setPixel(6, 5, 1);  // Second color
            engine.setPixel(7, 5, 2);  // Third color
            engine.setPixel(8, 5, 3);  // Darkest color
            
            // Draw a simple pattern
            for (let x = 10; x < 15; x++) {
                for (let y = 10; y < 15; y++) {
                    engine.setPixel(x, y, (x + y) % 4);
                }
            }
            
            console.log('Pixels drawn, attempting avatar render...');
            
            // Try avatar rendering
            if (typeof engine.renderAvatar === 'function') {
                engine.renderAvatar();
                console.log('Avatar rendered successfully');
                document.body.innerHTML += '<p>✅ Avatar rendered!</p>';
            } else {
                console.log('renderAvatar method not found');
                document.body.innerHTML += '<p>⚠️ renderAvatar method missing</p>';
            }
            
        } catch (error) {
            console.error('Error:', error);
            document.body.innerHTML += `<p>❌ Error: ${error.message}</p>`;
        }
    </script>
</body>
</html>
