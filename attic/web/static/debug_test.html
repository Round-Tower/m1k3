<!DOCTYPE html>
<html>
<head>
    <title>Debug Test - M1K3 Avatar</title>
    <style>
        body { 
            font-family: monospace; 
            background: #222; 
            color: #9BBC0F; 
            padding: 20px; 
        }
        canvas { 
            border: 2px solid #9BBC0F; 
            margin: 20px 0; 
        }
        .log { 
            background: #333; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>
    <h1>🔧 Debug Test - Avatar Engine</h1>
    
    <div class="log" id="debugLog">Initializing...</div>
    
    <canvas id="debugCanvas" width="256" height="256"></canvas>
    
    <script src="gameboy_pixel_engine.js"></script>
    <script>
        const log = document.getElementById('debugLog');
        
        function debugLog(message) {
            log.innerHTML += '<br>' + message;
            console.log(message);
        }
        
        try {
            debugLog('✅ Page loaded, testing GameboyPixelEngine...');
            
            if (typeof GameboyPixelEngine === 'undefined') {
                throw new Error('GameboyPixelEngine not found - gameboy_pixel_engine.js not loaded');
            }
            
            debugLog('✅ GameboyPixelEngine class found');
            
            const canvas = document.getElementById('debugCanvas');
            debugLog(`✅ Canvas found: ${canvas.width}x${canvas.height}`);
            
            const engine = new GameboyPixelEngine(canvas, {
                pixelSize: 8,
                mode: 'avatar'
            });
            
            debugLog(`✅ Engine created: ${engine.gridWidth}x${engine.gridHeight} grid`);
            debugLog(`✅ Palette: ${engine.currentPalette.join(', ')}`);
            
            // Test basic pixel operations
            engine.setPixel(5, 5, 2, 'avatar');
            engine.setPixel(10, 10, 1, 'avatar');
            debugLog('✅ Basic pixel operations completed');
            
            // Test avatar rendering
            engine.renderAvatar();
            debugLog('✅ renderAvatar() called successfully');
            
            // Test system state
            engine.updateSystemState({
                battery: 75,
                cpu: 45,
                temperature: 55
            });
            debugLog('✅ System state updated');
            
            debugLog('🎉 All basic tests passed!');
            
        } catch (error) {
            debugLog(`❌ ERROR: ${error.message}`);
            debugLog(`❌ Stack: ${error.stack}`);
        }
    </script>
</body>
</html>
