<!DOCTYPE html>
<html lang="en" data-theme="terminal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1K3 AVATAR SYSTEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body class="bg-crt-dark text-crt-white min-h-screen overflow-hidden">
  <!-- Scanlines overlay -->
  <div class="scanlines"></div>

  <!-- CRT Frame -->
  <div class="crt-frame">
    <!-- Terminal Header -->
    <header class="terminal-header">
      <div class="flex items-center gap-3">
        <span class="text-crt-dim">M1K3://</span>
        <span class="crt-glow">AVATAR SYSTEM</span>
        <span class="text-crt-dim font-mono text-xs">v1.0</span>
      </div>
      <div class="flex items-center gap-2 text-xs">
        <span class="status-dot" id="status-dot"></span>
        <span id="ws-status" class="font-mono text-crt-dim">OFFLINE</span>
      </div>
    </header>

    <!-- Avatar Stage (Center) -->
    <main id="avatar-container" class="avatar-stage">
      <div id="loading" class="text-center">
        <div class="spinner mx-auto mb-4"></div>
        <div class="font-pixel text-crt-dim">LOADING MODEL...</div>
      </div>
    </main>

    <!-- Terminal Footer (Minimal Controls) -->
    <footer class="terminal-footer">
      <button class="ctrl-btn" id="btn-emotion" title="Cycle emotion">
        <span id="emotion-label">EMO</span>
      </button>
      <button class="ctrl-btn" id="btn-model" title="Change model">MDL</button>
      <button class="ctrl-btn" id="btn-random" title="Random model">RND</button>
      <button class="ctrl-btn" id="btn-activity" title="Cycle activity">ACT</button>
      <button class="ctrl-btn" id="btn-shader" title="Cycle shader effect">
        <span id="shader-label">FX</span>
      </button>

      <div class="flex-1"></div>

      <div class="font-pixel text-xs text-crt-dim">
        <span id="status-model">-</span>
        <span class="mx-2">|</span>
        <span id="status-anim">-</span>
        <span class="mx-2">|</span>
        <span id="status-shader">NONE</span>
      </div>
    </footer>
  </div>

  <!-- GitHub Explorer Modal -->
  <div id="github-modal" class="modal-backdrop hidden">
    <div class="modal-panel" style="max-width: 700px;">
      <div class="text-crt-white mb-4 border-b border-white/20 pb-2">🐙 GITHUB MODEL EXPLORER</div>

      <!-- Search Bar -->
      <div class="mb-4">
        <input
          type="text"
          id="github-search"
          placeholder="Search GitHub for models... (e.g. 'pokemon', 'robot', 'character')"
          class="w-full bg-black/50 border border-white/20 text-crt-white font-mono text-sm px-3 py-2 mb-2 focus:border-cyan-500 focus:outline-none"
        />
        <div class="grid grid-cols-3 gap-2">
          <button class="ctrl-btn text-xs" id="btn-github-search">🔍 SEARCH</button>
          <button class="ctrl-btn text-xs" id="btn-browse-repo">📂 BROWSE REPO</button>
          <button class="ctrl-btn text-xs" id="btn-curated">⭐ CURATED</button>
        </div>
      </div>

      <!-- Rate Limit Status -->
      <div class="text-xs text-crt-dim mb-2" id="github-rate-limit">
        Loading rate limit...
      </div>

      <!-- Results -->
      <div class="mb-4">
        <div class="text-xs text-crt-dim mb-2" id="github-results-header">
          Enter search or browse repos
        </div>
        <div class="max-h-64 overflow-y-auto bg-black/30 border border-white/10 p-2" id="github-results">
          <div class="text-xs text-crt-dim text-center py-8">
            💡 Try searching for "pokemon", "zelda", or "robot"<br/>
            Or browse popular repos with "⭐ CURATED"
          </div>
        </div>
      </div>

      <!-- Actions -->
      <button class="ctrl-btn w-full" id="github-modal-close">CLOSE</button>
    </div>
  </div>

  <!-- Model Selector Modal -->
  <div id="model-modal" class="modal-backdrop hidden">
    <div class="modal-panel" style="max-width: 600px;">
      <div class="text-crt-white mb-4 border-b border-white/20 pb-2">SELECT MODEL</div>

      <!-- URL Loader -->
      <div class="mb-4">
        <input
          type="text"
          id="url-input"
          placeholder="https://github.com/.../model.glb"
          class="w-full bg-black/50 border border-white/20 text-crt-white font-mono text-sm px-3 py-2 focus:border-cyan-500 focus:outline-none"
        />
        <button class="ctrl-btn w-full mt-2" id="btn-load-url">🌐 LOAD FROM URL</button>
      </div>

      <!-- Quick Load Gallery -->
      <div class="mb-4">
        <div class="text-xs text-crt-dim mb-2">QUICK LOAD (GitHub)</div>
        <div class="grid grid-cols-3 gap-2 text-xs" id="quick-load-grid"></div>
      </div>

      <!-- Model Grid -->
      <div class="text-xs text-crt-dim mb-2">YOUR MODELS</div>
      <div class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto" id="model-grid"></div>

      <!-- Actions -->
      <div class="grid grid-cols-3 gap-2 mt-4">
        <button class="ctrl-btn text-xs" id="btn-github">🐙 GITHUB</button>
        <button class="ctrl-btn text-xs" id="btn-upload">📁 UPLOAD</button>
        <button class="ctrl-btn text-xs" id="modal-close">CLOSE</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { AvatarRenderer, ModelRegistry } from './src/index.ts';
    import { WebSocketBridge } from './src/communication/WebSocketBridge.ts';
    import { ModelDropZone } from './src/ui/ModelDropZone.ts';
    import { dynamicModelLoader } from './src/loader/DynamicModelLoader.ts';
    import { githubExplorer, formatFileSize } from './src/loader/GitHubModelExplorer.ts';

    let renderer = null;
    let bridge = null;
    let dropZone = null;
    let currentEmotionIndex = 0;
    let currentActivityIndex = 0;
    let currentShaderIndex = 0;

    const EMOTIONS = ['NEUTRAL', 'HAPPY', 'SAD', 'ANGRY', 'SURPRISED', 'LOVE', 'THINKING', 'SLEEPY', 'EXCITED'];
    const ACTIVITIES = ['IDLE', 'LISTENING', 'THINKING', 'GENERATING', 'SPEAKING'];
    const SHADERS = ['none', 'pixelation', 'glitch', 'hologram', 'bloom', 'chromatic', 'scanlines'];
    const container = document.getElementById('avatar-container');

    // Quick-load GitHub models (legal, open source!)
    const QUICK_LOAD_MODELS = [
      {
        name: '🦊 Fox',
        url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb'
      },
      {
        name: '🤖 CesiumMan',
        url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMan/glTF-Binary/CesiumMan.glb'
      },
      {
        name: '🦜 Parrot',
        url: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Parrot.glb'
      },
      {
        name: '🦩 Flamingo',
        url: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Flamingo.glb'
      },
      {
        name: '🐴 Horse',
        url: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Horse.glb'
      },
      {
        name: '⚔️ Helmet',
        url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb'
      },
    ];

    function updateStatus() {
      if (!renderer) return;
      const metadata = renderer.getModelMetadata();
      const controller = renderer.getAnimationController();
      const currentAnim = controller?.getCurrentAnimation();

      document.getElementById('status-model').textContent =
        metadata?.modelPath.split('/').pop()?.replace('.glb', '').toUpperCase() || '-';
      document.getElementById('status-anim').textContent =
        currentAnim?.name?.toUpperCase() || 'IDLE';
    }

    function updateActivityClass(activity) {
      container.classList.remove('speaking', 'listening', 'thinking');
      const cls = { SPEAKING: 'speaking', LISTENING: 'listening', THINKING: 'thinking', GENERATING: 'thinking' }[activity];
      if (cls) container.classList.add(cls);
    }

    function updateConnectionStatus(connected) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('ws-status');
      if (connected) {
        dot.classList.add('online');
        dot.classList.remove('offline');
        text.textContent = 'ONLINE';
        text.classList.remove('text-crt-dim');
        text.classList.add('text-crt-white');
      } else {
        dot.classList.remove('online');
        dot.classList.add('offline');
        text.textContent = 'OFFLINE';
        text.classList.add('text-crt-dim');
        text.classList.remove('text-crt-white');
      }
    }

    // Load dynamic model directly from blob URL
    async function loadDynamicModel(entry) {
      const { GLBModelLoader } = await import('./src/index.ts');
      const loaded = await GLBModelLoader.load(entry.url);

      // Manually inject into renderer's scene
      renderer.unloadModel();
      const scene = renderer['scene'];
      scene.add(loaded.scene);

      // Normalize and setup
      renderer['normalizeModel'](loaded.scene);
      renderer['currentModel'] = loaded;

      // Setup animation
      if (loaded.animations.length > 0) {
        const { AnimationController } = await import('./src/index.ts');
        renderer['animationController'] = new AnimationController(
          loaded.scene,
          loaded.animations,
          loaded.metadata.animations
        );
        renderer['animationController'].updateFromState(renderer.getState());
      }

      updateStatus();
    }

    function populateQuickLoadGrid() {
      const grid = document.getElementById('quick-load-grid');
      grid.innerHTML = QUICK_LOAD_MODELS.map(m => `
        <button class="ctrl-btn text-xs py-1" data-url="${m.url}">${m.name}</button>
      `).join('');

      grid.querySelectorAll('[data-url]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const url = btn.dataset.url;
          try {
            document.getElementById('model-modal').classList.add('hidden');
            document.getElementById('loading').style.display = 'block';

            console.log('[M1K3] Quick loading:', url);
            const entry = await dynamicModelLoader.loadFromUrl(url);
            await loadDynamicModel(entry);

            document.getElementById('loading').style.display = 'none';
            populateModelGrid(); // Refresh

          } catch (error) {
            document.getElementById('loading').style.display = 'none';
            alert(`Failed to load: ${error.message}`);
            console.error('[M1K3] Quick load error:', error);
          }
        });
      });
    }

    function populateModelGrid() {
      const grid = document.getElementById('model-grid');
      const builtInModels = ModelRegistry.allModels;
      const dynamicModels = dynamicModelLoader.getAllModels();

      let html = '';

      // Built-in models
      if (builtInModels.length > 0) {
        html += builtInModels.map(m => `
          <button class="dropdown-item" data-model="${m.id}" data-type="builtin">${m.id.toUpperCase()}</button>
        `).join('');
      }

      // Dynamic models (separator if both exist)
      if (dynamicModels.length > 0) {
        if (builtInModels.length > 0) {
          html += '<div class="col-span-2 text-xs text-crt-dim border-t border-white/20 mt-2 pt-2">CUSTOM</div>';
        }
        html += dynamicModels.map(m => `
          <button class="dropdown-item" data-model="${m.id}" data-type="dynamic">${m.name.toUpperCase()}</button>
        `).join('');
      }

      grid.innerHTML = html || '<div class="col-span-2 text-xs text-crt-dim">No models loaded</div>';

      grid.querySelectorAll('[data-model]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const modelId = btn.dataset.model;
          const type = btn.dataset.type;
          document.getElementById('loading').style.display = 'block';
          document.getElementById('model-modal').classList.add('hidden');

          if (type === 'dynamic') {
            const entry = dynamicModelLoader.getModel(modelId);
            if (entry) {
              await loadDynamicModel(entry);
            }
          } else {
            await renderer.loadModel(modelId);
          }

          document.getElementById('loading').style.display = 'none';
          updateStatus();
        });
      });
    }

    async function init() {
      try {
        renderer = new AvatarRenderer({
          container: '#avatar-container',
          assetsBasePath: '/',
          enableControls: true,
          backgroundColor: '#0A0A0A',
        });

        await renderer.loadModel('colobus');
        renderer.start();
        document.getElementById('loading').style.display = 'none';
        updateStatus();

        // Connect to backend
        bridge = new WebSocketBridge({ url: 'ws://localhost:8081' });

        bridge.onConnectionChange(updateConnectionStatus);

        bridge.onAvatarStateChange((state) => {
          renderer.setState(state);
          if (state.activity) updateActivityClass(state.activity);
          if (state.emotion) {
            const idx = EMOTIONS.indexOf(state.emotion);
            if (idx >= 0) currentEmotionIndex = idx;
          }
          updateStatus();
        });

        bridge.onAvatarModelChange(async (modelId) => {
          document.getElementById('loading').style.display = 'block';
          await renderer.loadModel(modelId);
          document.getElementById('loading').style.display = 'none';
          updateStatus();
        });

        bridge.connect();
        populateQuickLoadGrid();
        populateModelGrid();

        // Setup drag-and-drop for custom models
        dropZone = new ModelDropZone({
          container: container,
          onModelDrop: async (entry) => {
            console.log('[M1K3] Loading dropped model:', entry.name);
            document.getElementById('loading').style.display = 'block';
            await renderer.loadModel(entry.id);
            // Update renderer to use dynamic model URL
            await loadDynamicModel(entry);
            document.getElementById('loading').style.display = 'none';
          },
          onError: (error) => {
            console.error('[M1K3] Drop error:', error);
          }
        });

        console.log('[M1K3] Avatar system initialized');
        console.log('[M1K3] 💡 TIP: Drag & drop .glb files to load custom models!');

      } catch (err) {
        console.error('[M1K3] Init error:', err);
        document.getElementById('loading').innerHTML = `
          <div class="text-red-400">ERROR: ${err.message}</div>
          <div class="text-crt-dim text-xs mt-2">Run: npm run dev</div>
        `;
      }
    }

    // ========================================================================
    // GitHub Explorer Functions
    // ========================================================================

    async function updateGitHubRateLimit() {
      try {
        const limit = await githubExplorer.getRateLimit();
        const resetTime = limit.resetAt.toLocaleTimeString();
        document.getElementById('github-rate-limit').textContent =
          `API: ${limit.remaining}/${limit.limit} requests (resets ${resetTime})`;
      } catch (error) {
        document.getElementById('github-rate-limit').textContent = 'Rate limit: unavailable';
      }
    }

    async function searchGitHub() {
      const query = document.getElementById('github-search').value.trim();
      const resultsDiv = document.getElementById('github-results');
      const headerDiv = document.getElementById('github-results-header');

      if (!query) {
        alert('Please enter a search query');
        return;
      }

      headerDiv.textContent = `Searching for "${query}"...`;
      resultsDiv.innerHTML = '<div class="text-xs text-crt-dim text-center py-4">Searching GitHub...</div>';

      try {
        const results = await githubExplorer.searchModels({ query, limit: 20 });

        if (results.length === 0) {
          resultsDiv.innerHTML = '<div class="text-xs text-crt-dim text-center py-4">No results found. Try different keywords.</div>';
          headerDiv.textContent = 'No results';
          return;
        }

        headerDiv.textContent = `Found ${results.length} models`;
        resultsDiv.innerHTML = results.map(model => `
          <div class="border-b border-white/10 pb-2 mb-2 last:border-0">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm text-crt-white font-mono">${model.name}</span>
              <button class="ctrl-btn text-xs py-0 px-2" data-url="${model.downloadUrl}">LOAD</button>
            </div>
            <div class="text-xs text-crt-dim">${model.repo}</div>
            <div class="text-xs text-crt-dim">${model.path}</div>
          </div>
        `).join('');

        // Attach load handlers
        resultsDiv.querySelectorAll('[data-url]').forEach(btn => {
          btn.addEventListener('click', () => loadFromGitHub(btn.dataset.url));
        });

        await updateGitHubRateLimit();

      } catch (error) {
        resultsDiv.innerHTML = `<div class="text-xs text-red-400 text-center py-4">Error: ${error.message}</div>`;
        headerDiv.textContent = 'Search failed';
        console.error('[GitHub] Search error:', error);
      }
    }

    async function browseRepo() {
      const query = document.getElementById('github-search').value.trim();
      const resultsDiv = document.getElementById('github-results');
      const headerDiv = document.getElementById('github-results-header');

      const repoName = query || prompt('Enter repo (e.g., KhronosGroup/glTF-Sample-Models):');
      if (!repoName) return;

      headerDiv.textContent = `Browsing ${repoName}...`;
      resultsDiv.innerHTML = '<div class="text-xs text-crt-dim text-center py-4">Loading repo files...</div>';

      try {
        const models = await githubExplorer.findInRepo(repoName);

        if (models.length === 0) {
          resultsDiv.innerHTML = '<div class="text-xs text-crt-dim text-center py-4">No .glb files found in this repo.</div>';
          headerDiv.textContent = 'No models found';
          return;
        }

        headerDiv.textContent = `${models.length} models in ${repoName}`;
        resultsDiv.innerHTML = models.map(model => `
          <div class="border-b border-white/10 pb-2 mb-2 last:border-0">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm text-crt-white font-mono">${model.name}</span>
              <button class="ctrl-btn text-xs py-0 px-2" data-url="${model.downloadUrl}">LOAD</button>
            </div>
            <div class="text-xs text-crt-dim">${model.path}</div>
            ${model.size ? `<div class="text-xs text-crt-dim">${formatFileSize(model.size)}</div>` : ''}
          </div>
        `).join('');

        // Attach load handlers
        resultsDiv.querySelectorAll('[data-url]').forEach(btn => {
          btn.addEventListener('click', () => loadFromGitHub(btn.dataset.url));
        });

        await updateGitHubRateLimit();

      } catch (error) {
        resultsDiv.innerHTML = `<div class="text-xs text-red-400 text-center py-4">Error: ${error.message}</div>`;
        headerDiv.textContent = 'Browse failed';
        console.error('[GitHub] Browse error:', error);
      }
    }

    async function showCuratedRepos() {
      const resultsDiv = document.getElementById('github-results');
      const headerDiv = document.getElementById('github-results-header');

      headerDiv.textContent = 'Loading curated repos...';
      resultsDiv.innerHTML = '<div class="text-xs text-crt-dim text-center py-4">Fetching popular model repos...</div>';

      try {
        const repos = await githubExplorer.getCuratedRepos();

        headerDiv.textContent = `${repos.length} curated repos`;
        resultsDiv.innerHTML = repos.map(repo => `
          <div class="border-b border-white/10 pb-2 mb-2 last:border-0">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm text-crt-white font-mono">${repo.name}</span>
              <button class="ctrl-btn text-xs py-0 px-2" data-repo="${repo.fullName}">BROWSE</button>
            </div>
            <div class="text-xs text-crt-dim mb-1">${repo.description}</div>
            <div class="text-xs text-cyan-500">⭐ ${repo.stars} stars</div>
          </div>
        `).join('');

        // Attach browse handlers
        resultsDiv.querySelectorAll('[data-repo]').forEach(btn => {
          btn.addEventListener('click', async () => {
            document.getElementById('github-search').value = btn.dataset.repo;
            await browseRepo();
          });
        });

        await updateGitHubRateLimit();

      } catch (error) {
        resultsDiv.innerHTML = `<div class="text-xs text-red-400 text-center py-4">Error: ${error.message}</div>`;
        headerDiv.textContent = 'Failed to load';
        console.error('[GitHub] Curated repos error:', error);
      }
    }

    async function loadFromGitHub(url) {
      try {
        document.getElementById('github-modal').classList.add('hidden');
        document.getElementById('loading').style.display = 'block';

        console.log('[GitHub] Loading:', url);
        const entry = await dynamicModelLoader.loadFromUrl(url);
        await loadDynamicModel(entry);

        document.getElementById('loading').style.display = 'none';
        populateModelGrid();

      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        alert(`Failed to load: ${error.message}`);
        console.error('[GitHub] Load error:', error);
      }
    }

    // Controls
    document.getElementById('btn-emotion').addEventListener('click', () => {
      if (!renderer) return;
      currentEmotionIndex = (currentEmotionIndex + 1) % EMOTIONS.length;
      const emotion = EMOTIONS[currentEmotionIndex];
      renderer.setState({ emotion });
      document.getElementById('emotion-label').textContent = emotion.slice(0, 3);
      updateStatus();
    });

    document.getElementById('btn-activity').addEventListener('click', () => {
      if (!renderer) return;
      currentActivityIndex = (currentActivityIndex + 1) % ACTIVITIES.length;
      const activity = ACTIVITIES[currentActivityIndex];
      renderer.setState({ activity });
      updateActivityClass(activity);
      updateStatus();
    });

    document.getElementById('btn-model').addEventListener('click', () => {
      document.getElementById('model-modal').classList.remove('hidden');
    });

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('model-modal').classList.add('hidden');
    });

    document.getElementById('btn-upload').addEventListener('click', async () => {
      document.getElementById('model-modal').classList.add('hidden');
      await dropZone.openFilePicker();
    });

    document.getElementById('btn-load-url').addEventListener('click', async () => {
      const url = document.getElementById('url-input').value.trim();
      if (!url) {
        alert('Please enter a URL');
        return;
      }

      try {
        document.getElementById('model-modal').classList.add('hidden');
        document.getElementById('loading').style.display = 'block';

        console.log('[M1K3] Loading from URL:', url);
        const entry = await dynamicModelLoader.loadFromUrl(url);
        await loadDynamicModel(entry);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('url-input').value = ''; // Clear input
        populateModelGrid(); // Refresh grid

      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        alert(`Failed to load model: ${error.message}`);
        console.error('[M1K3] URL load error:', error);
      }
    });

    document.getElementById('btn-random').addEventListener('click', async () => {
      if (!renderer) return;
      const models = ModelRegistry.allModels;
      const model = models[Math.floor(Math.random() * models.length)];
      document.getElementById('loading').style.display = 'block';
      await renderer.loadModel(model.id);
      document.getElementById('loading').style.display = 'none';
      updateStatus();
    });

    document.getElementById('btn-shader').addEventListener('click', () => {
      if (!renderer) return;
      currentShaderIndex = (currentShaderIndex + 1) % SHADERS.length;
      const shader = SHADERS[currentShaderIndex];
      renderer.setShaderEffect(shader, 0.7);
      document.getElementById('shader-label').textContent = shader.slice(0, 3).toUpperCase();
      document.getElementById('status-shader').textContent = shader.toUpperCase();
      console.log(`[M1K3] Shader: ${shader}`);
    });

    // Close modal on backdrop click
    document.getElementById('model-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.add('hidden');
      }
    });

    document.getElementById('github-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.add('hidden');
      }
    });

    // GitHub modal controls
    document.getElementById('btn-github').addEventListener('click', async () => {
      document.getElementById('model-modal').classList.add('hidden');
      document.getElementById('github-modal').classList.remove('hidden');
      await updateGitHubRateLimit();
    });

    document.getElementById('github-modal-close').addEventListener('click', () => {
      document.getElementById('github-modal').classList.add('hidden');
    });

    document.getElementById('btn-github-search').addEventListener('click', searchGitHub);

    document.getElementById('github-search').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchGitHub();
      }
    });

    document.getElementById('btn-browse-repo').addEventListener('click', browseRepo);
    document.getElementById('btn-curated').addEventListener('click', showCuratedRepos);

    init();
  </script>
</body>
</html>
