<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>M1K3 AVATAR</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      background: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
    }

    #avatar-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* THREE.js canvas should fill container */
    #avatar-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      touch-action: none;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #0f0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.9);
      padding: 30px;
      border: 2px solid #0f0;
      border-radius: 8px;
      min-width: 200px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #0f0;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error {
      color: #ff0000;
      background: rgba(0, 0, 0, 0.95);
      padding: 20px;
      border: 2px solid #ff0000;
      border-radius: 8px;
      max-width: 90%;
      font-size: 12px;
      line-height: 1.5;
    }

    #error h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    #error pre {
      background: #1a1a1a;
      padding: 10px;
      overflow-x: auto;
      margin-top: 10px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="avatar-container">
    <div id="loading">
      <div class="spinner"></div>
      <div>INITIALIZING...</div>
    </div>
  </div>

  <!-- Load IIFE bundle (no ES module) -->
  <script src="./app.js"></script>

  <script>
    // Global error handler
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.error);
      const loading = document.getElementById('loading');
      if (loading) {
        loading.innerHTML = `
          <div id="error">
            <h3>⚠️ Error</h3>
            <div>${e.message}</div>
            <pre>${e.error ? e.error.stack : ''}</pre>
          </div>
        `;
      }
    });

    // Log when script loads
    console.log('[WebView] index.html loaded');
    console.log('[WebView] window.renderer:', typeof window.renderer);
  </script>
</body>
</html>
