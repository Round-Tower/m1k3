<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M1K3 Avatar - MCP App</title>
  <style>
    /* M1K3 Design System */
    :root {
      --ma-orange: #D97706;
      --ma-bg-primary: #000000;
      --ma-bg-elevated: rgba(255, 255, 255, 0.08);
      --ma-bg-elevated-2: rgba(255, 255, 255, 0.12);
      --ma-text-primary: rgba(255, 255, 255, 0.98);
      --ma-text-secondary: rgba(255, 255, 255, 0.65);
      --ma-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ma-bg-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #avatar-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Speaking indicator - animated bars */
    #avatar-container.speaking::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg,
        transparent,
        var(--ma-orange),
        transparent
      );
      animation: speaking-pulse 1s ease-in-out infinite;
    }

    @keyframes speaking-pulse {
      0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
      50% { opacity: 1; transform: scaleX(1); }
    }

    /* Listening indicator - circular ripple */
    #avatar-container.listening::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      transform: translate(-50%, -50%);
      border: 2px solid var(--ma-orange);
      border-radius: 50%;
      opacity: 0;
      animation: listening-ripple 2s ease-out infinite;
      pointer-events: none;
    }

    @keyframes listening-ripple {
      0% {
        width: 100px;
        height: 100px;
        opacity: 0.8;
      }
      100% {
        width: 300px;
        height: 300px;
        opacity: 0;
      }
    }

    /* Thinking indicator - spinner */
    #avatar-container.thinking::after {
      content: '';
      position: absolute;
      top: 16px;
      right: 16px;
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: var(--ma-orange);
      border-radius: 50%;
      animation: thinking-spin 0.8s linear infinite;
    }

    @keyframes thinking-spin {
      to { transform: rotate(360deg); }
    }

    /* Error indicator */
    #avatar-container.error::after {
      content: '!';
      position: absolute;
      top: 16px;
      right: 16px;
      width: 20px;
      height: 20px;
      background: #EF4444;
      color: white;
      font-weight: bold;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--ma-text-secondary);
      z-index: 10;
    }

    #loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--ma-bg-elevated-2);
      border-top-color: var(--ma-orange);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Status bar - shows on hover */
    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--ma-text-secondary);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #avatar-container:hover #status-bar {
      opacity: 1;
    }

    .emotion { color: var(--ma-orange); font-weight: 500; }
    .model { opacity: 0.7; }

    /* Compact controls */
    #controls {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
    }

    #avatar-container:hover #controls {
      opacity: 1;
    }

    #controls button {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 6px;
      background: var(--ma-bg-elevated);
      color: var(--ma-text-primary);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #controls button:hover {
      background: var(--ma-bg-elevated-2);
    }
  </style>
</head>
<body>
  <div id="avatar-container">
    <div id="loading">
      <div class="spinner"></div>
      <div>Loading...</div>
    </div>
    <div id="status-bar">
      <span class="emotion" id="status-emotion">NEUTRAL</span>
      <span class="model" id="status-model">-</span>
    </div>
    <div id="controls">
      <button id="btn-mic" title="Voice input">🎤</button>
      <button id="btn-random" title="Random model">🎲</button>
    </div>
  </div>

  <script type="module">
    import { AvatarRenderer, ModelRegistry, MCPAppBridge } from './src/index.ts';

    let renderer = null;
    let bridge = null;
    const container = document.getElementById('avatar-container');

    // Activity CSS class mapping
    const ACTIVITY_CLASSES = {
      SPEAKING: 'speaking',
      LISTENING: 'listening',
      THINKING: 'thinking',
      GENERATING: 'thinking',
      ERROR: 'error',
    };

    function updateActivityClass(activity) {
      container.classList.remove('speaking', 'listening', 'thinking', 'error');
      const cls = ACTIVITY_CLASSES[activity];
      if (cls) container.classList.add(cls);
    }

    function updateStatus() {
      if (!renderer) return;
      const state = renderer.getState();
      const meta = renderer.getModelMetadata();

      document.getElementById('status-emotion').textContent = state.emotion;
      document.getElementById('status-model').textContent =
        meta?.modelPath.split('/').pop()?.replace('.glb', '') || '-';

      updateActivityClass(state.activity);
    }

    async function init() {
      try {
        // Create compact renderer (no orbit controls for iframe)
        renderer = new AvatarRenderer({
          container: '#avatar-container',
          assetsBasePath: '/',
          enableControls: false,
          backgroundColor: '#000000',
        });

        await renderer.loadModel('colobus');
        renderer.start();
        document.getElementById('loading').style.display = 'none';

        // Initialize MCP App Bridge
        bridge = new MCPAppBridge();

        bridge.onAvatarStateChange((state) => {
          console.log('[MCP] State:', state);
          renderer.setState(state);
          updateStatus();
        });

        bridge.onAvatarModelChange(async (modelId) => {
          console.log('[MCP] Model:', modelId);
          document.getElementById('loading').style.display = 'block';
          await renderer.loadModel(modelId);
          document.getElementById('loading').style.display = 'none';
          updateStatus();
        });

        bridge.signalReady();
        updateStatus();
        console.log('[MCP App] Ready');

      } catch (err) {
        console.error('[MCP App] Error:', err);
        document.getElementById('loading').innerHTML =
          `<div style="color:#EF4444">Error: ${err.message}</div>`;
      }
    }

    // Button handlers
    document.getElementById('btn-mic').addEventListener('click', () => {
      if (bridge) {
        bridge.requestVoiceInput(5);
        renderer.setState({ activity: 'LISTENING' });
        updateStatus();
      }
    });

    document.getElementById('btn-random').addEventListener('click', async () => {
      if (!renderer) return;
      const models = ModelRegistry.allModels;
      const model = models[Math.floor(Math.random() * models.length)];

      document.getElementById('loading').style.display = 'block';
      await renderer.loadModel(model.id);
      document.getElementById('loading').style.display = 'none';
      updateStatus();

      if (bridge) {
        bridge.reportInteraction('model_change', { model_id: model.id });
      }
    });

    init();
  </script>
</body>
</html>
