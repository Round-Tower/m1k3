<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M1K3 Sound System Test</title>
    <style>
        body {
            font-family: monospace;
            background: #0A0A0A;
            color: #FFFFFF;
            padding: 20px;
            line-height: 1.6;
        }
        .test-panel {
            background: #141414;
            border: 1px solid #1F1F1F;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        button {
            background: #E25303;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            margin: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #FF6B33;
        }
        .log {
            background: #1F1F1F;
            border: 1px solid #2A2A2A;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #4CAF50; }
        .error { color: #F44336; }
        .info { color: #2196F3; }
    </style>
</head>
<body>
    <h1>🔊 M1K3 Sound System Debug</h1>
    
    <div class="test-panel">
        <h2>Audio Context Status</h2>
        <div id="audioStatus">Checking...</div>
        <button onclick="initAudio()">Initialize Audio</button>
        <button onclick="testBasicSound()">Test Basic Sound</button>
    </div>

    <div class="test-panel">
        <h2>Sound File Tests</h2>
        <button onclick="testSoundFile('chime1.wav')">Test chime1.wav</button>
        <button onclick="testSoundFile('complete.wav')">Test complete.wav</button>
        <button onclick="testSoundFile('ding_ding.wav')">Test ding_ding.wav</button>
        <button onclick="testSoundFile('coin.wav')">Test coin.wav</button>
        <button onclick="testAllSounds()">Test All Available Sounds</button>
    </div>

    <div class="test-panel">
        <h2>WebSocket Sound Events</h2>
        <button onclick="connectWebSocket()">Connect WebSocket</button>
        <button onclick="triggerSoundEvent('message_sent')">Trigger Message Sent</button>
        <button onclick="triggerSoundEvent('message_received')">Trigger Message Received</button>
        <button onclick="triggerSoundEvent('connect')">Trigger Connect</button>
        <div id="wsStatus">WebSocket: Disconnected</div>
    </div>

    <div class="test-panel">
        <h2>Audio Manager Test</h2>
        <button onclick="testAudioManager()">Test Audio Manager</button>
        <input type="range" id="volumeSlider" min="0" max="100" value="70" onchange="updateVolume(this.value)">
        <span id="volumeDisplay">70%</span>
        <button onclick="toggleMute()">Toggle Mute</button>
    </div>

    <div class="test-panel">
        <h2>Debug Log</h2>
        <button onclick="clearLog()">Clear Log</button>
        <div class="log" id="debugLog"></div>
    </div>

    <script>
        let audioContext = null;
        let audioManager = null;
        let websocket = null;
        let isAudioEnabled = false;

        // Sound mappings (from main system)
        const soundMappings = {
            connect: ['chime1.wav', 'ding_ding.wav'],
            message_sent: ['coin.wav', 'plus_sfx.wav'],
            message_received: ['complete.wav', 'victory_confetti.wav'],
            error: ['incorrect_sfx.wav', 'donk.wav', 'oh_no.wav'],
            thinking: ['wave_alert.wav'],
            typing: ['brush_sfx.wav'],
            voice_start: ['click_error.wav'],
            voice_end: ['chime1.wav'],
            emotion_change: ['cat_star_collect.wav', 'short_magic_shot.wav']
        };

        // Simplified Audio Manager for testing
        class TestAudioManager {
            constructor() {
                this.sounds = {};
                this.volume = 0.7;
                this.enabled = true;
                log('AudioManager created', 'info');
            }

            async preloadSounds() {
                const allSounds = new Set();
                Object.values(soundMappings).flat().forEach(sound => allSounds.add(sound));
                
                log(`Preloading ${allSounds.size} unique sound files...`, 'info');
                
                let loaded = 0;
                let failed = 0;
                
                for (const soundFile of allSounds) {
                    try {
                        const audio = new Audio(`sounds/${soundFile}`);
                        audio.preload = 'auto';
                        audio.volume = this.volume;
                        
                        // Wait for load or error
                        await new Promise((resolve, reject) => {
                            audio.oncanplaythrough = () => {
                                loaded++;
                                log(`✅ Loaded: ${soundFile}`, 'success');
                                resolve();
                            };
                            audio.onerror = (e) => {
                                failed++;
                                log(`❌ Failed to load: ${soundFile} - ${e.message || 'Unknown error'}`, 'error');
                                resolve(); // Don't reject, continue with other sounds
                            };
                            
                            // Timeout after 5 seconds
                            setTimeout(() => {
                                failed++;
                                log(`⏱️ Timeout loading: ${soundFile}`, 'error');
                                resolve();
                            }, 5000);
                        });
                        
                        this.sounds[soundFile] = audio;
                    } catch (e) {
                        failed++;
                        log(`❌ Exception loading ${soundFile}: ${e.message}`, 'error');
                    }
                }
                
                log(`🎵 Audio preloading complete: ${loaded} loaded, ${failed} failed`, loaded > 0 ? 'success' : 'error');
                return loaded > 0;
            }

            play(eventType) {
                if (!this.enabled) {
                    log(`🔇 Audio disabled, not playing: ${eventType}`, 'info');
                    return;
                }
                
                const soundOptions = soundMappings[eventType];
                if (!soundOptions || soundOptions.length === 0) {
                    log(`❌ No sound mapping for event: ${eventType}`, 'error');
                    return;
                }
                
                const soundFile = soundOptions[Math.floor(Math.random() * soundOptions.length)];
                const audio = this.sounds[soundFile];
                
                if (audio) {
                    audio.currentTime = 0;
                    audio.volume = this.volume;
                    
                    log(`🔊 Playing sound: ${soundFile} for event: ${eventType}`, 'info');
                    
                    audio.play()
                        .then(() => {
                            log(`✅ Successfully played: ${soundFile}`, 'success');
                        })
                        .catch(e => {
                            log(`❌ Failed to play ${soundFile}: ${e.message}`, 'error');
                            
                            // Try to diagnose the issue
                            if (e.name === 'NotAllowedError') {
                                log('🚫 Audio blocked by browser - user interaction required', 'error');
                            } else if (e.name === 'NotSupportedError') {
                                log('🚫 Audio format not supported', 'error');
                            }
                        });
                } else {
                    log(`❌ Audio file not found: ${soundFile}`, 'error');
                }
            }

            setVolume(volume) {
                this.volume = volume / 100;
                Object.values(this.sounds).forEach(audio => {
                    if (audio) audio.volume = this.volume;
                });
                log(`🔊 Volume set to: ${Math.round(this.volume * 100)}%`, 'info');
            }

            setEnabled(enabled) {
                this.enabled = enabled;
                log(`🔊 Audio ${enabled ? 'enabled' : 'disabled'}`, 'info');
            }
        }

        function log(message, type = '') {
            const timestamp = new Date().toLocaleTimeString();
            const logElement = document.getElementById('debugLog');
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${timestamp}] ${message}`;
            logElement.appendChild(entry);
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('debugLog').innerHTML = '';
        }

        async function initAudio() {
            log('🎵 Initializing audio system...', 'info');
            
            try {
                // Create AudioContext (required for some browsers)
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    log(`🎵 AudioContext created, state: ${audioContext.state}`, 'info');
                    
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                        log('🎵 AudioContext resumed', 'success');
                    }
                }
                
                // Create and initialize audio manager
                if (!audioManager) {
                    audioManager = new TestAudioManager();
                    const success = await audioManager.preloadSounds();
                    
                    if (success) {
                        isAudioEnabled = true;
                        log('🎵 Audio system ready!', 'success');
                        document.getElementById('audioStatus').innerHTML = '<span class="success">✅ Audio Ready</span>';
                    } else {
                        log('❌ Audio system failed to initialize', 'error');
                        document.getElementById('audioStatus').innerHTML = '<span class="error">❌ Audio Failed</span>';
                    }
                } else {
                    log('🎵 Audio already initialized', 'info');
                }
                
            } catch (e) {
                log(`❌ Audio initialization failed: ${e.message}`, 'error');
                document.getElementById('audioStatus').innerHTML = '<span class="error">❌ Audio Failed</span>';
            }
        }

        async function testBasicSound() {
            if (!isAudioEnabled) {
                log('⚠️ Audio not initialized, initializing first...', 'info');
                await initAudio();
            }
            
            // Test with a simple beep
            try {
                const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhWDOJ0fPTgSsFJXPD8d+VRwUgVK7p66hVFApGotn4w2sqYjOLz+zXiTE5MHO/8/+KPAQ3frXh56hRHQdKnefXqTQaFojB7t+XRhENTrfi4bE+ICJPF6tL5JaGCWyPp83lzp0tW9PsjP3z7jy4oSYZQV2WqLPtHi7Z+CeDUz8M2UtLfMb2B+MXuZWqsewzMpU7P9TS5yebfKPuUIMLqd7ztD7kQs7L6smgTj8L0c/s37hQF6Og5Kq45CKHGjFgodGJQ5OChOQ==');
                audio.volume = 0.3;
                await audio.play();
                log('✅ Basic sound test successful!', 'success');
            } catch (e) {
                log(`❌ Basic sound test failed: ${e.message}`, 'error');
            }
        }

        async function testSoundFile(filename) {
            log(`🎵 Testing sound file: ${filename}`, 'info');
            
            try {
                const audio = new Audio(`sounds/${filename}`);
                audio.volume = 0.7;
                
                audio.oncanplaythrough = () => {
                    log(`✅ ${filename} loaded successfully`, 'success');
                };
                
                audio.onerror = (e) => {
                    log(`❌ ${filename} failed to load`, 'error');
                };
                
                await audio.play();
                log(`🔊 Playing: ${filename}`, 'info');
                
            } catch (e) {
                log(`❌ Error with ${filename}: ${e.message}`, 'error');
            }
        }

        async function testAllSounds() {
            if (!audioManager) {
                await initAudio();
            }
            
            const allSounds = new Set();
            Object.values(soundMappings).flat().forEach(sound => allSounds.add(sound));
            
            log(`🎵 Testing all ${allSounds.size} sound files...`, 'info');
            
            let index = 0;
            for (const soundFile of allSounds) {
                setTimeout(() => {
                    testSoundFile(soundFile);
                }, index * 800);
                index++;
            }
        }

        function testAudioManager() {
            if (!audioManager) {
                log('⚠️ AudioManager not initialized', 'error');
                return;
            }
            
            const events = ['connect', 'message_sent', 'message_received', 'error', 'emotion_change'];
            
            events.forEach((event, index) => {
                setTimeout(() => {
                    audioManager.play(event);
                }, index * 1000);
            });
        }

        function connectWebSocket() {
            try {
                websocket = new WebSocket('ws://localhost:8081');
                
                websocket.onopen = function() {
                    log('🔗 WebSocket connected', 'success');
                    document.getElementById('wsStatus').innerHTML = '<span class="success">WebSocket: Connected</span>';
                };
                
                websocket.onclose = function() {
                    log('🔗 WebSocket disconnected', 'info');
                    document.getElementById('wsStatus').innerHTML = '<span class="error">WebSocket: Disconnected</span>';
                };
                
                websocket.onerror = function() {
                    log('❌ WebSocket error', 'error');
                };
                
            } catch (e) {
                log(`❌ WebSocket connection failed: ${e.message}`, 'error');
            }
        }

        function triggerSoundEvent(eventType) {
            if (!websocket || websocket.readyState !== WebSocket.OPEN) {
                log('⚠️ WebSocket not connected', 'error');
                return;
            }
            
            const message = {
                type: 'sound',
                sound: eventType
            };
            
            websocket.send(JSON.stringify(message));
            log(`📤 Sent sound trigger: ${eventType}`, 'info');
        }

        function updateVolume(value) {
            document.getElementById('volumeDisplay').textContent = value + '%';
            if (audioManager) {
                audioManager.setVolume(parseInt(value));
            }
        }

        function toggleMute() {
            if (audioManager) {
                audioManager.setEnabled(!audioManager.enabled);
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Sound test page loaded', 'info');
            
            // Check browser support
            if ('AudioContext' in window || 'webkitAudioContext' in window) {
                log('✅ AudioContext supported', 'success');
            } else {
                log('❌ AudioContext not supported', 'error');
            }
            
            // Auto-initialize audio on first user interaction
            document.addEventListener('click', function() {
                if (!isAudioEnabled) {
                    initAudio();
                }
            }, { once: true });
            
            document.getElementById('audioStatus').innerHTML = '<span class="info">Click any button to initialize audio</span>';
        });
    </script>
</body>
</html>
