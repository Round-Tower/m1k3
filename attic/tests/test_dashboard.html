<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M1K3 Test Dashboard</title>
    <style>
        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --bg-tertiary: #1F1F1F;
            --bg-elevated: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --m1k3-orange: #E25303;
            --m1k3-green: #92B48B;
            --m1k3-blue: #0F4C81;
            --m1k3-red: #8E354A;
            --accent-success: #4CAF50;
            --accent-warning: #FF9800;
            --accent-error: #F44336;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--bg-tertiary);
            padding: 20px;
        }

        .panel h2 {
            color: var(--m1k3-orange);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel h3 {
            color: var(--text-primary);
            margin: 16px 0 8px 0;
            font-size: 1rem;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }

        .btn {
            background: var(--bg-elevated);
            border: 1px solid var(--bg-tertiary);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            text-align: center;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--m1k3-orange);
            border-color: var(--m1k3-orange);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.emotion-happy { border-color: #FFD700; }
        .btn.emotion-sad { border-color: #4169E1; }
        .btn.emotion-angry { border-color: #FF4500; }
        .btn.emotion-surprised { border-color: #00FFFF; }
        .btn.emotion-love { border-color: #FF69B4; }
        .btn.emotion-thinking { border-color: #9370DB; }
        .btn.emotion-sleepy { border-color: #DDA0DD; }
        .btn.emotion-excited { border-color: #FF6B6B; }

        .btn.state { border-color: var(--m1k3-blue); }
        .btn.sound { border-color: var(--m1k3-green); }
        .btn.test { border-color: var(--accent-warning); }
        .btn.danger { border-color: var(--accent-error); }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }

        .input-group label {
            min-width: 80px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--bg-tertiary);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
            font-family: inherit;
        }

        .input:focus {
            outline: none;
            border-color: var(--m1k3-orange);
        }

        .slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-elevated);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--m1k3-orange);
            cursor: pointer;
        }

        .status-bar {
            background: var(--bg-tertiary);
            border: 1px solid var(--bg-elevated);
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
        }

        .status-connected {
            color: var(--accent-success);
        }

        .status-disconnected {
            color: var(--accent-error);
        }

        .quick-tests {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .log-panel {
            grid-column: span 2;
            max-height: 300px;
        }

        .log-content {
            background: var(--bg-primary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 6px;
            padding: 12px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 4px;
            padding: 2px 0;
            border-left: 3px solid transparent;
            padding-left: 6px;
        }

        .log-entry.sent {
            border-left-color: var(--accent-success);
            color: var(--accent-success);
        }

        .log-entry.received {
            border-left-color: var(--m1k3-blue);
            color: var(--m1k3-blue);
        }

        .log-entry.error {
            border-left-color: var(--accent-error);
            color: var(--accent-error);
        }

        .header {
            grid-column: span 2;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--m1k3-orange);
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
        }

        .connection-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .log-panel {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 M1K3 Test Dashboard</h1>
            <p>Manual testing interface for avatar system</p>
        </div>

        <!-- Connection Panel -->
        <div class="panel">
            <div class="connection-panel">
                <div class="connection-status">
                    <div class="status-dot status-disconnected" id="statusDot"></div>
                    <span id="connectionText">Disconnected</span>
                </div>
                <div>
                    <button class="btn" id="connectBtn">Connect</button>
                </div>
            </div>

            <h2>🎭 Emotions</h2>
            <div class="button-grid">
                <button class="btn emotion-happy" onclick="sendEmotion('happy', 80)">😊 Happy</button>
                <button class="btn emotion-sad" onclick="sendEmotion('sad', 70)">😢 Sad</button>
                <button class="btn emotion-angry" onclick="sendEmotion('angry', 90)">😠 Angry</button>
                <button class="btn emotion-surprised" onclick="sendEmotion('surprised', 85)">😲 Surprised</button>
                <button class="btn emotion-love" onclick="sendEmotion('love', 75)">😍 Love</button>
                <button class="btn emotion-thinking" onclick="sendEmotion('thinking', 60)">🤔 Thinking</button>
                <button class="btn emotion-sleepy" onclick="sendEmotion('sleepy', 40)">😴 Sleepy</button>
                <button class="btn emotion-excited" onclick="sendEmotion('excited', 95)">🤩 Excited</button>
            </div>

            <h3>Custom Emotion</h3>
            <div class="input-group">
                <label>Emotion:</label>
                <select class="input" id="customEmotion">
                    <option value="happy">Happy</option>
                    <option value="sad">Sad</option>
                    <option value="angry">Angry</option>
                    <option value="surprised">Surprised</option>
                    <option value="love">Love</option>
                    <option value="thinking">Thinking</option>
                    <option value="sleepy">Sleepy</option>
                    <option value="excited">Excited</option>
                </select>
                <label>Intensity:</label>
                <input type="range" class="slider" id="intensitySlider" min="0" max="100" value="50">
                <span id="intensityValue">50</span>
                <button class="btn" onclick="sendCustomEmotion()">Send</button>
            </div>

            <div class="input-group">
                <label>Message:</label>
                <input type="text" class="input" id="emotionMessage" placeholder="Custom emotion message">
            </div>
        </div>

        <!-- States & Actions Panel -->
        <div class="panel">
            <h2>🔄 States</h2>
            <div class="button-grid">
                <button class="btn state" onclick="sendState('idle')">💤 Idle</button>
                <button class="btn state" onclick="sendState('thinking')">🤔 Thinking</button>
                <button class="btn state" onclick="sendState('generating')">⚡ Generating</button>
                <button class="btn state" onclick="sendState('speaking')">🔊 Speaking</button>
                <button class="btn state" onclick="sendState('post_response')">✅ Complete</button>
                <button class="btn state" onclick="sendState('error')">❌ Error</button>
            </div>

            <h2>🔊 Sounds</h2>
            <div class="button-grid">
                <button class="btn sound" onclick="playSound('connect')">🔗 Connect</button>
                <button class="btn sound" onclick="playSound('message_sent')">📤 Sent</button>
                <button class="btn sound" onclick="playSound('message_received')">📥 Received</button>
                <button class="btn sound" onclick="playSound('thinking')">💭 Thinking</button>
                <button class="btn sound" onclick="playSound('error')">❌ Error</button>
                <button class="btn sound" onclick="playSound('emotion_change')">🎭 Emotion</button>
            </div>

            <h2>💬 Chat</h2>
            <div class="input-group">
                <label>Message:</label>
                <input type="text" class="input" id="chatMessage" placeholder="Test chat message">
                <button class="btn" onclick="sendChatMessage()">Send</button>
            </div>
            <div class="button-grid">
                <button class="btn" onclick="simulateStreamingResponse()">📝 Stream Response</button>
                <button class="btn" onclick="simulateTyping()">⌨️ Typing Indicator</button>
            </div>
        </div>

        <!-- Quick Tests Panel -->
        <div class="panel">
            <h2>⚡ Quick Tests</h2>
            <div class="quick-tests">
                <button class="btn test" onclick="runEmotionCycle()">🎭 Emotion Cycle</button>
                <button class="btn test" onclick="runStateCycle()">🔄 State Cycle</button>
                <button class="btn test" onclick="runSoundTest()">🔊 Sound Test</button>
                <button class="btn test" onclick="runChatTest()">💬 Chat Test</button>
                <button class="btn test" onclick="runStressTest()">⚡ Stress Test</button>
                <button class="btn test" onclick="runProgressTest()">📊 Progress Test</button>
            </div>

            <h2>📊 Metrics</h2>
            <div class="button-grid">
                <button class="btn" onclick="sendMetrics()">📈 Send Metrics</button>
                <button class="btn" onclick="requestStats()">📊 Request Stats</button>
            </div>

            <h2>🔧 Utilities</h2>
            <div class="button-grid">
                <button class="btn" onclick="clearLog()">🗑️ Clear Log</button>
                <button class="btn danger" onclick="disconnectAll()">🚫 Disconnect</button>
            </div>
        </div>

        <!-- Live Log Panel -->
        <div class="panel log-panel">
            <h2>📋 Live Message Log</h2>
            <div class="log-content" id="logContent">
                <div class="log-entry">Waiting for connection...</div>
            </div>
            <div class="status-bar">
                <div id="messageStats">Messages: 0 | Sent: 0 | Received: 0</div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket connection
        let websocket = null;
        let isConnected = false;
        let messageCount = 0;
        let sentCount = 0;
        let receivedCount = 0;

        // DOM elements
        const statusDot = document.getElementById('statusDot');
        const connectionText = document.getElementById('connectionText');
        const connectBtn = document.getElementById('connectBtn');
        const logContent = document.getElementById('logContent');
        const messageStats = document.getElementById('messageStats');
        const intensitySlider = document.getElementById('intensitySlider');
        const intensityValue = document.getElementById('intensityValue');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Update intensity value display
            intensitySlider.addEventListener('input', function() {
                intensityValue.textContent = this.value;
            });

            // Auto-connect
            setTimeout(connect, 500);
        });

        // Connection functions
        function connect() {
            try {
                websocket = new WebSocket('ws://localhost:8081');
                
                websocket.onopen = function() {
                    isConnected = true;
                    updateConnectionStatus(true);
                    log('Connected to M1K3 Avatar Server', 'sent');
                };
                
                websocket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        log(`RECV ${data.type}: ${formatMessage(data)}`, 'received');
                        receivedCount++;
                        updateStats();
                    } catch (e) {
                        log(`RECV ERROR: ${event.data}`, 'error');
                    }
                };
                
                websocket.onclose = function() {
                    isConnected = false;
                    updateConnectionStatus(false);
                    log('Connection closed', 'error');
                };
                
                websocket.onerror = function() {
                    log('WebSocket error', 'error');
                };
                
            } catch (e) {
                log(`Connection failed: ${e.message}`, 'error');
            }
        }

        function disconnect() {
            if (websocket) {
                websocket.close();
            }
        }

        function updateConnectionStatus(connected) {
            statusDot.className = `status-dot ${connected ? 'status-connected' : 'status-disconnected'}`;
            connectionText.textContent = connected ? 'Connected' : 'Disconnected';
            connectBtn.textContent = connected ? 'Disconnect' : 'Connect';
            connectBtn.onclick = connected ? disconnect : connect;
        }

        // Message functions
        function sendMessage(data) {
            if (!isConnected) {
                log('Not connected - cannot send message', 'error');
                return;
            }
            
            try {
                websocket.send(JSON.stringify(data));
                log(`SENT ${data.type}: ${formatMessage(data)}`, 'sent');
                sentCount++;
                updateStats();
            } catch (e) {
                log(`Send failed: ${e.message}`, 'error');
            }
        }

        function formatMessage(data) {
            switch (data.type) {
                case 'emotion':
                    return `${data.emotion} (${data.intensity}%)`;
                case 'state':
                    return data.state;
                case 'chat_user':
                    return `"${data.message}"`;
                case 'sound':
                    return data.sound;
                case 'metrics':
                    return 'metrics update';
                default:
                    return JSON.stringify(data).substring(0, 50) + '...';
            }
        }

        function log(message, type = '') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
            
            messageCount++;
            updateStats();
            
            // Limit log entries
            if (logContent.children.length > 100) {
                logContent.removeChild(logContent.firstChild);
            }
        }

        function updateStats() {
            messageStats.textContent = `Messages: ${messageCount} | Sent: ${sentCount} | Received: ${receivedCount}`;
        }

        function clearLog() {
            logContent.innerHTML = '<div class="log-entry">Log cleared</div>';
            messageCount = 1;
            sentCount = 0;
            receivedCount = 0;
            updateStats();
        }

        // Test functions
        function sendEmotion(emotion, intensity) {
            sendMessage({
                type: 'emotion',
                emotion: emotion,
                intensity: intensity,
                message: `Test ${emotion} emotion`
            });
        }

        function sendCustomEmotion() {
            const emotion = document.getElementById('customEmotion').value;
            const intensity = parseInt(document.getElementById('intensitySlider').value);
            const message = document.getElementById('emotionMessage').value || `Custom ${emotion}`;
            
            sendMessage({
                type: 'emotion',
                emotion: emotion,
                intensity: intensity,
                message: message
            });
        }

        function sendState(state) {
            sendMessage({
                type: 'state',
                state: state
            });
        }

        function playSound(sound) {
            sendMessage({
                type: 'sound',
                sound: sound
            });
        }

        function sendChatMessage() {
            const message = document.getElementById('chatMessage').value;
            if (!message) return;
            
            sendMessage({
                type: 'chat_user',
                message: message
            });
            
            document.getElementById('chatMessage').value = '';
        }

        function sendMetrics() {
            sendMessage({
                type: 'metrics',
                energy_saved: (Math.random() * 50).toFixed(1),
                water_saved: Math.floor(Math.random() * 1000),
                co2_saved: Math.floor(Math.random() * 100),
                message_count: Math.floor(Math.random() * 50)
            });
        }

        function requestStats() {
            sendMessage({
                type: 'metrics_request'
            });
        }

        // Quick test functions
        function runEmotionCycle() {
            const emotions = ['happy', 'sad', 'angry', 'surprised', 'love', 'thinking', 'sleepy', 'excited'];
            let index = 0;
            
            function nextEmotion() {
                if (index < emotions.length) {
                    sendEmotion(emotions[index], 50 + Math.random() * 50);
                    index++;
                    setTimeout(nextEmotion, 1000);
                }
            }
            
            nextEmotion();
        }

        function runStateCycle() {
            const states = ['idle', 'thinking', 'generating', 'speaking', 'post_response', 'idle'];
            let index = 0;
            
            function nextState() {
                if (index < states.length) {
                    sendState(states[index]);
                    index++;
                    setTimeout(nextState, 1500);
                }
            }
            
            nextState();
        }

        function runSoundTest() {
            const sounds = ['connect', 'message_sent', 'message_received', 'thinking', 'error', 'emotion_change'];
            let index = 0;
            
            function nextSound() {
                if (index < sounds.length) {
                    playSound(sounds[index]);
                    index++;
                    setTimeout(nextSound, 800);
                }
            }
            
            nextSound();
        }

        function runChatTest() {
            const messages = [
                "Hello, this is a test message!",
                "Testing chat functionality...",
                "How are you today?",
                "This is working great!",
                "Final test message."
            ];
            
            let index = 0;
            
            function nextMessage() {
                if (index < messages.length) {
                    sendMessage({
                        type: 'chat_user',
                        message: messages[index]
                    });
                    index++;
                    setTimeout(nextMessage, 1500);
                }
            }
            
            nextMessage();
        }

        function runStressTest() {
            log('Starting stress test...', 'sent');
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const emotions = ['happy', 'sad', 'angry', 'surprised'];
                    const emotion = emotions[Math.floor(Math.random() * emotions.length)];
                    sendEmotion(emotion, Math.floor(Math.random() * 100));
                }, i * 100);
            }
        }

        function runProgressTest() {
            sendState('generating');
            
            for (let i = 0; i <= 100; i += 10) {
                setTimeout(() => {
                    sendMessage({
                        type: 'progress',
                        stage: 'generating',
                        progress: i,
                        tokens: i * 2,
                        message: `Generated ${i * 2} tokens`
                    });
                    
                    if (i === 100) {
                        setTimeout(() => sendState('post_response'), 500);
                    }
                }, i * 100);
            }
        }

        function simulateStreamingResponse() {
            sendMessage({ type: 'chat_ai_start' });
            
            const response = "This is a simulated streaming response from M1K3. Each word appears as a separate chunk to test the real-time chat interface.";
            const words = response.split(' ');
            
            words.forEach((word, index) => {
                setTimeout(() => {
                    sendMessage({
                        type: 'chat_ai_chunk',
                        chunk: word + ' '
                    });
                    
                    if (index === words.length - 1) {
                        setTimeout(() => {
                            sendMessage({ type: 'chat_ai_complete' });
                        }, 200);
                    }
                }, index * 200);
            });
        }

        function simulateTyping() {
            // This would show typing indicator on the receiving end
            log('Simulating typing indicator (check avatar dashboard)', 'sent');
        }

        function disconnectAll() {
            disconnect();
            setTimeout(() => {
                log('Disconnected from server', 'error');
            }, 100);
        }

        // Connect button functionality
        document.getElementById('connectBtn').onclick = function() {
            if (isConnected) {
                disconnect();
            } else {
                connect();
            }
        };

        // Enter key support for chat input
        document.getElementById('chatMessage').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        });
    </script>
</body>
</html>
