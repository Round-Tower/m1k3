<!DOCTYPE html>
<html lang="en" class="theme-pure-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M1K3 - Local AI Assistant</title>
    
    <!-- Modular CSS Architecture -->
    <link rel="stylesheet" href="styles/design-tokens.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/background-animations.css">
    
    <!-- Component styles loaded dynamically based on route -->
    
    <style>
        /* Base App Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* App Container */
        #app {
            min-height: calc(100vh - 60px);
            position: relative;
            animation: fadeIn var(--duration-normal) var(--easing-smooth);
        }

        /* Loading State */
        .route-loading {
            opacity: 0.7;
            pointer-events: none;
            position: relative;
        }

        .route-loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-light);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Error Pages */
        .error-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: var(--space-xl);
        }

        .error-content {
            max-width: 500px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-md);
        }

        .error-message {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
        }

        /* Button Styles */
        .btn-primary {
            display: inline-block;
            padding: var(--space-sm) var(--space-lg);
            background: var(--bg-elevated);
            color: var(--text-primary);
            text-decoration: none;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            transition: all var(--duration-fast) var(--easing-smooth);
            font-weight: 500;
        }

        .btn-primary:hover {
            background: var(--bg-glass);
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }

        /* Settings Container */
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
            padding: var(--space-xl);
        }

        .settings-container h1 {
            margin-bottom: var(--space-xl);
            font-size: 2rem;
        }

        .settings-sections {
            display: flex;
            flex-direction: column;
            gap: var(--space-xl);
        }

        .settings-section {
            background: var(--bg-secondary);
            padding: var(--space-lg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
        }

        .settings-section h2 {
            margin-bottom: var(--space-md);
            font-size: 1.25rem;
            color: var(--text-secondary);
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md) 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-control {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-md);
        }

        /* Debug/Test Grids */
        .debug-grid,
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--space-lg);
            padding: var(--space-xl);
        }

        .debug-card,
        .test-card {
            background: var(--bg-secondary);
            padding: var(--space-lg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--duration-fast) var(--easing-smooth);
        }

        .debug-card:hover,
        .test-card:hover {
            background: var(--bg-tertiary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }

        .debug-card h3,
        .test-card h3 {
            margin-bottom: var(--space-xs);
            color: var(--text-primary);
        }

        .debug-card p,
        .test-card p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Docs Container */
        .docs-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .docs-sidebar {
            width: 250px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            padding: var(--space-lg);
            overflow-y: auto;
        }

        .docs-sidebar h3 {
            margin-bottom: var(--space-md);
        }

        .docs-sidebar ul {
            list-style: none;
        }

        .docs-sidebar li {
            margin-bottom: var(--space-sm);
        }

        .docs-sidebar a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--duration-fast);
        }

        .docs-sidebar a:hover {
            color: var(--text-primary);
        }

        .docs-content {
            flex: 1;
            overflow: hidden;
        }

        .docs-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .docs-container {
                flex-direction: column;
            }

            .docs-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-subtle);
                max-height: 200px;
            }

            .debug-grid,
            .test-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation will be injected here -->
    <div id="navigation"></div>

    <!-- Main App Container -->
    <div id="app">
        <!-- Content will be loaded here by router -->
        <div class="loading-initial">
            <div class="error-page">
                <div class="error-content">
                    <h1 class="loading-text">Loading M1K3...</h1>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating background particles -->
    <div class="background-particles" aria-hidden="true"></div>

    <!-- Load Router System -->
    <script type="module">
        // Import router and navigation
        import router from './routes/router.js';
        import './routes/routes.config.js';
        import navigation from './routes/navigation.js';
        
        // Initialize app
        window.addEventListener('DOMContentLoaded', () => {
            console.log('M1K3 App initialized');
            
            // Router is automatically initialized
            // Navigation is automatically initialized
            
            // Add floating particles
            const particlesContainer = document.querySelector('.background-particles');
            if (particlesContainer) {
                for (let i = 0; i < 10; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.animationDelay = `${Math.random() * 10}s`;
                    particle.style.left = `${Math.random() * 100}%`;
                    particlesContainer.appendChild(particle);
                }
            }
        });

        // Global error handler
        window.addEventListener('error', (e) => {
            console.error('Application error:', e.error);
        });

        // Service Worker registration for PWA support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.warn('Service Worker registration failed:', err));
        }
    </script>

    <!-- Background particle styles -->
    <style>
        .background-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            50% {
                transform: translateY(-50vh) scale(1);
                opacity: 0.2;
            }
            90% {
                opacity: 0.4;
            }
        }
    </style>
</body>
</html>
