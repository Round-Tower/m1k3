<!DOCTYPE html>
<html>
<head>
    <title>Route Test</title>
</head>
<body>
    <h1>Testing M1K3 Router</h1>
    <div id="status">Loading...</div>
    
    <script type="module">
        try {
            // Test router import
            const router = await import('./routes/router.js');
            document.getElementById('status').innerHTML += '<br>✅ Router loaded';
            
            // Test routes config
            await import('./routes/routes.config.js');
            document.getElementById('status').innerHTML += '<br>✅ Routes config loaded';
            
            // Test navigation
            const nav = await import('./routes/navigation.js');
            document.getElementById('status').innerHTML += '<br>✅ Navigation loaded';
            
            document.getElementById('status').innerHTML += '<br><strong>🎉 All modules loaded successfully!</strong>';
            
        } catch (error) {
            document.getElementById('status').innerHTML = `❌ Error: ${error.message}`;
            console.error('Module loading error:', error);
        }
    </script>
</body>
</html>
