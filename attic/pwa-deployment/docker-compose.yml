# M1K3 PWA Development and Testing Environment
version: '3.8'

services:
  m1k3-pwa:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:80"
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount models directory for development
      - ./models:/usr/share/nginx/html/models:ro
    networks:
      - m1k3-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development model exporter service
  model-exporter:
    build:
      context: .
      dockerfile: Dockerfile
      target: model-builder
    volumes:
      - ./models:/app/models
      - ./backend:/app/backend
    environment:
      - PYTHONUNBUFFERED=1
    command: python backend/scripts/model_exporter.py --all-tiers --optimize
    networks:
      - m1k3-network
    profiles:
      - development

  # Testing service
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: model-builder
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - PYTHONUNBUFFERED=1
    command: pytest backend/tests/ -v
    networks:
      - m1k3-network
    profiles:
      - testing

networks:
  m1k3-network:
    driver: bridge

volumes:
  models-cache:
    driver: local